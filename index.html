<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · GLOBAL GENESIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #050505;
            --border: rgba(212, 175, 55, 0.5);
            --red: #ff3c00;
            --glass: rgba(15, 15, 20, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at 50% 0%, #1e1a0a 0%, #020202 100%);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Hintergrund-Muster */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.05"><path fill="none" stroke="%23d4af37" stroke-width="0.5" d="M400 100 L600 200 L500 400 L400 500 L200 450 L100 300 L200 150 L400 100Z"/><circle cx="400" cy="400" r="80" stroke="%23d4af37" fill="none"/></svg>');
            background-size: 100px;
            z-index: 0;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        .screen {
            display: none;
            flex: 1;
            padding: 30px 20px;
            flex-direction: column;
            overflow-y: auto;
            animation: fadeIn 0.4s ease-out;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Titel & Typo */
        .title-gold {
            font-family: 'Cinzel Decorative', serif;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.4));
        }

        /* Buttons */
        .btn-luxe {
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 800;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 5px 20px rgba(212,175,55,0.3); }
        .btn-outline { background: var(--glass); color: #fff; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .btn-luxe:active { transform: scale(0.95); }

        /* Globus */
        .atlas { font-size: 8rem; text-align: center; margin: 20px 0; animation: rotate 20s infinite linear; filter: drop-shadow(0 0 20px #00a3ff); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Quiz UI */
        .q-visual-frame {
            height: 220px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .q-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 20%, transparent 100%); }
        .q-text { position: absolute; bottom: 15px; left: 15px; right: 15px; font-size: 1.2rem; font-weight: 700; text-shadow: 0 2px 10px #000; }

        .opt-visual {
            height: 60px;
            border-radius: 15px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 20px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .opt-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 1; }
        .opt-label { position: relative; z-index: 2; font-weight: 600; font-size: 1rem; }

        .correct { border-color: #2ecc71 !important; background: rgba(46, 204, 113, 0.2) !important; box-shadow: 0 0 15px #2ecc71; }
        .wrong { border-color: #e74c3c !important; background: rgba(231, 76, 60, 0.2) !important; }

        /* Timer */
        .timer-rail { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--red); width: 100%; transition: width 0.1s linear; }

        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #111; border: 1px solid var(--gold-solid); padding: 25px; border-radius: 30px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        /* Setup Cards */
        .player-card { background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .flag-btn { width: 50px; height: 50px; background: #000; border: 1px dashed var(--gold-solid); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }
        .input-luxe { background: transparent; border: none; color: #fff; font-size: 1.1rem; flex: 1; outline: none; }

        .lang-chip { padding: 10px; border-radius: 15px; background: #111; border: 1px solid #333; text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .lang-chip.active { background: var(--gold); color: #000; }
        
        footer { text-align: center; padding: 15px; font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-box">
        <div onclick="App.confirmFlag('🇩🇪')">🇩🇪</div>
        <div onclick="App.confirmFlag('🇷🇺')">🇷🇺</div>
        <div onclick="App.confirmFlag('🇬🇧')">🇬🇧</div>
        <div onclick="App.confirmFlag('🇳🇬')">🇳🇬</div>
        <div onclick="App.confirmFlag('🇹🇷')">🇹🇷</div>
        <div onclick="App.confirmFlag('🇺🇦')">🇺🇦</div>
        <div onclick="App.confirmFlag('🇺🇸')">🇺🇸</div>
        <div onclick="App.confirmFlag('🇯🇵')">🇯🇵</div>
        <div onclick="App.confirmFlag('🇫🇷')">🇫🇷</div>
        <div onclick="App.confirmFlag('🇮🇹')">🇮🇹</div>
        <div onclick="App.confirmFlag('🇧🇷')">🇧🇷</div>
        <div onclick="App.confirmFlag('🇨🇳')">🇨🇳</div>
    </div>
</div>

<div id="app">
    <section id="s-home" class="screen active">
        <h1 class="title-gold" style="font-size: 3.5rem; margin-top: 40px;">MORTAL<br>KOMBAT</h1>
        <div class="atlas">🌍</div>
        <div style="margin-top: auto;">
            <button class="btn-luxe btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
            <button class="btn-luxe btn-outline" onclick="App.go('leaderboard')">Bestenliste 🏆</button>
        </div>
        <footer>GLOBAL GENESIS · 2026</footer>
    </section>

    <section id="s-setup" class="screen">
        <h2 class="title-gold" style="font-size: 2rem;">Krieger</h2>
        <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px 0;">
            <div class="lang-chip active" id="l-de" onclick="App.setLang('de')">DE</div>
            <div class="lang-chip" id="l-en" onclick="App.setLang('en')">EN</div>
            <div class="lang-chip" id="l-ru" onclick="App.setLang('ru')">RU</div>
            <div class="lang-chip" id="l-tr" onclick="App.setLang('tr')">TR</div>
            <div class="lang-chip" id="l-ig" onclick="App.setLang('ig')">IG</div>
        </div>
        <div id="player-list"></div>
        <button class="btn-luxe btn-outline" style="font-size: 0.6rem;" onclick="App.addPlayerInput()">+ Krieger hinzufügen</button>
        <div style="margin-top: auto;">
            <button class="btn-luxe btn-gold" onclick="App.prepareBattle()">Kampf starten</button>
            <button class="btn-luxe btn-outline" onclick="App.go('home')">Zurück</button>
        </div>
    </section>

    <section id="s-quiz" class="screen">
        <div style="display: flex; justify-content: space-between; font-family: 'Syncopate'; font-size: 0.7rem;">
            <span id="q-player-name">PLAYER</span>
            <span id="q-score">Runde: 1/5</span>
        </div>
        <div class="timer-rail"><div id="timer-bar" class="timer-fill"></div></div>
        
        <div id="q-frame" class="q-visual-frame">
            <div class="q-overlay"></div>
            <div id="q-text" class="q-text">Frage wird geladen...</div>
        </div>
        
        <div id="q-options"></div>
    </section>

    <section id="s-result" class="screen">
        <h2 class="title-gold">ERGEBNIS</h2>
        <div id="res-content" style="margin: 30px 0; flex: 1;"></div>
        <button class="btn-luxe btn-gold" onclick="App.go('home')">Hauptmenü</button>
    </section>

    <section id="s-leaderboard" class="screen">
        <h2 class="title-gold">BESTENLISTE</h2>
        <div id="lb-content" style="margin: 20px 0; flex: 1;"></div>
        <button class="btn-luxe btn-gold" onclick="App.go('home')">Zurück</button>
    </section>
</div>

<script>
    const DB = {
        de: [
            { q: "Größtes Land?", o: ["Russland", "Kanada", "China", "USA"], c: 0, kw: "russia" },
            { q: "Hauptstadt Japan?", o: ["Tokio", "Kyoto", "Osaka", "Seoul"], c: 0, kw: "tokyo" },
            { q: "Höchster Berg?", o: ["Everest", "K2", "Mont Blanc", "Lhotse"], c: 0, kw: "everest" },
            { q: "Tiefster Ozean?", o: ["Pazifik", "Atlantik", "Indik", "Arktik"], c: 0, kw: "ocean" },
            { q: "Land der Pyramiden?", o: ["Ägypten", "Mexiko", "Sudan", "Peru"], c: 0, kw: "pyramids" }
        ],
        en: [
            { q: "Largest Country?", o: ["Russia", "Canada", "China", "USA"], c: 0, kw: "russia" },
            { q: "Capital of France?", o: ["Paris", "Lyon", "Marseille", "Nice"], c: 0, kw: "paris" },
            { q: "Longest River?", o: ["Nile", "Amazon", "Yangtze", "Mississippi"], c: 0, kw: "nile" }
        ]
        // Weitere Sprachen analog befüllbar...
    };

    const App = {
        lang: 'de',
        players: [],
        currentPlayerIdx: 0,
        currentQIdx: 0,
        score: 0,
        timer: null,
        timeLeft: 12,
        activeFlagId: null,

        init() {
            this.addPlayerInput();
        },

        go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('s-' + id).classList.add('active');
            if(id === 'leaderboard') this.renderLeaderboard();
        },

        setLang(l) {
            this.lang = l;
            document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('active'));
            document.getElementById('l-' + l).classList.add('active');
        },

        addPlayerInput() {
            const id = Date.now();
            const div = document.createElement('div');
            div.className = 'player-card';
            div.innerHTML = `
                <div class="flag-btn" id="f-${id}" onclick="App.openFlag('${id}')">?</div>
                <input type="text" class="input-luxe" placeholder="Kämpfer Name..." id="i-${id}">
            `;
            document.getElementById('player-list').appendChild(div);
        },

        openFlag(id) {
            this.activeFlagId = id;
            document.getElementById('modal').style.display = 'flex';
        },

        confirmFlag(emoji) {
            document.getElementById('f-' + this.activeFlagId).innerText = emoji;
            document.getElementById('modal').style.display = 'none';
        },

        prepareBattle() {
            this.players = [];
            const cards = document.querySelectorAll('.player-card');
            cards.forEach(card => {
                const name = card.querySelector('input').value || "Unbekannt";
                const flag = card.querySelector('.flag-btn').innerText;
                this.players.push({ name, flag, score: 0 });
            });
            
            if(this.players.length === 0) return alert("Füge einen Kämpfer hinzu!");
            
            this.currentPlayerIdx = 0;
            this.startPlayerTurn();
        },

        startPlayerTurn() {
            this.currentQIdx = 0;
            this.score = 0;
            this.go('quiz');
            this.nextQuestion();
        },

        nextQuestion() {
            if(this.currentQIdx >= 5) {
                this.players[this.currentPlayerIdx].score = this.score;
                this.currentPlayerIdx++;
                if(this.currentPlayerIdx < this.players.length) {
                    alert("Nächster Spieler!");
                    this.startPlayerTurn();
                } else {
                    this.finishGame();
                }
                return;
            }

            const qData = DB[this.lang][this.currentQIdx % DB[this.lang].length];
            document.getElementById('q-player-name').innerText = `${this.players[this.currentPlayerIdx].flag} ${this.players[this.currentPlayerIdx].name}`;
            document.getElementById('q-score').innerText = `Frage ${this.currentQIdx + 1}/5`;
            document.getElementById('q-text').innerText = qData.q;
            document.getElementById('q-frame').style.backgroundImage = `url('https://source.unsplash.com/featured/?${qData.kw}')`;

            const optCont = document.getElementById('q-options');
            optCont.innerHTML = '';
            qData.o.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'opt-visual';
                div.innerHTML = `<div class="opt-bg" style="background-image:url('https://source.unsplash.com/featured/?${opt}')"></div><span class="opt-label">${opt}</span>`;
                div.onclick = () => this.check(i, qData.c, div);
                optCont.appendChild(div);
            });

            this.startTimer();
        },

        startTimer() {
            clearInterval(this.timer);
            this.timeLeft = 12;
            const bar = document.getElementById('timer-bar');
            this.timer = setInterval(() => {
                this.timeLeft -= 0.1;
                bar.style.width = (this.timeLeft / 12 * 100) + "%";
                if(this.timeLeft <= 0) {
                    clearInterval(this.timer);
                    this.check(-1, 0, null);
                }
            }, 100);
        },

        check(idx, correct, el) {
            clearInterval(this.timer);
            const options = document.querySelectorAll('.opt-visual');
            options.forEach(o => o.style.pointerEvents = 'none');

            if(idx === correct) {
                el.classList.add('correct');
                this.score += 100;
            } else {
                if(el) el.classList.add('wrong');
                options[correct].classList.add('correct');
            }

            setTimeout(() => {
                this.currentQIdx++;
                this.nextQuestion();
            }, 1500);
        },

        finishGame() {
            this.go('result');
            const res = document.getElementById('res-content');
            res.innerHTML = this.players.map(p => `
                <div style="background:var(--glass); border:1px solid var(--border); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between;">
                    <span>${p.flag} ${p.name}</span>
                    <span style="color:var(--gold-solid); font-weight:bold;">${p.score} PKT</span>
                </div>
            `).join('');

            // Save to LocalStorage
            let leader = JSON.parse(localStorage.getItem('mk_leader')) || [];
            this.players.forEach(p => leader.push({n: p.name, f: p.flag, s: p.score}));
            leader.sort((a,b) => b.s - a.s);
            localStorage.setItem('mk_leader', JSON.stringify(leader.slice(0, 10)));
        },

        renderLeaderboard() {
            const leader = JSON.parse(localStorage.getItem('mk_leader')) || [];
            document.getElementById('lb-content').innerHTML = leader.map((p, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                    <span>${i+1}. ${p.f} ${p.n}</span>
                    <span style="color:gold;">${p.s}</span>
                </div>
            `).join('');
        }
    };

    App.init();
</script>

</body>
</html>
