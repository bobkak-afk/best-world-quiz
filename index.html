<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · GLOBAL GENESIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@300;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --bg-dark: #08080a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --accent-red: #ff003c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Animierter Background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        .screen {
            display: none;
            flex: 1;
            padding: 30px;
            flex-direction: column;
            overflow-y: auto;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .screen.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        /* Typography */
        .cyber-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.5rem;
            text-align: center;
            line-height: 0.9;
            background: linear-gradient(180deg, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--gold-glow));
            margin-bottom: 10px;
        }

        .sub-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-align: center;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Buttons & Cards */
        .btn-main {
            background: none;
            border: 1px solid var(--gold);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .btn-main::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
            transition: 0.5s;
        }

        .btn-main:active { transform: translateY(2px); background: rgba(212,175,55,0.1); }
        .btn-main:active::after { left: 100%; }

        .btn-gold { background: var(--gold); color: #000; border: none; box-shadow: 0 0 30px var(--gold-glow); }

        /* Atlas Animation */
        .atlas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .atlas-sphere {
            font-size: 9rem;
            animation: float 6s ease-in-out infinite, rotate 20s linear infinite;
            filter: drop-shadow(0 0 50px rgba(0, 162, 255, 0.3));
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Quiz UI */
        .visual-card {
            width: 100%;
            height: 250px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background-size: cover;
            background-position: center;
            position: relative;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .visual-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg-dark) 0%, transparent 100%);
        }

        .option-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 25px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
        }

        .option-card:hover { border-color: var(--gold); background: rgba(212,175,55,0.05); transform: translateX(10px); }
        .option-card.correct { background: #1b4d2e !important; border-color: #2ecc71 !important; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .option-card.wrong { background: #4d1b1b !important; border-color: #e74c3c !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Progress Bar */
        .timer-container { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .timer-fill { height: 100%; width: 100%; background: var(--gold); box-shadow: 0 0 10px var(--gold); transition: width 0.1s linear; }

        /* Setup */
        .input-group {
            background: var(--glass);
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid var(--glass-border);
        }

        .input-group input {
            background: none; border: none; color: #fff; padding: 10px; font-family: 'Outfit'; font-size: 1rem; flex: 1; outline: none;
        }

        .flag-selector {
            width: 45px; height: 45px; background: rgba(0,0,0,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border: 1px solid var(--gold);
        }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        .modal-content {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px; background: #111; border: 1px solid var(--gold); border-radius: 25px;
        }

        .modal-flag { font-size: 2.5rem; cursor: pointer; transition: 0.3s; }
        .modal-flag:hover { transform: scale(1.3); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

<div id="modal">
    <div class="modal-content" id="flag-grid"></div>
</div>

<div id="app">
    <section id="s-home" class="screen active">
        <div style="margin-top: 40px;">
            <p class="sub-text">Prestige Edition</p>
            <h1 class="cyber-title">MORTAL<br>KOMBAT</h1>
        </div>
        
        <div class="atlas-container">
            <div class="atlas-sphere">🌍</div>
        </div>

        <div style="margin-bottom: 30px;">
            <button class="btn-main btn-gold" onclick="App.go('setup')">Start Battle</button>
            <button class="btn-main" onclick="App.go('leaderboard')">Hall of Fame</button>
        </div>
    </section>

    <section id="s-setup" class="screen">
        <h2 class="cyber-title" style="font-size: 2rem;">Warriors</h2>
        <p class="sub-text" style="margin-bottom: 20px;">Choose Language</p>
        <div style="display: flex; gap: 10px; margin-bottom: 30px;" id="lang-container">
            <div class="btn-main" style="flex: 1; padding: 10px; font-size: 0.6rem;" onclick="App.setLang('de', this)">DE</div>
            <div class="btn-main" style="flex: 1; padding: 10px; font-size: 0.6rem;" onclick="App.setLang('en', this)">EN</div>
            <div class="btn-main" style="flex: 1; padding: 10px; font-size: 0.6rem;" onclick="App.setLang('ru', this)">RU</div>
        </div>

        <div id="player-inputs"></div>
        <button class="btn-main" style="border-style: dashed; opacity: 0.6;" onclick="App.addPlayer()">+ Add Fighter</button>

        <div style="margin-top: auto;">
            <button class="btn-main btn-gold" onclick="App.startBattle()">Fight!</button>
            <button class="btn-main" onclick="App.go('home')">Back</button>
        </div>
    </section>

    <section id="s-quiz" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="q-player" style="font-weight: 800; color: var(--gold);">PLAYER</span>
            <span id="q-score" class="sub-text" style="margin: 0;">0000</span>
        </div>
        <div class="timer-container"><div id="timer-bar" class="timer-fill"></div></div>

        <div id="q-visual" class="visual-card">
            <div class="visual-overlay"></div>
            <div style="position: absolute; bottom: 20px; left: 20px; right: 20px;">
                <h3 id="q-text" style="font-size: 1.4rem; font-weight: 800; text-shadow: 0 4px 10px #000;">Loading...</h3>
            </div>
        </div>

        <div id="q-options"></div>
    </section>

    <section id="s-result" class="screen">
        <h2 class="cyber-title">Victory</h2>
        <div id="result-list" style="flex: 1; margin-top: 30px;"></div>
        <button class="btn-main btn-gold" onclick="location.reload()">Main Menu</button>
    </section>
</div>

<script>
    const DATA = {
        de: [
            { q: "Größtes Land?", o: ["Russland", "Kanada", "China", "USA"], c: 0, k: "russia" },
            { q: "Hauptstadt Japans?", o: ["Tokio", "Osaka", "Kyoto", "Seoul"], c: 0, k: "tokyo" },
            { q: "Wo stehen Pyramiden?", o: ["Ägypten", "Mexiko", "Sudan", "Irak"], c: 0, k: "pyramids" },
            { q: "Tiefster Ozean?", o: ["Pazifik", "Atlantik", "Indik", "Arktik"], c: 0, k: "ocean" }
        ],
        en: [
            { q: "Largest Country?", o: ["Russia", "Canada", "China", "USA"], c: 0, k: "russia" },
            { q: "Capital of France?", o: ["Paris", "Lyon", "Marseille", "Nice"], c: 0, k: "paris" }
        ]
    };

    const FLAGS = ['🇩🇪','🇺🇸','🇷🇺','🇹🇷','🇺🇦','🇫🇷','🇬🇧','🇯🇵','🇧🇷','🇳🇬','🇨🇳','🇮🇹'];

    const App = {
        players: [],
        pIdx: 0,
        qIdx: 0,
        lang: 'de',
        score: 0,
        timer: null,
        activeFlagId: null,

        init() {
            this.addPlayer();
            this.renderFlags();
            document.querySelectorAll('#lang-container .btn-main')[0].classList.add('btn-gold');
        },

        go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            setTimeout(() => {
                document.getElementById('s-' + id).classList.add('active');
            }, 50);
        },

        addPlayer() {
            const id = Date.now();
            const div = document.createElement('div');
            div.className = 'input-group';
            div.id = 'p-' + id;
            div.innerHTML = `
                <div class="flag-selector" onclick="App.openFlags('${id}')">?</div>
                <input type="text" placeholder="Warrior Name...">
                <span onclick="this.parentElement.remove()" style="cursor:pointer; opacity:0.5;">✕</span>
            `;
            document.getElementById('player-inputs').appendChild(div);
        },

        openFlags(id) {
            this.activeFlagId = id;
            document.getElementById('modal').style.display = 'flex';
        },

        renderFlags() {
            const grid = document.getElementById('flag-grid');
            FLAGS.forEach(f => {
                const span = document.createElement('span');
                span.className = 'modal-flag';
                span.innerText = f;
                span.onclick = () => {
                    document.querySelector(`#p-${this.activeFlagId} .flag-selector`).innerText = f;
                    document.getElementById('modal').style.display = 'none';
                };
                grid.appendChild(span);
            });
        },

        setLang(l, el) {
            this.lang = l;
            document.querySelectorAll('#lang-container .btn-main').forEach(b => b.classList.remove('btn-gold'));
            el.classList.add('btn-gold');
        },

        startBattle() {
            this.players = [];
            document.querySelectorAll('.input-group').forEach(group => {
                const n = group.querySelector('input').value || "Unknown";
                const f = group.querySelector('.flag-selector').innerText;
                this.players.push({ name: n, flag: f, total: 0 });
            });
            if (this.players.length === 0) return;
            this.pIdx = 0;
            this.startTurn();
        },

        startTurn() {
            this.qIdx = 0;
            this.score = 0;
            this.go('quiz');
            this.nextQ();
        },

        nextQ() {
            if (this.qIdx >= 5) return this.endTurn();
            
            const q = DATA[this.lang][this.qIdx % DATA[this.lang].length];
            document.getElementById('q-player').innerText = `${this.players[this.pIdx].flag} ${this.players[this.pIdx].name}`;
            document.getElementById('q-score').innerText = String(this.score).padStart(4, '0');
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-visual').style.backgroundImage = `url('https://source.unsplash.com/featured/?${q.k}')`;

            const optBox = document.getElementById('q-options');
            optBox.innerHTML = '';
            q.o.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerText = opt;
                div.onclick = () => this.check(i, q.c);
                optBox.appendChild(div);
            });

            this.runTimer();
        },

        runTimer() {
            clearInterval(this.timer);
            let time = 10;
            this.timer = setInterval(() => {
                time -= 0.1;
                document.getElementById('timer-bar').style.width = (time * 10) + "%";
                if (time <= 0) this.check(-1, 0);
            }, 100);
        },

        check(idx, correct) {
            clearInterval(this.timer);
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => c.style.pointerEvents = 'none');

            if (idx === correct) {
                cards[idx].classList.add('correct');
                this.score += 100;
            } else {
                if (idx !== -1) cards[idx].classList.add('wrong');
                cards[correct].classList.add('correct');
            }

            setTimeout(() => {
                this.qIdx++;
                this.nextQ();
            }, 1500);
        },

        endTurn() {
            this.players[this.pIdx].total = this.score;
            this.pIdx++;
            if (this.pIdx < this.players.length) {
                alert("Next Warrior!");
                this.startTurn();
            } else {
                this.showResults();
            }
        },

        showResults() {
            this.go('result');
            const res = document.getElementById('result-list');
            this.players.sort((a,b) => b.total - a.total).forEach((p, i) => {
                res.innerHTML += `
                    <div class="option-card" style="justify-content: space-between;">
                        <span>#${i+1} ${p.flag} ${p.name}</span>
                        <span style="color:var(--gold);">${p.total} PTS</span>
                    </div>
                `;
            });
        }
    };

    App.init();
</script>
</body>
</html>
