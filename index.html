<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>❤️ Best World Quiz ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04000a;color:#f0d8c0;font-family:'IM Fell English',Georgia,serif;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 100% 55% at 50% -5%,rgba(200,10,10,.32) 0%,transparent 65%),radial-gradient(ellipse 50% 50% at 10% 90%,rgba(130,0,60,.22) 0%,transparent 55%),linear-gradient(180deg,#04000a 0%,#090010 40%,#06000d 100%);z-index:0}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.p{position:absolute;bottom:-10px;border-radius:50%;background:radial-gradient(circle,#ff6030,#cc0020);box-shadow:0 0 8px 2px rgba(255,50,20,.6);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0}8%{opacity:1}92%{opacity:.5}100%{transform:translateY(-105vh) scale(.2);opacity:0}}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
.screen{display:none;width:100%;max-width:600px;flex-direction:column;align-items:center}
.screen.active{display:flex}
.card{width:100%;background:linear-gradient(160deg,rgba(18,2,10,.97),rgba(10,0,18,.97));border:1px solid rgba(180,30,60,.35);border-radius:4px;padding:28px 30px;box-shadow:0 0 40px rgba(150,0,0,.2),0 20px 60px rgba(0,0,0,.7);position:relative;overflow:hidden;animation:cardIn .35s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,60,80,.7),transparent)}
.mk{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.3rem,4.5vw,2.2rem);letter-spacing:.18em;background:linear-gradient(180deg,#fff5e0,#ffaa40,#ff4400,#990000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 16px rgba(255,100,0,.8));animation:flame 2s infinite;margin-bottom:4px;text-align:center}
@keyframes flame{0%,100%{filter:drop-shadow(0 0 12px rgba(255,100,0,.7))}50%{filter:drop-shadow(0 0 28px rgba(255,180,0,1))}}
.globe{font-size:4.5rem;filter:drop-shadow(0 0 24px rgba(255,40,0,.8));animation:flt 3s ease-in-out infinite;margin:8px 0;text-align:center}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.title{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.2rem,4.5vw,2rem);color:#ffc8a0;text-shadow:0 0 24px rgba(255,80,30,.5);text-align:center;margin:8px 0}
.subtitle{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(.85rem,3vw,1.1rem);color:#ff6633;text-shadow:0 0 16px rgba(255,80,30,.7);letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:20px}
.flags{font-size:1.8rem;letter-spacing:.4rem;margin:8px 0 22px;animation:flt 4s ease-in-out infinite;text-align:center}
.btn{width:100%;padding:13px;border-radius:3px;font-family:'Cinzel',serif;font-weight:700;font-size:.82rem;letter-spacing:.12em;cursor:pointer;border:none;text-transform:uppercase;margin-bottom:10px;transition:all .2s}
.btn-p{background:linear-gradient(135deg,#4a0000,#8b0000,#b01500,#5c0000);color:#ffe5cc;box-shadow:0 0 20px rgba(160,0,0,.4)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(200,0,0,.5)}
.btn-o{background:transparent;color:rgba(240,180,150,.5);border:1px solid rgba(180,40,40,.3);font-family:'IM Fell English',serif;font-style:italic;text-transform:none;font-size:.9rem;letter-spacing:.02em}
.sec{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.2em;color:#ff7755;text-transform:uppercase;margin-bottom:12px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.pbox{border:1px solid rgba(180,30,30,.3);border-radius:3px;padding:13px;background:rgba(12,0,5,.7)}
.inp{width:100%;padding:9px 11px;background:rgba(30,5,8,.9);border:1px solid rgba(200,60,60,.35);border-radius:3px;color:#fff;font-family:'IM Fell English',serif;font-size:.95rem;outline:none;margin-bottom:7px}
.inp:focus{border-color:rgba(255,100,80,.7)}
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 9px;font-size:1.15rem;background:rgba(10,0,4,.8);border:2px solid rgba(120,20,20,.2);border-radius:3px;cursor:pointer;transition:all .15s}
.fb.sel{border-color:#cc2200;transform:scale(1.1)}
.fb.tk{opacity:.15;cursor:not-allowed}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cb{display:flex;align-items:center;gap:8px;padding:11px 12px;background:rgba(12,0,5,.85);border:1px solid rgba(140,20,20,.2);border-radius:3px;color:rgba(240,180,150,.35);font-family:'IM Fell English',serif;font-size:.88rem;cursor:pointer;transition:all .15s}
.cb.on{border-color:rgba(220,50,30,.6);color:#ffcca0;background:rgba(40,2,4,.8)}
.steps{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.sd{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
.sd.on{background:rgba(255,60,40,.85);box-shadow:0 0 8px rgba(255,60,40,.6)}
.lg{font-size:3.5rem;filter:drop-shadow(0 0 18px rgba(255,40,0,.8));animation:spin 2s linear infinite;text-align:center}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.lr{display:flex;justify-content:space-between;align-items:center;padding:8px 18px;background:rgba(12,0,5,.9);border:1px solid rgba(140,20,20,.2);border-radius:3px;font-size:.88rem;color:rgba(240,180,150,.45);margin-bottom:7px}
.lr.done{border-color:rgba(80,200,100,.3);color:#86efac}
.tf{font-size:4.5rem;filter:drop-shadow(0 0 18px rgba(255,40,0,.4));animation:flt 3s ease-in-out infinite;display:block;text-align:center;margin-bottom:10px}
.tn{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;text-align:center;margin-bottom:8px}
.ts{color:rgba(255,180,140,.4);font-size:.88rem;font-style:italic;text-align:center;margin-bottom:16px}
.sb{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.sc{display:flex;align-items:center;gap:6px;padding:5px 11px;border:1px solid rgba(140,20,20,.2);border-radius:3px;font-size:.8rem;color:rgba(240,180,150,.3);background:rgba(10,0,5,.75);transition:all .2s}
.sc.act{background:rgba(28,2,6,.95)}
.sn{font-family:'Cinzel',serif;font-weight:700}
.tt{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:10px}
.tf2{height:100%;border-radius:2px;transition:width 1s linear,background .3s}
.tr{display:flex;justify-content:space-between;margin-bottom:14px}
.ql{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,180,150,.3);font-family:'Cinzel',serif}
.tnum{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700}
.qt{font-size:clamp(.95rem,2.4vw,1.1rem);line-height:1.7;color:#f0d8c0;margin-bottom:16px;min-height:44px}
.opts{display:grid;gap:7px;margin-bottom:4px}
.ob{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(12,0,6,.82);border:1px solid rgba(140,20,30,.22);border-radius:3px;color:rgba(240,200,180,.45);font-family:'IM Fell English',serif;font-size:.93rem;cursor:pointer;text-align:left;line-height:1.4;transition:all .15s;width:100%}
.ob:hover:not([disabled]){border-color:rgba(200,40,40,.5);color:#f0d8c0;background:rgba(30,2,6,.95);padding-left:17px}
.ob.cor{border-color:rgba(80,200,110,.6);color:#86efac;background:rgba(0,24,6,.75)}
.ob.wrg{border-color:rgba(220,40,40,.6);color:#fca5a5;background:rgba(30,0,0,.75)}
.ok{min-width:21px;height:21px;border:1px solid currentColor;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:bold;opacity:.5;flex-shrink:0;font-family:'Cinzel',serif}
.ex{padding:10px 13px;border-radius:3px;font-size:.86rem;line-height:1.6;margin:10px 0;font-style:italic}
.ex.c{border-left:3px solid rgba(80,200,110,.55);background:rgba(0,22,6,.7);color:#a7f3d0}
.ex.w{border-left:3px solid rgba(220,40,40,.55);background:rgba(28,0,0,.7);color:#fca5a5}
.ex.t{border-left:3px solid rgba(250,120,0,.55);background:rgba(28,6,0,.7);color:#fdba74}
.rt{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;text-align:center;background:linear-gradient(135deg,#ffcc80,#ff6633,#cc0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:18px}
.pod{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.pr{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid rgba(140,20,20,.18);border-radius:3px;background:rgba(10,0,5,.75)}
.pr.f1{border-color:rgba(255,150,50,.35)!important;background:rgba(30,5,0,.8);box-shadow:0 0 14px rgba(200,70,0,.12)}
.wm{text-align:center;font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;padding:13px;margin-bottom:14px;border:1px solid rgba(180,40,20,.3);border-radius:3px;background:rgba(38,4,4,.6);color:#ffaa70;letter-spacing:.05em}
.hr{display:flex;align-items:center;gap:7px;padding:8px 11px;border:1px solid rgba(140,20,20,.15);border-radius:3px;font-size:.86rem;background:rgba(10,0,5,.65);margin-bottom:6px}
.div{height:1px;background:rgba(180,20,20,.12);margin:14px 0}
.warn{color:#fb923c;font-size:.8rem;margin-top:5px;font-style:italic}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:8px;z-index:10;pointer-events:none}
.footer p{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.92);text-shadow:0 0 12px rgba(255,100,50,.5)}
.h{display:none}
.r2{display:flex;gap:8px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="app">

<!-- HOME -->

<div id="s-home" class="screen active">
  <div class="mk">MORTAL KOMBAT</div>
  <div class="globe">🌍</div>
  <div class="title">❤️ Best World Quiz ❤️</div>
  <div class="subtitle">Oder Angst? 😅</div>

  </div>
</div>

<!-- SETUP -->

<div id="s-setup" class="screen">
  <div class="steps"><div class="sd on" id="d1"></div><div class="sd" id="d2"></div><div class="sd" id="d3"></div></div>

    </div>
    <button class="btn btn-p" onclick="stp(2)">Weiter →</button>
    <button class="btn btn-o" onclick="go('home')">← Zurück</button>
  </div>
  <div id="ss2" class="card h">

  <div id="ss3" class="card h">

  </div>
</div>

<!-- LOADING -->

<div id="s-loading" class="screen">
  <div class="lg">🌍</div>
  <div style="font-family:Cinzel,serif;font-size:1.4rem;color:#ff8855;text-align:center;margin:12px 0 4px">Bereite Fragen vor…</div>
  <div style="color:rgba(255,180,130,.35);font-size:.86rem;font-style:italic;text-align:center;margin-bottom:18px">Готовлю вопросы…</div>
  <div id="lrows"></div>
</div>

<!-- TURN -->

<div id="s-turn" class="screen">
  <div class="card" style="text-align:center;max-width:360px">
    <span class="tf" id="tfl"></span>
    <div class="tn" id="tnm"></div>
    <div class="ts" id="tsb"></div>
    <div id="tpv" style="font-size:.8rem;color:rgba(255,180,140,.32);margin-bottom:16px"></div>
    <button class="btn btn-p" onclick="startQuiz()">⚔️ Bereit! →</button>
  </div>
</div>

<!-- QUIZ -->

<div id="s-quiz" class="screen">
  <div class="sb" id="sbar"></div>
  <div class="card" style="width:100%;max-width:600px">
    <div class="tt"><div class="tf2" id="tfill"></div></div>
    <div class="tr"><span class="ql" id="qlbl"></span><span class="tnum" id="tnum">25s</span></div>
    <div class="qt" id="qtext"></div>
    <div class="opts" id="opts"></div>

</div>

<!-- RESULT -->

<div id="s-result" class="screen">
  <div class="card">
    <div class="rt">⚔️ Ergebnis · Результат</div>

    <button class="btn btn-p" onclick="startGame()" style="margin-bottom:8px">🔄 Nochmal spielen</button>
    <button class="btn btn-o" onclick="go('home')">🏠 Hauptmenü</button>
  </div>
</div>

<!-- HS -->

<div id="s-hs" class="screen">
  <div class="card">
    <div class="sec">🏆 Bestenliste · Рейтинг</div>

    <button class="btn btn-o" style="margin-top:14px" onclick="go('home')">← Zurück</button>
  </div>
</div>

</div>
<div class="footer"><p>Produziert von Wowa &amp; Amiar Kempf</p></div>

<script>
// ── PARTICLES ──
const pc = document.getElementById('particles');
for(let i=0;i<22;i++){
  const d=document.createElement('div');
  d.className='p';
  d.style.cssText=`left:${(i*4.6)%100}%;width:${2+(i*.15)%3}px;height:${2+(i*.15)%3}px;animation-delay:${(i*.38)%8}s;animation-duration:${7+(i*.45)%9}s;opacity:${.2+(i*.03)%.5}`;
  pc.appendChild(d);
}

// ── DATA ──
const COUNTRIES=[
  {id:'de',flag:'🇩🇪',name:'Deutschland',lang:'Deutsch',color:'#F5C518'},
  {id:'ru',flag:'🇷🇺',name:'Россия',lang:'Русский',color:'#e03030'},
  {id:'ua',flag:'🇺🇦',name:'Україна',lang:'Українська',color:'#3B82F6'},
  {id:'tr',flag:'🇹🇷',name:'Türkiye',lang:'Türkçe',color:'#EF4444'},
  {id:'fr',flag:'🇫🇷',name:'France',lang:'Français',color:'#818CF8'},
];
const CATS=[
  {id:'history',e:'🏛️',l:'Geschichte'},
  {id:'geo',e:'🌍',l:'Geografie'},
  {id:'culture',e:'🎭',l:'Kultur'},
  {id:'food',e:'🍽️',l:'Essen'},
  {id:'sport',e:'⚽',l:'Sport'},
  {id:'lang',e:'💬',l:'Sprache'},
];
const MEDALS=['🥇','🥈','🥉','4.'];
const TSECS=25;

// ── QUESTIONS DATABASE ──
// Format: {q, o:[4 options], c: correctIndex, e: explanation}
const QDB = {
  de: [ // German player asks about other countries
    {q:"Was ist die Hauptstadt von Russland?",o:["Moskau","St. Petersburg","Kiew","Minsk"],c:0,e:"Moskau ist seit Jahrhunderten die Hauptstadt Russlands."},
    {q:"Welcher Fluss fließt durch Moskau?",o:["Donau","Wolga","Moskwa","Dnjepr"],c:2,e:"Die Moskwa ist der Fluss, der durch die russische Hauptstadt fließt."},
    {q:"Welches Bauwerk steht auf dem Roten Platz in Moskau?",o:["Kreml","Eremitage","Bolschoi-Theater","Tretjakow-Galerie"],c:0,e:"Der Kreml ist der bekannteste Komplex am Roten Platz in Moskau."},
    {q:"Was ist das Nationalgericht der Türkei?",o:["Kebab","Pizza","Sushi","Schnitzel"],c:0,e:"Kebab ist eines der bekanntesten türkischen Gerichte weltweit."},
    {q:"In welchem Land liegt der Bosporus?",o:["Griechenland","Bulgarien","Türkei","Ukraine"],c:2,e:"Der Bosporus ist eine Meerenge in der Türkei, die Europa und Asien verbindet."},
    {q:"Was ist die Hauptstadt der Ukraine?",o:["Lwiw","Charkiw","Odessa","Kiew"],c:3,e:"Kiew (Kyjiw) ist die Hauptstadt und größte Stadt der Ukraine."},
    {q:"Welches Land liegt am Schwarzen Meer, der Krim und dem Asowschen Meer?",o:["Russland","Ukraine","Türkei","Rumänien"],c:1,e:"Die Ukraine hat Zugang zum Schwarzen Meer und dem Asowschen Meer."},
    {q:"Was ist das bekannteste Gericht der ukrainischen Küche?",o:["Gulasch","Borschtsch","Piroschki","Wareniki"],c:1,e:"Borschtsch ist eine rote Suppe aus Rüben und gilt als ukrainisches Nationalgericht."},
    {q:"Wie heißt der berühmte Eiffelturm auf Französisch?",o:["Tour Eiffel","La Grande Tour","Palais Eiffel","Monument Paris"],c:0,e:"Der Eiffelturm heißt auf Französisch 'Tour Eiffel' und wurde 1889 erbaut."},
    {q:"Was ist die Währung Frankreichs?",o:["Franc","Pfund","Euro","Lira"],c:2,e:"Frankreich ist Mitglied der Eurozone und verwendet den Euro seit 2002."},
    {q:"Welches Getränk ist typisch für Russland?",o:["Wodka","Whisky","Rum","Gin"],c:0,e:"Wodka ist das bekannteste alkoholische Getränk aus Russland."},
    {q:"In welcher Stadt findet das Oktoberfest statt?",o:["Wien","Berlin","München","Hamburg"],c:2,e:"Das Oktoberfest findet jährlich in München statt und ist das größte Volksfest der Welt."},
    {q:"Welcher türkische Held gründete die moderne Türkei?",o:["Suleiman I.","Atatürk","Erdoğan","Mehmed II."],c:1,e:"Mustafa Kemal Atatürk gründete 1923 die moderne Republik Türkei."},
    {q:"Was ist die größte Stadt Frankreichs?",o:["Lyon","Marseille","Paris","Bordeaux"],c:2,e:"Paris ist mit über 2 Millionen Einwohnern die größte Stadt Frankreichs."},
    {q:"Welches Meer liegt südlich der Ukraine?",o:["Nordsee","Mittelmeer","Schwarzes Meer","Rotes Meer"],c:2,e:"Das Schwarze Meer liegt im Süden der Ukraine."},

  ru: [ // Russian player asks about other countries (in Russian)
    {q:"Какова столица Германии?",o:["Мюнхен","Берлин","Гамбург","Франкфурт"],c:1,e:"Берлин — столица и крупнейший город Германии."},
    {q:"Какой автомобильный бренд родом из Германии?",o:["Volvo","Toyota","BMW","Fiat"],c:2,e:"BMW (Bayerische Motoren Werke) — известный немецкий производитель автомобилей."},

// ── STATE ──
let pc2=2, players=[
  {id:0,name:'',cid:'de'},
  {id:1,name:'',cid:'ru'},
  {id:2,name:'',cid:'ua'},
  {id:3,name:'',cid:'fr'},
];
let selCats=['history','geo','culture','food'];
let questions={}, scores={};
let cpIdx=0, qIdx=0;
let timerInt=null, tLeft=TSECS, answered=false;
const Q_COUNT=8;

// ── HELPERS ──
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  if(id==='hs') renderHS();
}
function show(el){el.classList.remove('h')}
function hide(el){el.classList.add('h')}
function C(id){return COUNTRIES.find(c=>c.id===id)}
function active(){return players.slice(0,pc2)}

// ── SETUP ──
function setPc(n){
  pc2=n;
  [1,2,3,4].forEach(i=>{
    const b=document.getElementById('b'+i);
    if(!b)return;
    b.className=i===n?'btn btn-p':'btn btn-o';
    b.style.cssText='font-size:1.8rem;padding:18px 0;font-family:Cinzel,serif';
  });
}

function stp(n){
  [1,2,3].forEach(i=>{
    document.getElementById('ss'+i).classList.add('h');
    document.getElementById('d'+i).className='sd'+(i<=n?' on':'');
  });
  document.getElementById('ss'+n).classList.remove('h');
  if(n===2) renderPlist();
  if(n===3) renderCats();
}

function renderPlist(){
  const act=active();
  let h='';
  act.forEach((p,i)=>{
    const c=C(p.cid);
    const fbtns=COUNTRIES.map(ct=>{
      return `<button class="fb${p.cid===ct.id?' sel':''}" onclick="selC(${p.id},'${ct.id}')" title="${ct.name}">${ct.flag}</button>`;
    }).join('');
    h+=`<div style="margin-bottom:10px;padding:12px;border:1px solid rgba(200,60,60,.3);border-left:3px solid ${c.color};border-radius:3px;background:rgba(12,0,5,.7)">
      <div style="display:flex;gap:9px;align-items:flex-start">
        <div style="font-family:Cinzel,serif;font-size:1.3rem;font-weight:900;color:#fff;min-width:20px;padding-top:4px">${i+1}</div>
        <div style="flex:1">
          <input class="inp" placeholder="Name ${i+1}" value="${p.name}" oninput="setN(${p.id},this.value)" maxlength="20"/>
          <div class="frow">${fbtns}</div>
          <div style="font-size:.7rem;color:rgba(200,120,90,.3);font-style:italic;margin-top:4px">${c.flag} ${c.lang}</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('plist').innerHTML=h;
}

function setN(id,v){players[id].name=v}
function selC(pid,cid){
  players[pid].cid=cid;
  renderPlist();
}

function renderCats(){
  document.getElementById('cgrid').innerHTML=CATS.map(cat=>{
    const on=selCats.includes(cat.id);
    return `<button class="cb${on?' on':''}" onclick="togCat('${cat.id}')">${cat.e} ${cat.l}</button>`;
  }).join('');
}

function togCat(id){
  if(selCats.includes(id)){if(selCats.length>1)selCats=selCats.filter(c=>c!==id);}
  else selCats.push(id);
  renderCats();
}

// ── GAME ──
function startGame(){
  const act=active();
  if(act.some(p=>!p.name.trim())){alert('Bitte alle Namen eingeben!');return;}
  go('loading');
  scores={};
  questions={};
  act.forEach(p=>scores[p.id]=0);

  document.getElementById('lrows').innerHTML=act.map(p=>{
    const c=C(p.cid);
    return `<div class="lr" id="lr${p.id}">${c.flag} ${p.name} <span>⟳</span></div>`;
  }).join('');

  // Load questions from database with slight delay for UX
  setTimeout(()=>{
    act.forEach(p=>{
      const pool = QDB[p.cid] || QDB.de;
      // Shuffle and take Q_COUNT questions
      const shuffled = [...pool].sort(()=>Math.random()-.5);
      questions[p.id] = shuffled.slice(0, Q_COUNT);
      const row=document.getElementById('lr'+p.id);
      if(row){row.classList.add('done');row.innerHTML=`${C(p.cid).flag} ${p.name} <span>✓</span>`;}
    });
    setTimeout(()=>{
      cpIdx=0;qIdx=0;
      showTurn();
    },800);
  },1200);
}

function showTurn(){
  const act=active();
  const cp=act[cpIdx];
  const c=C(cp.cid);
  document.getElementById('tfl').textContent=c.flag;
  document.getElementById('tnm').textContent=cp.name||'Spieler '+(cpIdx+1);
  document.getElementById('tnm').style.color=c.color;
  document.getElementById('tsb').textContent=`${Q_COUNT} Fragen · auf ${c.lang}`;
  let prev='';
  if(cpIdx>0) prev=act.slice(0,cpIdx).map(p=>`${C(p.cid).flag} ${p.name}: ${scores[p.id]}/${Q_COUNT}`).join(' · ');
  document.getElementById('tpv').textContent=prev;
  go('turn');
}

function startQuiz(){
  answered=false;
  go('quiz');
  renderQ();
}

function renderQ(){
  const act=active();
  const cp=act[cpIdx];
  const c=C(cp.cid);
  const qs=questions[cp.id]||[];
  const q=qs[qIdx];

  // Score bar
  document.getElementById('sbar').innerHTML=act.map((p,i)=>{
    const pc=C(p.cid);
    const isAct=i===cpIdx;
    return `<div class="sc${isAct?' act':''}" style="${isAct?'border-color:'+pc.color+'55;color:'+pc.color:''}">
      ${pc.flag} <span class="sn">${i<=cpIdx?(scores[p.id]||0):'—'}</span>
    </div>`;
  }).join('');

  document.getElementById('qlbl').textContent=`${c.flag} Frage ${qIdx+1} / ${Q_COUNT}`;
  document.getElementById('qtext').textContent=q?q.q:'';
  document.getElementById('expl').className='h';
  hide(document.getElementById('nxtbtn'));

  document.getElementById('opts').innerHTML=['A','B','C','D'].map((k,i)=>
    `<button class="ob" onclick="ans(${i})" id="ob${i}">
      <span class="ok">${k}</span><span>${q?q.o[i]:''}</span>
    </button>`
  ).join('');

  startTimer(c.color);
}

function startTimer(col){
  clearInterval(timerInt);
  tLeft=TSECS;answered=false;
  updTimer(col);
  timerInt=setInterval(()=>{
    tLeft--;updTimer(col);
    if(tLeft<=0){clearInterval(timerInt);timeOut();}
  },1000);
}

function updTimer(col){
  const pct=(tLeft/TSECS)*100;
  const clr=tLeft<=5?'#f87171':tLeft<=10?'#fb923c':col;
  document.getElementById('tfill').style.cssText=`width:${pct}%;background:${clr};box-shadow:0 0 8px ${clr}`;
  document.getElementById('tnum').style.color=clr;
  document.getElementById('tnum').textContent=tLeft+'s';
}

function ans(idx){
  if(answered)return;
  answered=true;
  clearInterval(timerInt);
  const act=active();
  const cp=act[cpIdx];
  const q=questions[cp.id][qIdx];
  if(idx===q.c)scores[cp.id]++;
  ['0','1','2','3'].forEach(i=>{
    const b=document.getElementById('ob'+i);
    if(parseInt(i)===q.c)b.classList.add('cor');
    else if(parseInt(i)===idx)b.classList.add('wrg');
    b.disabled=true;
  });
  showExpl(idx===q.c?'c':'w',q.e);
  const nxt=document.getElementById('nxtbtn');
  show(nxt);
  const isLast=qIdx+1>=(questions[cp.id]||[]).length;
  const isLastP=cpIdx+1>=act.length;
  nxt.textContent=isLast?(isLastP?'⚔️ Ergebnis →':'Nächster Kämpfer →'):'Weiter →';
}

function timeOut(){
  if(answered)return;
  answered=true;
  const act=active();
  const cp=act[cpIdx];
  const q=questions[cp.id][qIdx];
  document.getElementById('ob'+q.c).classList.add('cor');
  ['0','1','2','3'].forEach(i=>document.getElementById('ob'+i).disabled=true);
  showExpl('t','⏰ Zeit! Richtig: '+q.o[q.c]);
  const nxt=document.getElementById('nxtbtn');
  show(nxt);
  const isLast=qIdx+1>=(questions[cp.id]||[]).length;
  const isLastP=cpIdx+1>=act.length;
  nxt.textContent=isLast?(isLastP?'⚔️ Ergebnis →':'Nächster Kämpfer →'):'Weiter →';
}

function showExpl(type,txt){
  const el=document.getElementById('expl');
  el.className='ex '+type;
  el.textContent=(type==='c'?'✓ ':type==='w'?'✗ ':'')+txt;
}

function nextQ(){
  const act=active();
  const cp=act[cpIdx];
  const qLen=(questions[cp.id]||[]).length;
  if(qIdx+1>=qLen){
    if(cpIdx+1>=act.length){clearInterval(timerInt);showResult();}
    else{cpIdx++;qIdx=0;showTurn();}
  } else {qIdx++;answered=false;renderQ();}
}

function showResult(){
  const act=active();
  const sorted=[...act].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  document.getElementById('pod').innerHTML=sorted.map((p,r)=>{
    const c=C(p.cid);
    const sc=scores[p.id]||0;
    return `<div class="pr${r===0?' f1':''}">
      <span style="font-size:1.2rem;min-width:26px">${MEDALS[r]}</span>
      <span style="font-size:1.1rem">${c.flag}</span>
      <span style="flex:1;font-size:.93rem">${p.name}</span>
      <span style="font-family:Cinzel,serif;font-size:1.4rem;font-weight:700;color:${c.color}">${sc}<span style="font-size:.5em;opacity:.3">/${Q_COUNT}</span></span>
      <span style="font-size:.72rem;color:rgba(240,180,140,.4);min-width:34px;text-align:right">${Math.round(sc/Q_COUNT*100)}%</span>
    </div>`;
  }).join('');
  const top=sorted[0];
  const topSc=scores[top.id]||0;
  const tied=sorted.filter(p=>(scores[p.id]||0)===topSc);
  const tc=C(top.cid);
  document.getElementById('wmsg').textContent=
    tied.length>1?'🤝 Unentschieden! · Ничья!':
    `${tc.flag} ${top.name} gewinnt! · побеждает!`;
  const sb=document.getElementById('savebtn');
  sb.textContent='💾 Punkte speichern';
  sb.disabled=false;
  sb.className='btn btn-p';
  go('result');
}

function saveHS(){
  const act=active();
  let hs=JSON.parse(localStorage.getItem('wq_hs')||'[]');
  act.forEach(p=>{
    const c=C(p.cid);
    hs.push({name:p.name||'Spieler',flag:c.flag,score:scores[p.id]||0,total:Q_COUNT,pct:Math.round(((scores[p.id]||0)/Q_COUNT)*100),date:new Date().toLocaleDateString('de-DE')});
  });
  hs=hs.sort((a,b)=>b.pct-a.pct).slice(0,30);
  localStorage.setItem('wq_hs',JSON.stringify(hs));
  const sb=document.getElementById('savebtn');
  sb.textContent='✓ Gespeichert!';
  sb.style.color='#86efac';
  sb.disabled=true;
}

function renderHS(){
  const hs=JSON.parse(localStorage.getItem('wq_hs')||'[]');
  if(!hs.length){document.getElementById('hslist').innerHTML='<div style="text-align:center;color:rgba(255,180,130,.25);padding:28px;font-style:italic">Noch keine Einträge.</div>';return;}
  document.getElementById('hslist').innerHTML=hs.map((h,i)=>
    `<div class="hr"><span style="color:rgba(255,180,130,.25);min-width:20px;font-family:Cinzel,serif;font-size:.75rem">${i+1}.</span><span>${h.flag}</span><span style="flex:1">${h.name}</span><span style="font-family:Cinzel,serif;font-weight:700;color:#ff9960">${h.score}/${h.total}</span><span style="color:rgba(240,180,130,.4);min-width:32px;text-align:right">${h.pct}%</span><span style="color:rgba(240,180,130,.2);font-size:.7rem;margin-left:6px">${h.date}</span></div>`
  ).join('');
}
</script>
