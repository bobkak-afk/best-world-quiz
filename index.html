<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · GENESIS VISUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #050505;
            --card: rgba(10, 10, 10, 0.85);
            --border: rgba(212, 175, 55, 0.35);
            --red: #ff3c00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
            background-image: radial-gradient(circle at 50% -20%, #2a1b00 0%, #050505 80%);
        }

        #app {
            width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column;
            position: relative; z-index: 10; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);
        }

        .screen { display: none; flex: 1; padding: 30px 25px; flex-direction: column; overflow-y: auto; }
        .screen.active { display: flex; animation: screenIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes screenIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ATLAS & TITEL */
        .title-gold { font-family: 'Cinzel Decorative', serif; font-size: 3rem; text-align: center; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.85; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); }
        .atlas { font-size: 7rem; animation: rotateAtlas 15s linear infinite; filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.5)); margin: 20px 0; display: inline-block; }
        @keyframes rotateAtlas { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .sub-title { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: #fff; text-align: center; text-transform: uppercase; margin-top: 25px; text-shadow: 0 0 20px rgba(255,255,255,0.8); font-weight: 700; }

        /* BUTTONS */
        .btn-luxe { appearance: none; border: none; padding: 18px; border-radius: 14px; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-bottom: 12px; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn-back { background: transparent; color: rgba(255,255,255,0.6); border: none; font-family: 'Syncopate'; font-size: 0.6rem; cursor: pointer; padding: 10px; text-align: center; }

        /* --- VISUAL QUIZ CARD --- */
        .question-card {
            background-size: cover; background-position: center;
            border: 1px solid var(--border); border-radius: 24px;
            padding: 30px; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 20px;
            min-height: 200px; display: flex; align-items: center; justify-content: center;
        }
        .question-overlay {
            position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
            z-index: 1;
        }
        .question-text {
            position: relative; z-index: 2; text-align: center; font-size: 1.4rem;
            font-weight: 500; text-shadow: 0 2px 10px #000; line-height: 1.3;
        }

        /* --- VISUAL OPTIONS --- */
        .option-item {
            background-size: cover; background-position: center;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
            margin-bottom: 12px; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 25px;
        }
        .option-item::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(0,0,0,0.65); z-index: 1; transition: 0.3s;
        }
        .option-item:hover { transform: scale(1.03); border-color: var(--gold-solid); }
        .option-item:hover::after { background: rgba(0,0,0,0.4); }
        
        .option-content { position: relative; z-index: 2; font-weight: 600; letter-spacing: 0.5px; }

        .option-item.correct { border-color: #2ecc71 !important; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
        .option-item.correct::after { background: rgba(27, 77, 46, 0.8) !important; }
        .option-item.wrong { border-color: #e74c3c !important; }
        .option-item.wrong::after { background: rgba(77, 27, 27, 0.8) !important; }

        /* SETUP CARDS */
        .player-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 18px; padding: 15px; display: flex; align-items: center; margin-bottom: 12px; }
        .flag-plus { width: 45px; height: 45px; background: rgba(0,0,0,0.5); border: 2px dashed #d4af37; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; color: #d4af37; }
        .input-luxe { background: transparent; border: none; color: #fff; font-family: 'Outfit', sans-serif; font-size: 1.1rem; width: 100%; margin-left: 15px; outline: none; font-weight: 600; }

        .lang-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 25px; }
        .lang-chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 2px; border-radius: 10px; font-size: 0.55rem; font-family: 'Syncopate'; cursor: pointer; text-align: center; }
        .lang-chip.active { background: var(--gold); color: #000; font-weight: 900; border-color: transparent; }

        .timer-rail { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0 25px; overflow: hidden; }
        .timer-fill { height: 100%; width: 100%; background: var(--red); box-shadow: 0 0 15px var(--red); transition: width 0.1s linear; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(15px); }
        .modal-content { background: #111; border: 1px solid var(--gold-solid); padding: 30px; border-radius: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .flag-item { font-size: 2.5rem; cursor: pointer; transition: 0.3s; }

        footer { text-align: center; padding: 25px; font-size: 0.75rem; color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; }
        .badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 100px; font-size: 0.65rem; font-weight: 800; }
        
        .loading-scene { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(212, 175, 55, 0.1); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flag-item" onclick="App.confirmFlag('🇩🇪')">🇩🇪</div>
            <div class="flag-item" onclick="App.confirmFlag('🇷🇺')">🇷🇺</div>
            <div class="flag-item" onclick="App.confirmFlag('🇬🇧')">🇬🇧</div>
            <div class="flag-item" onclick="App.confirmFlag('🇳🇬')">🇳🇬</div>
            <div class="flag-item" onclick="App.confirmFlag('🇹🇷')">🇹🇷</div>
            <div class="flag-item" onclick="App.confirmFlag('🇫🇷')">🇫🇷</div>
            <div class="flag-item" onclick="App.confirmFlag('🇺🇦')">🇺🇦</div>
            <div class="flag-item" onclick="App.confirmFlag('🇺🇸')">🇺🇸</div>
        </div>
    </div>

    <div id="app">
        <!-- SCREEN: HOME -->
        <section id="s-home" class="screen active">
            <div style="margin-top: 30px; text-align: center;">
                <p style="font-family:'Syncopate'; font-size:0.6rem; letter-spacing:5px; color:var(--gold-solid); opacity:0.8;">Elite Prestige Realm</p>
                <h1 class="title-gold">MORTAL<br>KOMBAT</h1>
                <div class="atlas">🌍</div>
                <p class="sub-title">Best World Quiz</p>
            </div>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
                <button class="btn-luxe btn-outline" onclick="App.go('leaderboard')">Bestenliste 🏆</button>
            </div>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>

        <!-- SCREEN: SETUP -->
        <section id="s-setup" class="screen">
            <h2 class="title-gold" style="font-size: 2rem;">Krieger</h2>
            <p style="font-family:'Syncopate'; font-size:0.5rem; letter-spacing:2px; color:var(--gold-solid); margin-bottom:10px; text-align:center;">Wähle Sprache</p>
            <div class="lang-grid">
                <div class="lang-chip active" id="ln-de" onclick="App.setLang('de')">DE</div>
                <div class="lang-chip" id="ln-ru" onclick="App.setLang('ru')">RU</div>
                <div class="lang-chip" id="ln-en" onclick="App.setLang('en')">EN</div>
                <div class="lang-chip" id="ln-ig" onclick="App.setLang('ig')">IGBO</div>
                <div class="lang-chip" id="ln-tr" onclick="App.setLang('tr')">TR</div>
            </div>
            <div id="player-list"></div>
            <button class="btn-luxe btn-outline" style="font-size:0.6rem;" onclick="App.addPlayerInput()">+ Neuer Kämpfer</button>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.prepareBattle()">Kampf Starten</button>
                <button class="btn-back" onclick="App.go('home')">← Zurück</button>
            </div>
        </section>

        <!-- SCREEN: LOADING -->
        <section id="s-loading" class="screen">
            <div class="loading-scene">
                <div class="spinner"></div>
                <p class="label-tech" style="margin-top: 20px;">Synchronisiere Visuals...</p>
            </div>
        </section>

        <!-- SCREEN: VS -->
        <section id="s-vs" class="screen">
            <div style="text-align: center; margin-top: 60px;">
                <div id="vs-flag" style="font-size: 7rem; margin-bottom: 15px;">🐲</div>
                <h2 id="vs-name" class="title-gold">SPIELER</h2>
                <div id="vs-info" style="margin-top:10px;"></div>
            </div>
            <div style="margin-top: auto; padding-bottom: 20px;">
                <button class="btn-luxe btn-gold" onclick="App.startQuiz()">FIGHT!</button>
                <button class="btn-back" onclick="App.go('setup')">← Ändern</button>
            </div>
        </section>

        <!-- SCREEN: QUIZ -->
        <section id="s-quiz" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="q-round" style="font-family:'Syncopate'; font-size:0.6rem; color:var(--gold-solid);">Round 1/10</span>
                <span id="q-gold" class="badge">💰 0</span>
            </div>
            <div class="timer-rail"><div id="timer-bar" class="timer-fill"></div></div>
            
            <div id="q-visual-card" class="question-card">
                <div class="question-overlay"></div>
                <h3 id="q-text" class="question-text">Lade Prüfung...</h3>
            </div>

            <div id="q-options" style="margin-top: 5px;"></div>
            
            <div id="q-feedback" style="display:none; margin-top:10px;">
                <div style="background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center;">
                    <p id="q-expl" style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px;"></p>
                    <button class="btn-luxe btn-gold" style="margin: 0;" onclick="App.nextStep()">Nächste Runde</button>
                </div>
            </div>
        </section>

        <!-- SCREEN: RESULT -->
        <section id="s-result" class="screen">
            <h1 class="title-gold" style="font-size: 2.2rem;">KAMPF BEENDET</h1>
            <div id="res-list" style="margin-top: 30px; flex: 1;"></div>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.prepareBattle()">Neustart</button>
                <button class="btn-luxe btn-outline" onclick="location.reload()">Hauptmenü</button>
            </div>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>

        <!-- SCREEN: LEADERBOARD -->
        <section id="s-leaderboard" class="screen">
            <h1 class="title-gold" style="font-size:2.2rem; text-align:center;">Halle des Ruhms</h1>
            <div id="lb-list" style="margin-top:30px; flex:1;"></div>
            <button class="btn-luxe btn-gold" onclick="App.go('home')">Hauptmenü</button>
        </section>
    </div>

    <script>
        const FALLBACK_DB = {
            de: [
                { id: "de1", q: "Was ist das flächenmäßig größte Land?", o: ["China", "Kanada", "Russland", "USA"], c: 2, e: "Russland umfasst über 17 Mio km².", kw: "world map" },
                { id: "de2", q: "Welcher Fluss fließt durch Ägypten?", o: ["Amazonas", "Kongo", "Nil", "Ganges"], c: 2, e: "Der Nil ist die Lebensader Ägyptens.", kw: "egypt nile" },
                { id: "de3", q: "Hauptstadt von Japan?", o: ["Peking", "Tokio", "Seoul", "Osaka"], c: 1, e: "Tokio ist das Herz Japans.", kw: "tokyo city" },
                { id: "de4", q: "Welches Meer liegt bei Griechenland?", o: ["Nordsee", "Mittelmeer", "Rotes Meer", "Ostsee"], c: 1, e: "Griechenland liegt am Mittelmeer.", kw: "greece ocean" }
            ],
            ru: [
                { id: "ru1", q: "Какая самая большая страна?", o: ["Китай", "Россия", "США", "Канада"], c: 1, e: "Россия — самая большая страна.", kw: "russia" }
            ],
            en: [
                { id: "en1", q: "Capital of France?", o: ["Lyon", "Paris", "Marseille", "Bordeaux"], c: 1, e: "Paris is the capital of France.", kw: "paris tower" }
            ],
            ig: [
                { id: "ig1", q: "Kedu isi obodo Nigeria?", o: ["Lagos", "Abuja", "Enugu", "Kano"], c: 1, e: "Abuja bụ isi obodo Nigeria.", kw: "nigeria city" }
            ],
            tr: [
                { id: "tr1", q: "Türkiye'nin başkenti?", o: ["İstanbul", "İzmir", "Ankara", "Antalya"], c: 2, e: "Ankara Türkiye'nin başkentidir.", kw: "turkey castle" }
            ]
        };

        const App = {
            profiles: JSON.parse(localStorage.getItem('mk_visual_v1')) || {},
            players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, currentLang: 'de', activeFlagIdx: 0, activeQs: [],

            save() { localStorage.setItem('mk_visual_v1', JSON.stringify(this.profiles)); },

            getProfile(name) {
                const k = name.trim().toLowerCase();
                if(!this.profiles[k]) this.profiles[k] = { name: name.trim(), xp: 0, gold: 0, level: 1, flag: '🐲', usedIds: [] };
                return this.profiles[k];
            },

            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
                if(id === 'setup' && document.getElementById('player-list').children.length === 0) this.addPlayerInput();
                if(id === 'leaderboard') this.renderLeaderboard();
            },

            setLang(l) {
                this.currentLang = l;
                document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('active'));
                document.getElementById('ln-' + l).classList.add('active');
            },

            addPlayerInput() {
                const cont = document.getElementById('player-list');
                const idx = Date.now() + Math.random();
                const d = document.createElement('div');
                d.className = 'player-card'; d.id = 'p-' + idx;
                d.innerHTML = `<div class="flag-plus" onclick="App.openFlag('${idx}')">+</div><input type="text" class="input-luxe" placeholder="Name..."><button class="btn-trash" onclick="this.parentElement.remove()" style="background:none; border:none; color:#ff4d4d; font-size:1.2rem; cursor:pointer; opacity:0.6;">🗑️</button>`;
                cont.appendChild(d);
            },

            openFlag(id) { this.activeFlagIdx = id; document.getElementById('modal').style.display = 'flex'; },
            confirmFlag(f) { 
                const card = document.getElementById('p-' + this.activeFlagIdx);
                card.querySelector('.flag-plus').innerText = f;
                card.querySelector('.flag-plus').style.borderStyle = 'solid';
                document.getElementById('modal').style.display = 'none';
            },

            async prepareBattle() {
                const cards = document.querySelectorAll('.player-card');
                this.players = Array.from(cards).map(c => {
                    const name = c.querySelector('input').value || "Warrior";
                    const flag = c.querySelector('.flag-plus').innerText === '+' ? '🐲' : c.querySelector('.flag-plus').innerText;
                    const p = this.getProfile(name); p.flag = flag;
                    return { ...p, sessionScore: 0, sessionGold: 0 };
                });
                if(this.players.length === 0) return;
                this.pIdx = 0;
                this.go('loading');
                this.activeQs = await this.fetchQuestions(10);
                setTimeout(() => this.showVS(), 1200);
            },

            async fetchQuestions(amount) {
                const p = this.getProfile(this.players[this.pIdx].name);
                const bank = FALLBACK_DB[this.currentLang] || FALLBACK_DB.de;
                let available = bank.filter(q => !p.usedIds.includes(q.id));
                if(available.length < amount) { p.usedIds = []; available = bank; }
                return available.sort(() => 0.5 - Math.random()).slice(0, amount);
            },

            showVS() {
                const p = this.players[this.pIdx];
                document.getElementById('vs-flag').innerText = p.flag;
                document.getElementById('vs-name').innerText = p.name.toUpperCase();
                document.getElementById('vs-info').innerHTML = `<span class="badge">LVL ${p.level}</span> <span style="font-size:0.8rem; margin-left:10px; color:var(--gold-solid);">GOLD: ${p.gold}</span>`;
                this.go('vs');
            },

            startQuiz() {
                this.qIdx = 0;
                this.renderQuestion();
                this.go('quiz');
            },

            renderQuestion() {
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                
                document.getElementById('q-round').innerText = `Round ${this.qIdx + 1}/10`;
                document.getElementById('q-gold').innerText = `💰 ${p.sessionGold}`;
                document.getElementById('q-text').innerText = q.q;

                // Dynamisches Bild für die Karte
                const card = document.getElementById('q-visual-card');
                const imgUrl = `https://source.unsplash.com/800x600/?${q.kw || 'travel,history'}&sig=${Math.random()}`;
                card.style.backgroundImage = `url('${imgUrl}')`;

                const box = document.getElementById('q-options');
                box.innerHTML = '';
                document.getElementById('q-feedback').style.display = 'none';
                box.style.display = 'block';

                q.o.forEach((opt, i) => {
                    const b = document.createElement('div');
                    b.className = 'option-item';
                    const optImg = `https://source.unsplash.com/400x200/?texture,dark&sig=${i + Math.random()}`;
                    b.style.backgroundImage = `url('${optImg}')`;
                    b.innerHTML = `<div class="option-content"><span>${opt}</span></div><span class="badge" style="opacity:0.4; z-index:2;">◈</span>`;
                    b.onclick = () => this.handleAnswer(i, b);
                    box.appendChild(b);
                });
                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timer);
                this.timeLeft = 12;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 12 * 100) + "%";
                    if(this.timeLeft <= 0) this.handleAnswer(-1);
                }, 100);
            },

            handleAnswer(idx, b) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                const prof = this.getProfile(p.name);
                const opts = document.querySelectorAll('.option-item');
                opts.forEach(o => o.style.pointerEvents = 'none');

                prof.usedIds.push(q.id);

                if(idx === q.c) {
                    if(b) b.classList.add('correct');
                    p.sessionScore++;
                    const gain = Math.round(this.timeLeft * 30);
                    p.sessionGold += gain; prof.gold += gain; prof.xp += 100;
                    prof.level = Math.floor(Math.sqrt(prof.xp / 400)) + 1;
                } else {
                    if(idx !== -1 && b) b.classList.add('wrong');
                    opts[q.c].classList.add('correct');
                }
                this.save();
                document.getElementById('q-expl').innerText = q.e;
                document.getElementById('q-feedback').style.display = 'block';
                document.getElementById('q-options').style.display = 'none';
            },

            nextStep() {
                this.qIdx++;
                if(this.qIdx < 10) this.renderQuestion();
                else { this.pIdx++; if(this.pIdx < this.players.length) this.prepareBattle(); else this.showResults(); }
            },

            renderLeaderboard() {
                const list = document.getElementById('lb-list');
                const sorted = Object.values(this.profiles).sort((a,b) => b.xp - a.xp);
                list.innerHTML = sorted.map((p, i) => `
                    <div style="background:var(--card); border:1px solid var(--border); border-radius:15px; display:flex; justify-content:space-between; align-items:center; padding:15px; margin-bottom:10px; border-color:${i<3?'var(--gold-solid)':'rgba(255,255,255,0.1)'}">
                        <div><span style="font-size:1.2rem; margin-right:10px;">${p.flag}</span><b>${p.name}</b></div>
                        <div style="text-align:right">LVL ${p.level}<br><span style="color:var(--gold-solid); font-size:0.8rem;">${p.gold} 💰</span></div>
                    </div>
                `).join('');
            },

            showResults() {
                this.go('result');
                const list = document.getElementById('res-list');
                list.innerHTML = this.players.map((p, i) => `
                    <div style="background:var(--card); border:1px solid var(--border); border-radius:15px; display:flex; justify-content:space-between; align-items:center; padding:15px; margin-bottom:10px;">
                        <div><span>${p.flag}</span> <b style="margin-left:10px">${p.name}</b></div>
                        <div style="text-align:right"><div style="color:var(--gold-solid); font-weight:900;">${p.sessionScore}/10 PKT</div></div>
                    </div>
                `).join('');
            }
        };

        App.go('home');
    </script>
</body>
</html>
