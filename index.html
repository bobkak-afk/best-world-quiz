<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · APEX WORLD QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #050505;
            --card: rgba(15, 15, 15, 0.95);
            --border: rgba(212, 175, 55, 0.3);
            --red: #ff3c00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(circle at 50% -20%, #2a1b00 0%, #050505 80%);
        }

        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .screen {
            display: none;
            flex: 1;
            padding: 40px 25px;
            flex-direction: column;
            overflow-y: auto;
        }

        .screen.active { display: flex; animation: screenIn 0.5s ease-out forwards; }

        @keyframes screenIn {
            from { opacity: 0; transform: translateY(10px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- ATLAS ROTATION --- */
        .atlas-container {
            display: flex;
            justify-content: center;
            margin: 25px 0; /* Mehr Abstand */
        }

        .atlas {
            font-size: 7rem; /* Viel größer gemacht */
            animation: rotateAtlas 15s linear infinite;
            filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.5));
            user-select: none;
        }

        @keyframes rotateAtlas {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* TYPOGRAPHY */
        .title-gold {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.2rem;
            text-align: center;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.85;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }

        .sub-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.4rem; /* Größere Schrift */
            letter-spacing: 3px;
            color: #ffffff;
            text-align: center;
            text-transform: uppercase;
            margin-top: 25px; /* Weiter runter gesetzt */
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255,255,255,0.7);
        }

        .label-tech {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: var(--gold-solid);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 15px; /* Etwas höher gesetzt durch Margin-Abstand unten */
            opacity: 0.8;
        }

        /* BUTTONS */
        .btn-luxe {
            appearance: none; border: none; padding: 18px; border-radius: 14px;
            font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; gap: 10px; width: 100%; margin-bottom: 12px;
        }

        .btn-gold { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 8px 20px rgba(170, 119, 28, 0.4); }
        .btn-gold:active { transform: scale(0.96); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        /* PANELS */
        .glass-panel {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 20px;
        }

        .timer-rail { height: 5px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 15px 0 25px; overflow: hidden; }
        .timer-fill { height: 100%; width: 100%; background: var(--red); box-shadow: 0 0 15px var(--red); transition: width 0.1s linear; }

        .option-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 22px; border-radius: 16px; margin-bottom: 10px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .option-item:hover { border-color: var(--gold-solid); background: rgba(255,255,255,0.06); transform: translateX(5px); }
        .option-item.correct { background: #1b4d2e !important; border-color: #2ecc71 !important; }
        .option-item.wrong { background: #4d1b1b !important; border-color: #e74c3c !important; }

        footer {
            text-align: center; padding: 25px; font-size: 0.7rem;
            letter-spacing: 2px; color: rgba(255,255,255,0.7); /* Heller gemacht */
            font-family: 'Syncopate', sans-serif; text-transform: uppercase;
            font-weight: 700;
        }

        .badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }

        .btn-exit {
            position: absolute; top: 15px; right: 20px;
            font-family: 'Syncopate', sans-serif; font-size: 0.6rem;
            color: rgba(255,255,255,0.4); text-decoration: none; border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 12px; border-radius: 8px; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- SCREEN: HOME -->
        <section id="s-home" class="screen active">
            <div style="margin-top: 40px;"> <!-- Höher gesetzt -->
                <p class="label-tech">Elite Prestige Realm</p>
                <h1 class="title-gold">MORTAL<br>KOMBAT</h1>
                <div class="atlas-container">
                    <div class="atlas">🌍</div>
                </div>
                <p class="sub-title">Best World Quiz</p>
            </div>
            <div style="margin-top: auto; padding-bottom: 10px;">
                <button class="btn-luxe btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
                <button class="btn-luxe btn-outline" onclick="App.startSolo()">1 Spieler (Solo)</button>
            </div>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>

        <!-- SCREEN: SETUP -->
        <section id="s-setup" class="screen">
            <h2 class="title-gold" style="font-size: 2.2rem;">Kämpfer</h2>
            <p class="label-tech" style="margin-bottom: 25px;">Wähle dein Team</p>
            <div id="player-container">
                <!-- Dynamisch -->
            </div>
            <button class="btn-luxe btn-outline" style="padding: 12px; font-size: 0.6rem;" onclick="App.addPlayerInput()">+ Neuer Kämpfer</button>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.startBattle()">Kampf Starten</button>
                <button class="btn-luxe btn-outline" style="border-color:transparent; opacity:0.6" onclick="App.go('home')">← Zurück zum Hauptmenü</button>
            </div>
        </section>

        <!-- SCREEN: VS -->
        <section id="s-vs" class="screen">
            <div style="text-align: center; margin-top: 60px;">
                <div style="font-size: 6.5rem; margin-bottom: 15px; filter: drop-shadow(0 0 20px var(--gold-solid));">🐲</div>
                <h2 id="vs-name" class="title-gold" style="font-size: 2.8rem;">SPIELER</h2>
                <div class="badge">Bereit zum Sieg</div>
            </div>
            <div style="margin-top: auto; padding-bottom: 20px;">
                <button class="btn-luxe btn-gold" onclick="App.startQuiz()">FIGHT!</button>
                <button class="btn-luxe btn-outline" style="border:none; opacity:0.6" onclick="App.go('setup')">← Kämpfer bearbeiten</button>
            </div>
        </section>

        <!-- SCREEN: QUIZ -->
        <section id="s-quiz" class="screen">
            <div class="btn-exit" onclick="if(confirm('Kampf abbrechen?')) location.reload()">Abbrechen ✕</div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <span id="quiz-round" class="label-tech">Level 01</span>
                <span id="quiz-gold" class="badge">💰 0</span>
            </div>
            <div class="timer-rail"><div id="timer-bar" class="timer-fill"></div></div>
            <div class="glass-panel"><h3 id="quiz-question" style="font-size: 1.4rem; text-align: center; line-height: 1.4; font-weight: 300;">Lade Herausforderung...</h3></div>
            <div id="quiz-options"><!-- Optionen --></div>
            <div id="quiz-feedback" style="display: none; margin-top: 5px;">
                <div class="glass-panel" style="padding: 15px; border-color: rgba(255,255,255,0.1);">
                    <p id="quiz-expl" style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px;"></p>
                    <button class="btn-luxe btn-gold" style="margin: 0;" onclick="App.nextStep()">Nächste Runde</button>
                </div>
            </div>
        </section>

        <!-- SCREEN: RESULT -->
        <section id="s-result" class="screen">
            <h1 class="title-gold" style="font-size: 2.5rem;">ERGEBNIS</h1>
            <p class="label-tech">Kampf Beendet</p>
            <div id="leaderboard" style="margin-top: 30px; flex: 1;"></div>
            <button class="btn-luxe btn-gold" onclick="location.reload()">Hauptmenü</button>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>
    </div>

    <script>
        const QUESTIONS = [
            { q: "Was ist das flächenmäßig größte Land der Welt?", o: ["Kanada", "USA", "Russland", "China"], c: 2, e: "Russland umfasst über 17 Millionen km²." },
            { q: "In welchem Land liegen die Ruinen von Machu Picchu?", o: ["Mexiko", "Brasilien", "Peru", "Chile"], c: 2, e: "Machu Picchu ist eine Inka-Stadt in den Anden Perus." },
            { q: "Welcher Fluss fließt durch Ägypten?", o: ["Amazonas", "Kongo", "Nil", "Ganges"], c: 2, e: "Der Nil ist die Lebensader Ägyptens." },
            { q: "Was ist das bevölkerungsreichste Land der Welt?", o: ["Indien", "China", "Indonesien", "USA"], c: 0, e: "Indien hat China im Jahr 2023 offiziell überholt." },
            { q: "Welches Gebirge trennt Europa von Asien?", o: ["Alpen", "Ural", "Himalaya", "Anden"], c: 1, e: "Das Uralgebirge gilt als Grenze zwischen den Kontinenten." }
        ];

        const App = {
            players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, activeQs: [],

            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
            },

            addPlayerInput(name = "") {
                const container = document.getElementById('player-container');
                if(container.children.length >= 4) return;
                const div = document.createElement('div');
                div.className = 'player-entry';
                div.innerHTML = `<span>👤</span><input type="text" class="input-minimal" value="${name || 'Krieger ' + (container.children.length + 1)}">`;
                container.appendChild(div);
            },

            startSolo() {
                document.getElementById('player-container').innerHTML = "";
                this.addPlayerInput("Solo Krieger");
                this.startBattle();
            },

            startBattle() {
                const inputs = document.querySelectorAll('.input-minimal');
                this.players = Array.from(inputs).map(inp => ({ name: inp.value || "Anonym", score: 0, gold: 0 }));
                if(this.players.length === 0) return alert("Bitte mindestens einen Spieler hinzufügen!");
                this.pIdx = 0;
                this.showVS();
            },

            showVS() {
                const p = this.players[this.pIdx];
                document.getElementById('vs-name').innerText = p.name.toUpperCase();
                this.go('vs');
            },

            startQuiz() {
                this.qIdx = 0;
                this.activeQs = [...QUESTIONS].sort(() => Math.random() - 0.5);
                this.renderQuestion();
                this.go('quiz');
            },

            renderQuestion() {
                const q = this.activeQs[this.qIdx];
                document.getElementById('quiz-round').innerText = `Level 0${this.qIdx + 1}`;
                document.getElementById('quiz-gold').innerText = `💰 ${this.players[this.pIdx].gold}`;
                document.getElementById('quiz-question').innerText = q.q;
                
                const optBox = document.getElementById('quiz-options');
                optBox.innerHTML = '';
                optBox.style.display = 'block';
                document.getElementById('quiz-feedback').style.display = 'none';

                q.o.forEach((opt, i) => {
                    const btn = document.createElement('div');
                    btn.className = 'option-item';
                    btn.innerHTML = `<span>${opt}</span><span style="opacity:0.3">◈</span>`;
                    btn.onclick = () => this.handleAnswer(i);
                    optBox.appendChild(btn);
                });
                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timer);
                this.timeLeft = 12;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 12 * 100) + "%";
                    if(this.timeLeft <= 0) { clearInterval(this.timer); this.handleAnswer(-1); }
                }, 100);
            },

            handleAnswer(idx) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const opts = document.querySelectorAll('.option-item');
                opts.forEach(o => o.style.pointerEvents = 'none');

                if(idx === q.c) {
                    opts[idx].classList.add('correct');
                    this.players[this.pIdx].score++;
                    this.players[this.pIdx].gold += Math.round(this.timeLeft * 30);
                } else {
                    if(idx !== -1) opts[idx].classList.add('wrong');
                    opts[q.c].classList.add('correct');
                }

                document.getElementById('quiz-expl').innerText = q.e;
                document.getElementById('quiz-feedback').style.display = 'block';
                document.getElementById('quiz-options').style.display = 'none';
            },

            nextStep() {
                this.qIdx++;
                if(this.qIdx < this.activeQs.length) {
                    this.renderQuestion();
                } else {
                    this.pIdx++;
                    if(this.pIdx < this.players.length) this.showVS();
                    else this.showResults();
                }
            },

            showResults() {
                this.go('result');
                const board = document.getElementById('leaderboard');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                
                board.innerHTML = sorted.map((p, i) => {
                    let rank = "Warrior";
                    if(p.score >= 5) rank = "Legend";
                    else if(p.score >= 4) rank = "Champion";
                    else if(p.score >= 3) rank = "Master";

                    return `
                    <div class="glass-panel" style="display:flex; justify-content:space-between; align-items:center; border-color:${i===0?'var(--gold-solid)':'rgba(255,255,255,0.1)'}">
                        <div><span class="badge">${rank}</span> <div style="margin-top:5px; font-weight:700;">${p.name}</div></div>
                        <div style="text-align:right">
                            <div style="color:var(--gold-solid); font-weight:900; font-size:1.4rem;">${p.score}/${QUESTIONS.length}</div>
                            <div style="font-size:0.75rem; opacity:0.6; font-family:'Syncopate';">💰 ${p.gold}</div>
                        </div>
                    </div>`;
                }).join('');
            }
        };

        // Standard-Start
        App.addPlayerInput();
        App.addPlayerInput();
    </script>
</body>
</html>
