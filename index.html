<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · GLOBAL GENESIS · VISUAL EVOLUTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #050505;
            --border: rgba(212, 175, 55, 0.5);
            --red: #ff3c00;
            --shadow: 0 0 30px rgba(0,0,0,0.8);
            --glass: rgba(10, 10, 15, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at 50% 0%, #1e1a0a 0%, #020202 100%);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.1"><path fill="none" stroke="%23d4af37" stroke-width="0.5" d="M400 100 L600 200 L500 400 L400 500 L200 450 L100 300 L200 150 L400 100Z"/><circle cx="400" cy="400" r="80" stroke="%23d4af37" fill="none"/><path d="M400 200 L400 600 M200 400 L600 400" stroke="%23d4af37"/></svg>');
            background-repeat: repeat;
            background-size: 60px;
            pointer-events: none;
            z-index: 0;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .screen {
            display: none;
            flex: 1;
            padding: 20px 20px 10px 20px;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            scrollbar-width: thin;
        }
        .screen.active {
            display: flex;
            animation: screenGlow 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes screenGlow {
            0% { opacity: 0; transform: scale(0.98); filter: blur(6px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* --- GLOBUS / ATLAS (nur Globus, keine Flaggen) --- */
        .atlas-box {
            display: flex;
            justify-content: center;
            margin: 10px 0;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.6));
        }
        .atlas {
            font-size: 9rem;
            animation: rotateAtlas 18s infinite linear;
            filter: drop-shadow(0 0 18px #00a3ff);
            transition: all 0.3s;
            display: inline-block;
        }
        @keyframes rotateAtlas { 
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.02); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Luxus Buttons */
        .btn-luxe {
            appearance: none;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.25s ease;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .btn-gold {
            background: var(--gold);
            color: #000;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }
        .btn-gold:active { transform: scale(0.96); }
        .btn-outline {
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1.5px solid var(--border);
            backdrop-filter: blur(5px);
        }
        .btn-back {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: none;
            font-family: 'Syncopate';
            font-size: 0.65rem;
            cursor: pointer;
            padding: 12px;
            text-align: center;
            font-weight: 700;
        }

        /* QUIZ VISUAL UPGRADE */
        .q-visual-frame {
            height: 260px;
            border-radius: 36px;
            border: 1px solid rgba(212,175,55,0.6);
            background-size: cover;
            background-position: center 30%;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: 0.4s;
        }
        .q-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 90%);
            z-index: 1;
        }
        .q-text {
            position: relative;
            z-index: 10;
            text-align: center;
            font-size: 1.55rem;
            padding: 20px;
            font-weight: 700;
            text-shadow: 0 2px 15px #000;
            letter-spacing: -0.2px;
        }
        .opt-visual {
            height: 70px;
            border-radius: 60px;
            border: 1px solid rgba(255,215,0,0.3);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
        }
        .opt-visual:hover {
            transform: translateX(6px) scale(1.02);
            border-color: var(--gold-solid);
            box-shadow: 0 0 18px rgba(212,175,55,0.4);
        }
        .opt-img-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1;
            transition: 0.2s;
            backdrop-filter: blur(1px);
        }
        .opt-visual:hover .opt-img-overlay {
            background: rgba(0,0,0,0.5);
        }
        .opt-label {
            position: relative;
            z-index: 10;
            padding-left: 25px;
            font-weight: 800;
            font-size: 1rem;
            text-shadow: 0 2px 8px black;
            letter-spacing: 0.5px;
        }
        .opt-visual.correct .opt-img-overlay {
            background: rgba(27, 77, 46, 0.85) !important;
            backdrop-filter: blur(2px);
        }
        .opt-visual.correct { border-color: #2ecc71 !important; box-shadow: 0 0 15px #2ecc71; }
        .opt-visual.wrong .opt-img-overlay {
            background: rgba(100, 30, 30, 0.9) !important;
        }
        .opt-visual.wrong { border-color: #e74c3c !important; }

        /* Timer */
        .timer-rail {
            height: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            margin: 8px 0 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px #000;
        }
        .timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff5e00, var(--red));
            box-shadow: 0 0 12px #ff3c00;
            transition: width 0.05s linear;
        }

        /* Setup / Cards */
        .player-card {
            background: rgba(20,20,28,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 30px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }
        .flag-plus {
            width: 52px;
            height: 52px;
            background: #1a1a1a;
            border: 2px dashed var(--gold-solid);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-luxe {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            flex: 1;
            outline: none;
            font-weight: 600;
        }
        .lang-chip {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 0;
            border-radius: 40px;
            font-size: 0.7rem;
            font-family: 'Syncopate';
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .lang-chip.active {
            background: var(--gold);
            color: #000;
            font-weight: 900;
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 12px gold;
        }
        .rank-pill {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.6rem;
            font-family: 'Syncopate';
            font-weight: 900;
        }
        .rank-master { background: #00d4ff; color: #000; box-shadow: 0 0 8px cyan; }
        .rank-god { background: #ff3c00; color: #fff; box-shadow: 0 0 12px #ff3c00; }
        .badge {
            background: var(--gold);
            color: #000;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 900;
        }
        footer {
            text-align: center;
            padding: 20px 0 10px;
            font-size: 0.6rem;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        /* Leaderboard & Achievements */
        .rank-card {
            background: rgba(20,20,28,0.7);
            backdrop-filter: blur(5px);
            border-radius: 28px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid var(--gold-solid);
        }
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }
        .modal-box {
            background: #0e0e12;
            border: 1px solid var(--gold-solid);
            padding: 20px;
            border-radius: 48px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(212,175,55,0.2);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* zusätzlicher Glanz */
        .title-gold {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            background: var(--gold);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(212,175,55,0.6));
        }
        .section-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--gold-solid);
            margin: 15px 0 10px;
            text-transform: uppercase;
        }
        /* kein punkt an den seiten: verstecke Gold-Anzeige im Quiz */
        #q-gold {
            display: none;
        }
        /* entferne seitliche rahmen */
        #app {
            border-left: none;
            border-right: none;
        }
        /* mehr grafik: schwebende partikel */
        .glow-particle {
            position: fixed;
            pointer-events: none;
            background: radial-gradient(circle, rgba(212,175,55,0.3) 0%, rgba(0,0,0,0) 80%);
            width: 100%;
            height: 100%;
            z-index: 0;
        }
    </style>
</head>

            { id: "tr10", q: "Rusya'nın başkenti?", o: ["Moskova", "St.Petersburg", "Kazan", "Novosibirsk"], c: 0, e: "Moskova", kw: "moscow kremlin", imgKw: ["moscow red square", "st petersburg", "kazan", "novosibirsk"] }
        ]
    };

    const App = {
        profiles: JSON.parse(localStorage.getItem('mk_supreme_v9')) || {},
        players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, currentLang: 'de', activeFlagIdx: null, activeQs: [],
        save() { localStorage.setItem('mk_supreme_v9', JSON.stringify(this.profiles)); },
        getProfile(name) {
            let k = name.trim().toLowerCase();
            if(!this.profiles[k]) this.profiles[k] = { name: name.trim(), xp: 0, gold: 0, level: 1, flag: '🐲', usedIds: [] };
            return this.profiles[k];
        },
        getRank(lvl) {
            if(lvl >= 50) return { class: 'rank-god', label: 'Elder God' };
            if(lvl >= 10) return { class: 'rank-master', label: 'Master' };
            return { class: 'rank-warrior', label: 'Warrior' };
        },
        go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('s-' + id).classList.add('active');
            if(id === 'setup' && document.getElementById('player-list').children.length === 0) this.addPlayerInput();
            if(id === 'leaderboard') this.renderLeaderboard();
            if(id === 'achievements') this.renderAchievements();
        },
        setLang(l) { this.currentLang = l; document.querySelectorAll('.lang-chip').forEach(c => c.classList.remove('active')); document.getElementById('ln-' + l).classList.add('active'); },
        addPlayerInput() {
            let cont = document.getElementById('player-list');
            let id = Date.now();
            let d = document.createElement('div');
            d.className = 'player-card'; d.id = 'pc-' + id;
            d.innerHTML = `<div class="flag-plus" onclick="App.openFlag('${id}')">+</div><input type="text" class="input-luxe" placeholder="Kämpfername"><button class="btn-trash" onclick="document.getElementById('pc-${id}').remove()">🗑️</button>`;
            cont.appendChild(d);
        },
        openFlag(id) { this.activeFlagIdx = id; document.getElementById('modal').style.display = 'flex'; },
        confirmFlag(f) {
            let card = document.getElementById('pc-' + this.activeFlagIdx);
            if(card) { let btn = card.querySelector('.flag-plus'); btn.innerText = f; btn.style.borderStyle = 'solid'; }
            document.getElementById('modal').style.display = 'none';
        },
        async prepareBattle() {
            let cards = document.querySelectorAll('.player-card');
            if(cards.length === 0) return;
            this.players = Array.from(cards).map(c => {
                let name = c.querySelector('input').value.trim() || "Krieger";
                let flag = c.querySelector('.flag-plus').innerText === '+' ? '🌍' : c.querySelector('.flag-plus').innerText;
                let p = this.getProfile(name); p.flag = flag;
                return { ...p, sessionScore: 0, sessionGold: 0 };
            });
            this.pIdx = 0;
            this.go('loading');
            let bank = DB[this.currentLang] || DB.de;
            let profile = this.getProfile(this.players[0].name);
            let available = bank.filter(q => !profile.usedIds.includes(q.id));
            if(available.length < 8) { profile.usedIds = []; available = bank; }
            this.activeQs = available.sort(() => 0.5 - Math.random()).slice(0, 10);
            setTimeout(() => this.showVS(), 1200);
        },
        showVS() {
            let p = this.players[this.pIdx];
            let r = this.getRank(p.level);
            document.getElementById('vs-flag').innerText = p.flag;
            document.getElementById('vs-name').innerText = p.name.toUpperCase();
            document.getElementById('vs-info').innerHTML = `<span class="rank-pill ${r.class}">${r.label}</span> <span style="margin-left:12px; color:var(--gold-solid);">🏆 ${p.gold}</span>`;
            this.go('vs');
        },
        startQuiz() { this.qIdx = 0; this.renderQuestion(); this.go('quiz'); },
        renderQuestion() {
            if(this.qIdx >= this.activeQs.length) { this.nextStep(); return; }
            let q = this.activeQs[this.qIdx];
            let p = this.players[this.pIdx];
            document.getElementById('q-round').innerText = `Round ${this.qIdx+1}/10`;
            document.getElementById('q-text').innerText = q.q;
            let ts = Date.now();
            document.getElementById('q-frame').style.backgroundImage = `url('https://source.unsplash.com/900x500/?${q.kw},landscape&t=${ts}')`;
            let box = document.getElementById('q-options'); box.innerHTML = ''; 
            document.getElementById('q-feedback').style.display = 'none'; box.style.display = 'block';
            q.o.forEach((opt, i) => {
                let div = document.createElement('div');
                div.className = 'opt-visual';
                let kwImg = (q.imgKw && q.imgKw[i]) ? q.imgKw[i] : `${opt},world`;
                div.style.backgroundImage = `url('https://source.unsplash.com/500x200/?${kwImg}&t=${ts+i}')`;
                div.innerHTML = `<div class="opt-img-overlay"></div><div class="opt-label">${opt}</div>`;
                div.onclick = () => this.handleAnswer(i, div);
                box.appendChild(div);
            });
            this.startTimer();
        },
        startTimer() { clearInterval(this.timer); this.timeLeft = 12; let bar = document.getElementById('timer-bar'); this.timer = setInterval(() => { this.timeLeft -= 0.1; bar.style.width = Math.max(0, (this.timeLeft/12)*100)+"%"; if(this.timeLeft <= 0) this.handleAnswer(-1); }, 100); },
        handleAnswer(idx, el) {
            clearInterval(this.timer);
            let q = this.activeQs[this.qIdx];
            let p = this.players[this.pIdx];
            let prof = this.getProfile(p.name);
            let opts = document.querySelectorAll('.opt-visual');
            opts.forEach(o => o.style.pointerEvents = 'none');
            if(!prof.usedIds.includes(q.id)) prof.usedIds.push(q.id);
            if(idx === q.c) {
                if(el) el.classList.add('correct');
                p.sessionScore++;
                let gain = Math.max(20, Math.floor(this.timeLeft * 28));
                p.sessionGold += gain; prof.gold += gain; prof.xp += 110;
                prof.level = Math.max(1, Math.floor(Math.sqrt(prof.xp / 360)) + 1);
            } else {
                if(idx !== -1 && el) el.classList.add('wrong');
                opts[q.c]?.classList.add('correct');
            }
            this.save();
            document.getElementById('q-expl').innerHTML = `<span style="color:var(--gold-solid);">📖 ${q.e}</span>`;
            document.getElementById('q-feedback').style.display = 'block';
            document.getElementById('q-options').style.display = 'none';
        },
        nextStep() {
            this.qIdx++;
            if(this.qIdx < 10 && this.qIdx < this.activeQs.length) this.renderQuestion();
            else {
                this.pIdx++;
                if(this.pIdx < this.players.length) this.prepareBattle();
                else this.showResults();
            }
        },
        renderLeaderboard() {
            let sorted = Object.values(this.profiles).sort((a,b)=>b.xp - a.xp);
            document.getElementById('lb-list').innerHTML = sorted.map((p,i)=>`<div class="rank-card"><div style="font-size:2rem;">${p.flag}</div><div><b>${p.name}</b><br>Lv.${p.level}</div><div style="margin-left:auto;color:gold;">💰 ${p.gold}</div></div>`).join('');
        },
        renderAchievements() {
            let sorted = Object.values(this.profiles).sort((a,b)=>b.level - a.level);
            document.getElementById('ach-list').innerHTML = sorted.map(p=>{ let r=this.getRank(p.level); return `<div class="rank-card"><div style="font-size:2rem;">${p.flag}</div><div><b>${p.name}</b><div><span class="rank-pill ${r.class}">${r.label}</span></div></div><div style="margin-left:auto;">LVL ${p.level}</div></div>`; }).join('');
        },
        showResults() {
            this.go('result');
            document.getElementById('res-list').innerHTML = this.players.map(p=>`<div class="rank-card"><div>${p.flag}</div><div><strong>${p.name}</strong><br>Punkte: ${p.sessionScore}/10</div><div style="margin-left:auto;color:gold;">⚡ ${p.sessionGold} Gold</div></div>`).join('');
        }
    };
    App.go('home');
    // permanenter Globus, keine Flaggenrotation
    document.querySelector('.atlas') && (document.querySelector('.atlas').innerText = '🌍');
</script>
