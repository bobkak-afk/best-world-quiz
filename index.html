<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK ULTIMATE · APEX REALM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire: linear-gradient(135deg, #ff5f6d, #ffc371);
            --ice: linear-gradient(135deg, #00d2ff, #3a7bd5);
            --gold: linear-gradient(180deg, #f9d423 0%, #ff4e50 100%);
            --royal-gold: linear-gradient(135deg, #e6b800, #fff380, #b8860b);
            --bg: #030005;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* --- CINEMATIC BACKGROUND --- */
        #ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0a2a 0%, #030005 100%);
        }

        .blob {
            position: absolute; width: 400px; height: 400px;
            background: var(--fire); filter: blur(80px);
            opacity: 0.15; border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* --- APP CONTAINER --- */
        #app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .screen {
            display: none;
            flex: 1;
            padding: 40px 25px;
            flex-direction: column;
            overflow-y: auto;
        }

        .screen.active { display: flex; animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(1.1); filter: brightness(2); }
            to { opacity: 1; transform: scale(1); filter: brightness(1); }
        }

        /* --- LUXURY TYPOGRAPHY --- */
        .apex-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.2rem;
            text-align: center;
            background: var(--royal-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(230, 184, 0, 0.3));
            line-height: 0.9;
            margin-bottom: 10px;
        }

        .hud-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            text-align: center;
        }

        /* --- APEX COMPONENTS --- */
        .neo-card {
            background: var(--glass-strong);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .neo-card::after {
            content: ''; position: absolute; inset: 0; border-radius: 24px;
            padding: 1px; background: linear-gradient(to bottom, var(--border), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
        }

        .btn-apex {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
        }

        .btn-apex:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .btn-apex.gold { background: var(--royal-gold); color: #000; }
        .btn-apex.ghost { background: transparent; color: #fff; border: 1px solid var(--border); }

        /* --- PLAYER HUD --- */
        .player-hud {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .input-hud {
            background: transparent; border: none; color: #fff;
            font-family: 'Inter', sans-serif; font-weight: 700;
            width: 100%; outline: none; font-size: 1.1rem;
        }

        /* --- QUIZ HUD --- */
        .timer-track {
            height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 20px 0; overflow: hidden;
        }

        .timer-fill {
            height: 100%; width: 100%;
            background: var(--fire);
            box-shadow: 0 0 20px #ff5f6d;
            transition: width 1s linear;
        }

        .option-apex {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 22px; border-radius: 18px;
            margin-bottom: 12px; cursor: pointer;
            transition: 0.3s; display: flex;
            align-items: center; justify-content: space-between;
        }

        .option-apex:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .option-apex.correct { background: #1b4d2e; border-color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
        .option-apex.wrong { background: #4d1b1b; border-color: #e74c3c; animation: impact 0.4s; }

        @keyframes impact {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* --- STAT CHIPS --- */
        .chip {
            padding: 5px 12px; border-radius: 100px;
            font-size: 0.7rem; font-weight: 800;
            font-family: 'Syncopate', sans-serif;
            background: rgba(255,255,255,0.1);
        }

        .gold-chip { background: var(--royal-gold); color: #000; }

    </style>
</head>
<body>

    <div id="ambient-bg">
        <div class="blob"></div>
    </div>

    <div id="app">
        <!-- SCREEN 1: WELCOME -->
        <section id="s-home" class="screen active">
            <div style="margin-top: 80px;">
                <p class="hud-label">Ultimate Realm Quiz</p>
                <h1 class="apex-title">MORTAL<br>KOMBAT</h1>
                <div style="height: 2px; width: 50px; background: var(--royal-gold); margin: 20px auto;"></div>
            </div>

            <div style="margin-top: auto; padding-bottom: 50px;">
                <button class="btn-apex gold" onclick="Router.go('setup')">
                    Beginne die Saga <span>⚔️</span>
                </button>
                <button class="btn-apex ghost" style="margin-top: 15px;" onclick="Router.go('scores')">
                    Ruhmeshalle
                </button>
            </div>
        </section>

        <!-- SCREEN 2: SETUP -->
        <section id="s-setup" class="screen">
            <h2 class="apex-title" style="font-size: 1.8rem;">Krieger wählen</h2>
            <div id="player-area" style="margin: 30px 0;">
                <!-- Dynamisch -->
            </div>
            <button class="btn-apex ghost" onclick="Game.addPlayer()">+ Kämpfer hinzufügen</button>
            <div style="margin-top: auto;">
                <button class="btn-apex gold" style="width: 100%;" onclick="Game.init()">Kampf starten</button>
            </div>
        </section>

        <!-- SCREEN 3: VS -->
        <section id="s-vs" class="screen">
            <div style="text-align: center; margin-top: 50px;">
                <div id="p-avatar" style="font-size: 6rem; margin-bottom: 20px; filter: drop-shadow(0 0 30px #ffc371);">🥷</div>
                <h2 id="p-name" class="apex-title" style="font-size: 2.5rem;">PLAYER</h2>
                <div id="p-gold-info" class="chip gold-chip" style="display: inline-block;">100 GOLD</div>
            </div>
            <div style="margin-top: auto; padding-bottom: 40px;">
                <p class="hud-label" style="margin-bottom: 20px;">Bereit für die Prüfung?</p>
                <button class="btn-apex gold" style="width: 100%;" onclick="Game.startQuiz()">FIGHT!</button>
            </div>
        </section>

        <!-- SCREEN 4: QUIZ -->
        <section id="s-quiz" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="q-idx" class="hud-label">Level 01</span>
                <div id="q-gold-hud" class="chip gold-chip">💰 100</div>
            </div>

            <div class="timer-track">
                <div id="timer-bar" class="timer-fill"></div>
            </div>

            <div class="neo-card">
                <h3 id="q-text" style="font-size: 1.4rem; font-weight: 300; line-height: 1.5; text-align: center;">...</h3>
            </div>

            <div id="q-options" style="margin-top: 10px;">
                <!-- Optionen -->
            </div>

            <div id="q-feedback" style="display: none; animation: slideIn 0.3s forwards;">
                <div class="neo-card" style="padding: 20px; background: rgba(255,255,255,0.05);">
                    <p id="q-expl" style="font-size: 0.9rem; opacity: 0.7;"></p>
                    <button class="btn-apex gold" style="width: 100%; margin-top: 15px;" onclick="Game.nextQ()">Nächste Prüfung</button>
                </div>
            </div>
        </section>

        <!-- SCREEN 5: FINISH -->
        <section id="s-result" class="screen">
            <h1 class="apex-title">ERGEBNIS</h1>
            <div id="leaderboard" style="margin-top: 30px;"></div>
            <button class="btn-apex gold" style="width: 100%; margin-top: auto;" onclick="location.reload()">Neustart</button>
        </section>
    </div>

    <script>
        const QUESTIONS = [
            { q: "Welches Land hat die meisten Zeitzonen?", o: ["Russland", "USA", "Frankreich", "China"], c: 2, e: "Wegen seiner Überseegebiete hat Frankreich 12 Zeitzonen." },
            { q: "Wo liegt der tiefste Punkt der Erde?", o: ["Totes Meer", "Marianengraben", "Grand Canyon", "Mount Everest"], c: 1, e: "Der Marianengraben ist über 11.000 Meter tief." },
            { q: "Welches Land schenkte den USA die Freiheitsstatue?", o: ["Deutschland", "Großbritannien", "Frankreich", "Italien"], c: 2, e: "Frankreich schenkte sie 1886 als Symbol der Freiheit." },
            { q: "Was ist das bevölkerungsreichste Land Afrikas?", o: ["Ägypten", "Südafrika", "Nigeria", "Äthiopien"], c: 2, e: "Nigeria hat über 210 Millionen Einwohner." },
            { q: "In welchem Jahr fiel die Berliner Mauer?", o: ["1987", "1989", "1991", "1990"], c: 1, e: "Die Mauer fiel am 9. November 1989." }
        ];

        const Router = {
            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
            }
        };

        const Game = {
            players: [],
            pIdx: 0,
            qIdx: 0,
            gold: 0,
            timer: null,
            timeLeft: 10,
            activeQs: [],

            addPlayer() {
                const area = document.getElementById('player-area');
                const div = document.createElement('div');
                div.className = 'player-hud';
                div.innerHTML = `<span style="margin-right:15px">🥷</span><input type="text" class="input-hud" value="Spieler ${area.children.length + 1}">`;
                area.appendChild(div);
            },

            init() {
                const inps = document.querySelectorAll('.input-hud');
                this.players = Array.from(inps).map(i => ({ name: i.value, score: 0, gold: 100 }));
                this.pIdx = 0;
                this.showVS();
            },

            showVS() {
                const p = this.players[this.pIdx];
                document.getElementById('p-name').innerText = p.name;
                document.getElementById('p-gold-info').innerText = `${p.gold} GOLD`;
                Router.go('vs');
            },

            startQuiz() {
                this.qIdx = 0;
                this.activeQs = [...QUESTIONS].sort(() => Math.random() - 0.5);
                this.renderQ();
                Router.go('quiz');
            },

            renderQ() {
                const q = this.activeQs[this.qIdx];
                document.getElementById('q-idx').innerText = `Level 0${this.qIdx + 1}`;
                document.getElementById('q-text').innerText = q.q;
                document.getElementById('q-gold-hud').innerText = `💰 ${this.players[this.pIdx].gold}`;
                
                const box = document.getElementById('q-options');
                box.innerHTML = '';
                q.o.forEach((opt, i) => {
                    const b = document.createElement('div');
                    b.className = 'option-apex';
                    b.innerHTML = `<span>${opt}</span><span class="chip">${String.fromCharCode(65+i)}</span>`;
                    b.onclick = () => this.check(i);
                    box.appendChild(b);
                });

                document.getElementById('q-feedback').style.display = 'none';
                box.style.display = 'block';
                this.startTimer();
            },

            startTimer() {
                this.timeLeft = 10;
                const bar = document.getElementById('timer-bar');
                clearInterval(this.timer);
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 10 * 100) + "%";
                    if(this.timeLeft <= 0) { clearInterval(this.timer); this.check(-1); }
                }, 100);
            },

            check(idx) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const opts = document.querySelectorAll('.option-apex');
                const feedback = document.getElementById('q-feedback');

                if(idx === q.c) {
                    opts[idx].classList.add('correct');
                    this.players[this.pIdx].score++;
                    this.players[this.pIdx].gold += 50;
                } else {
                    if(idx !== -1) opts[idx].classList.add('wrong');
                    opts[q.c].classList.add('correct');
                }

                document.getElementById('q-expl').innerText = q.e;
                feedback.style.display = 'block';
                document.getElementById('q-options').style.display = 'none';
            },

            nextQ() {
                this.qIdx++;
                if(this.qIdx < this.activeQs.length) {
                    this.renderQ();
                } else {
                    this.pIdx++;
                    if(this.pIdx < this.players.length) this.showVS();
                    else this.showFinal();
                }
            },

            showFinal() {
                Router.go('result');
                const board = document.getElementById('leaderboard');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                board.innerHTML = sorted.map((p, i) => `
                    <div class="neo-card" style="display:flex; justify-content:space-between; align-items:center; border-color:${i===0?'#f9d423':'var(--border)'}">
                        <div><span style="font-family:'Syncopate'">#0${i+1}</span> <br> <b>${p.name}</b></div>
                        <div style="text-align:right">
                            <div style="color:#f9d423; font-weight:800">${p.score} PKT</div>
                            <div style="font-size:0.7rem; opacity:0.5">💰 ${p.gold}</div>
                        </div>
                    </div>
                `).join('');
            }
        };

        // Init
        Game.addPlayer();
        Game.addPlayer();
    </script>
</body>
</html>
