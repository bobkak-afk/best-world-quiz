<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · MASTERY GENESIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #050505;
            --card: rgba(15, 15, 15, 0.98);
            --border: rgba(212, 175, 55, 0.35);
            --red: #ff3c00;
            --blue: #00d4ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
            background-image: radial-gradient(circle at 50% -20%, #2a1b00 0%, #050505 80%);
        }

        #app {
            width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column;
            position: relative; z-index: 10; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);
        }

        .screen { display: none; flex: 1; padding: 25px; flex-direction: column; overflow-y: auto; }
        .screen.active { display: flex; animation: screenIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes screenIn { from { opacity: 0; transform: translateY(20px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        /* --- TITEL & ATLAS --- */
        .title-gold { font-family: 'Cinzel Decorative', serif; font-size: 3rem; text-align: center; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.85; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); }
        .atlas { font-size: 7.5rem; animation: rotateAtlas 15s linear infinite; filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.5)); margin: 20px 0; display: inline-block; }
        @keyframes rotateAtlas { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .sub-title { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: #fff; text-align: center; text-transform: uppercase; margin-top: 25px; font-weight: 700; text-shadow: 0 0 20px rgba(255,255,255,0.8); }

        /* --- BUTTONS --- */
        .btn-luxe { appearance: none; border: none; padding: 18px; border-radius: 14px; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.7rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-bottom: 12px; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn-back { background: transparent; color: rgba(255,255,255,0.6); border: none; font-family: 'Syncopate'; font-size: 0.6rem; cursor: pointer; padding: 10px; text-align: center; font-weight: 700; }

        /* --- ACHIEVEMENT BADGES --- */
        .rank-badge {
            padding: 3px 10px; border-radius: 6px; font-size: 0.6rem; font-family: 'Syncopate'; 
            font-weight: 900; text-transform: uppercase; margin-right: 8px;
        }
        .rank-warrior { background: #666; color: #fff; }
        .rank-master { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        .rank-grandmaster { background: var(--gold-solid); color: #000; box-shadow: 0 0 10px var(--gold-solid); }
        .rank-god { background: var(--red); color: #fff; box-shadow: 0 0 15px var(--red); animation: pulseRed 1.5s infinite alternate; }
        @keyframes pulseRed { from { filter: brightness(1); } to { filter: brightness(1.5); } }

        /* --- VISUAL QUIZ --- */
        .q-card-visual {
            height: 200px; border-radius: 20px; border: 1px solid var(--border);
            background-size: cover; background-position: center; position: relative;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; box-shadow: 0 10px 30px #000;
        }
        .q-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.75); }
        .q-text { position: relative; z-index: 5; text-align: center; font-size: 1.3rem; padding: 20px; text-shadow: 0 2px 8px #000; font-weight: 500; }

        .opt-visual {
            height: 60px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background-size: cover; background-position: center; position: relative;
            overflow: hidden; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center;
        }
        .opt-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); transition: 0.3s; }
        .opt-text { position: relative; z-index: 5; padding-left: 20px; font-weight: 700; font-size: 1rem; text-shadow: 0 2px 4px #000; }
        .opt-visual.correct .opt-overlay { background: rgba(27, 77, 46, 0.85) !important; }
        .opt-visual.wrong .opt-overlay { background: rgba(77, 27, 27, 0.85) !important; }

        /* --- SETUP & CARDS --- */
        .player-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 18px; padding: 15px; display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .flag-plus { width: 42px; height: 42px; background: rgba(0,0,0,0.5); border: 2px dashed var(--gold-solid); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; cursor: pointer; color: var(--gold-solid); }
        .input-luxe { background: transparent; border: none; color: #fff; font-family: 'Outfit', sans-serif; font-size: 1.1rem; width: 100%; margin-left: 12px; outline: none; font-weight: 600; }

        .timer-rail { height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0 20px; overflow: hidden; }
        .timer-fill { height: 100%; width: 100%; background: var(--red); box-shadow: 0 0 15px var(--red); transition: width 0.1s linear; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(15px); }
        .modal-box { background: #111; border: 1px solid var(--gold-solid); padding: 30px; border-radius: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        footer { text-align: center; padding: 20px; font-size: 0.7rem; color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <!-- MODAL -->
    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇩🇪')">🇩🇪</div>
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇷🇺')">🇷🇺</div>
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇬🇧')">🇬🇧</div>
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇳🇬')">🇳🇬</div>
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇹🇷')">🇹🇷</div>
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇫🇷')">🇫🇷</div>
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇺🇦')">🇺🇦</div>
            <div style="font-size:2.5rem; cursor:pointer;" onclick="App.confirmFlag('🇺🇸')">🇺🇸</div>
        </div>
    </div>

    <div id="app">
        <!-- HOME -->
        <section id="s-home" class="screen active">
            <div style="margin-top: 30px; text-align: center;">
                <p style="font-family:'Syncopate'; font-size:0.6rem; letter-spacing:5px; color:#d4af37;">Elite Prestige Realm</p>
                <h1 class="title-gold">MORTAL<br>KOMBAT</h1>
                <div class="atlas">🌍</div>
                <p class="sub-title">Best World Quiz</p>
            </div>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
                <button class="btn-luxe btn-outline" onclick="App.go('achievements')">Erfolge & Ränge ⚔️</button>
                <button class="btn-luxe btn-outline" onclick="App.go('leaderboard')">Bestenliste 🏆</button>
            </div>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>

        <!-- SETUP -->
        <section id="s-setup" class="screen">
            <h2 class="title-gold" style="font-size: 2rem;">Krieger</h2>
            <div class="lang-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px;">
                <div class="lang-chip" id="ln-de" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; cursor:pointer; font-size:0.5rem; text-align:center;" onclick="App.setLang('de')">DE</div>
                <div class="lang-chip" id="ln-ru" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; cursor:pointer; font-size:0.5rem; text-align:center;" onclick="App.setLang('ru')">RU</div>
                <div class="lang-chip" id="ln-en" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; cursor:pointer; font-size:0.5rem; text-align:center;" onclick="App.setLang('en')">EN</div>
                <div class="lang-chip" id="ln-ig" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; cursor:pointer; font-size:0.5rem; text-align:center;" onclick="App.setLang('ig')">IGBO</div>
                <div class="lang-chip" id="ln-tr" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; cursor:pointer; font-size:0.5rem; text-align:center;" onclick="App.setLang('tr')">TR</div>
            </div>
            <div id="player-list"></div>
            <button class="btn-luxe btn-outline" style="font-size:0.6rem;" onclick="App.addPlayerInput()">+ Neuer Kämpfer</button>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.prepareBattle()">Kampf Starten</button>
                <button class="btn-back" onclick="App.go('home')">← Zurück</button>
            </div>
        </section>

        <!-- LOADING -->
        <section id="s-loading" class="screen" style="justify-content:center; align-items:center;">
            <div class="spinner" style="width:60px; height:60px; border:4px solid rgba(212,175,55,0.1); border-top-color:#d4af37; border-radius:50%; animation:spin 1s infinite linear;"></div>
            <p style="font-family:'Syncopate'; font-size:0.6rem; letter-spacing:3px; margin-top:20px;">Lade Mastery-Daten...</p>
        </section>

        <!-- VS -->
        <section id="s-vs" class="screen">
            <div style="text-align: center; margin-top: 60px;">
                <div id="vs-flag" style="font-size: 7rem; margin-bottom: 15px;">🐲</div>
                <h2 id="vs-name" class="title-gold">PLAYER</h2>
                <div id="vs-info" style="margin-top:10px;"></div>
            </div>
            <div style="margin-top: auto; padding-bottom: 40px;">
                <button class="btn-luxe btn-gold" onclick="App.startQuiz()">FIGHT!</button>
                <button class="btn-back" onclick="App.go('setup')">← Team ändern</button>
            </div>
        </section>

        <!-- QUIZ -->
        <section id="s-quiz" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="q-round" style="font-family:'Syncopate'; font-size:0.6rem; color:var(--gold-solid);">Round 1/10</span>
                <span id="q-gold" style="background:var(--gold); color:#000; padding:4px 12px; border-radius:100px; font-size:0.65rem; font-weight:800;">💰 0</span>
            </div>
            <div class="timer-rail"><div id="timer-bar" class="timer-fill"></div></div>
            
            <div id="q-visual" class="q-card-visual">
                <div class="q-overlay"></div>
                <h3 id="q-text" class="q-text">Herausforderung...</h3>
            </div>

            <div id="q-options"></div>

            <div id="q-feedback" style="display:none; margin-top:10px;">
                <div style="background: rgba(10,10,10,0.9); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align:center;">
                    <p id="q-expl" style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px;"></p>
                    <button class="btn-luxe btn-gold" style="margin:0" onclick="App.nextStep()">Nächste Runde</button>
                </div>
            </div>
        </section>

        <!-- ERFOLGE (ACHIEVEMENTS) -->
        <section id="s-achievements" class="screen">
            <h1 class="title-gold" style="font-size:2.2rem; text-align:center;">Meilensteine</h1>
            <div id="ach-list" style="margin-top:30px; flex:1;"></div>
            <button class="btn-luxe btn-gold" onclick="App.go('home')">Hauptmenü</button>
        </section>

        <!-- LEADERBOARD -->
        <section id="s-leaderboard" class="screen">
            <h1 class="title-gold" style="font-size:2.2rem; text-align:center;">Bestenliste</h1>
            <div id="lb-list" style="margin-top:30px; flex:1;"></div>
            <button class="btn-luxe btn-gold" onclick="App.go('home')">Hauptmenü</button>
        </section>

        <!-- RESULT -->
        <section id="s-result" class="screen">
            <h1 class="title-gold" style="font-size: 2.2rem;">ERGEBNIS</h1>
            <div id="res-list" style="margin-top: 30px; flex: 1;"></div>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.prepareBattle()">Neustart</button>
                <button class="btn-luxe btn-outline" onclick="location.reload()">Hauptmenü</button>
            </div>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>
    </div>

    <script>
        /**
         * MK PRESTIGE MASTERY ENGINE
         */
        const DB = {
            de: [
                { id: "de1", q: "Größtes Land der Erde?", o: ["Russland", "Kanada", "China", "USA"], c: 0, e: "Russland umfasst ca. 17 Mio km².", kw: "russia" },
                { id: "de2", q: "Welcher Fluss ist am längsten?", o: ["Nil", "Amazonas", "Donau", "Rhein"], c: 0, e: "Der Nil gilt als längster Fluss.", kw: "nile" },
                { id: "de3", q: "Hauptstadt von Frankreich?", o: ["Paris", "Lyon", "Marseille", "Nizza"], c: 0, e: "Paris ist die Weltstadt der Mode.", kw: "paris" },
                { id: "de4", q: "Größter Ozean?", o: ["Pazifik", "Atlantik", "Indik", "Arktik"], c: 0, e: "Der Pazifik deckt 35% der Erde.", kw: "pacific" },
                { id: "de5", q: "Wo stehen die Pyramiden?", o: ["Ägypten", "Mexiko", "Irak", "China"], c: 0, e: "Die Gizeh-Pyramiden sind Weltwunder.", kw: "pyramids" }
            ],
            ru: [{ id: "ru1", q: "Столица России?", o: ["Москва", "Питер", "Киев", "Минск"], c: 0, e: "Москва — столица.", kw: "moscow" }],
            en: [{ id: "en1", q: "Capital of USA?", o: ["Washington D.C.", "New York", "LA", "Miami"], c: 0, e: "Washington D.C. is the capital.", kw: "washington" }],
            ig: [{ id: "ig1", q: "Isi obodo Nigeria?", o: ["Abuja", "Lagos", "Enugu", "Kano"], c: 0, e: "Abuja bụ isi obodo.", kw: "nigeria" }],
            tr: [{ id: "tr1", q: "Türkiye'nin başkenti?", o: ["Ankara", "İstanbul", "İzmir", "Bursa"], c: 0, e: "Ankara başkenttir.", kw: "ankara" }]
        };

        const App = {
            profiles: JSON.parse(localStorage.getItem('mk_mastery_v1')) || {},
            players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, currentLang: 'de', activeFlagIdx: null, activeQs: [],

            save() { localStorage.setItem('mk_mastery_v1', JSON.stringify(this.profiles)); },

            getProfile(name) {
                const k = name.trim().toLowerCase();
                if(!this.profiles[k]) this.profiles[k] = { name: name.trim(), xp: 0, gold: 0, level: 1, flag: '🐲', usedIds: [] };
                return this.profiles[k];
            },

            getRankInfo(lvl) {
                if(lvl >= 50) return { class: 'rank-god', label: 'Elder God' };
                if(lvl >= 25) return { class: 'rank-grandmaster', label: 'Grandmaster' };
                if(lvl >= 10) return { class: 'rank-master', label: 'Master' };
                return { class: 'rank-warrior', label: 'Warrior' };
            },

            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
                if(id === 'setup' && document.getElementById('player-list').children.length === 0) this.addPlayerInput();
                if(id === 'leaderboard') this.renderLeaderboard();
                if(id === 'achievements') this.renderAchievements();
                window.scrollTo(0,0);
            },

            setLang(l) {
                this.currentLang = l;
                document.querySelectorAll('.lang-chip').forEach(c => c.style.background = 'rgba(255,255,255,0.05)');
                document.getElementById('ln-' + l).style.background = 'var(--gold-solid)';
                document.getElementById('ln-' + l).style.color = '#000';
            },

            addPlayerInput() {
                const cont = document.getElementById('player-list');
                const id = Date.now() + Math.random();
                const d = document.createElement('div');
                d.className = 'player-card'; d.id = 'pc-' + id;
                d.innerHTML = `
                    <div class="flag-plus" onclick="App.openFlag('${id}')">+</div>
                    <input type="text" class="input-luxe" placeholder="Name...">
                    <button onclick="document.getElementById('pc-${id}').remove()" style="background:none; border:none; color:#ff4d4d; font-size:1.2rem; cursor:pointer;">🗑️</button>
                `;
                cont.appendChild(d);
            },

            openFlag(id) { this.activeFlagIdx = id; document.getElementById('modal').style.display = 'flex'; },
            confirmFlag(f) { 
                const card = document.getElementById('pc-' + this.activeFlagIdx);
                card.querySelector('.flag-plus').innerText = f; card.querySelector('.flag-plus').style.borderStyle = 'solid';
                document.getElementById('modal').style.display = 'none';
            },

            async prepareBattle() {
                const cards = document.querySelectorAll('.player-card');
                this.players = Array.from(cards).map(c => {
                    const name = c.querySelector('input').value || "Warrior";
                    const flag = c.querySelector('.flag-plus').innerText === '+' ? '🐲' : c.querySelector('.flag-plus').innerText;
                    const p = this.getProfile(name); p.flag = flag;
                    return { ...p, sessionScore: 0, sessionGold: 0 };
                });
                if(this.players.length === 0) return;
                this.pIdx = 0; this.go('loading');
                this.activeQs = await this.fetchQuestions(10);
                setTimeout(() => this.showVS(), 1200);
            },

            async fetchQuestions(amount) {
                const p = this.getProfile(this.players[this.pIdx].name);
                const bank = DB[this.currentLang] || DB.de;
                let available = bank.filter(q => !p.usedIds.includes(q.id));
                if(available.length < amount) { p.usedIds = []; available = bank; }
                return available.sort(() => 0.5 - Math.random()).slice(0, amount);
            },

            showVS() {
                const p = this.players[this.pIdx];
                const r = this.getRankInfo(p.level);
                document.getElementById('vs-flag').innerText = p.flag;
                document.getElementById('vs-name').innerText = p.name.toUpperCase();
                document.getElementById('vs-info').innerHTML = `<span class="rank-badge ${r.class}">${r.label}</span> <span style="font-size:0.8rem;">GOLD: ${p.gold}</span>`;
                this.go('vs');
            },

            startQuiz() { this.qIdx = 0; this.renderQuestion(); this.go('quiz'); },

            renderQuestion() {
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                document.getElementById('q-round').innerText = `Round ${this.qIdx + 1}/10`;
                document.getElementById('q-gold').innerText = `💰 ${p.sessionGold}`;
                document.getElementById('q-text').innerText = q.q;

                document.getElementById('q-visual').style.backgroundImage = `url('https://source.unsplash.com/800x450/?${q.kw},landscape')`;
                const box = document.getElementById('q-options'); box.innerHTML = '';
                document.getElementById('q-feedback').style.display = 'none'; box.style.display = 'block';

                q.o.forEach((opt, i) => {
                    const b = document.createElement('div');
                    b.className = 'opt-visual';
                    b.style.backgroundImage = `url('https://source.unsplash.com/400x150/?texture,dark,${i}')`;
                    b.innerHTML = `<div class="opt-overlay"></div><div class="opt-text">${opt}</div>`;
                    b.onclick = () => this.handleAnswer(i, b);
                    box.appendChild(b);
                });
                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timer); this.timeLeft = 12;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 12 * 100) + "%";
                    if(this.timeLeft <= 0) this.handleAnswer(-1);
                }, 100);
            },

            handleAnswer(idx, b) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                const prof = this.getProfile(p.name);
                const opts = document.querySelectorAll('.opt-visual');
                opts.forEach(o => o.style.pointerEvents = 'none');
                prof.usedIds.push(q.id);

                if(idx === q.c) {
                    if(b) b.classList.add('correct');
                    p.sessionScore++;
                    const gain = Math.round(this.timeLeft * 30);
                    p.sessionGold += gain; prof.gold += gain; prof.xp += 100;
                    prof.level = Math.floor(Math.sqrt(prof.xp / 300)) + 1;
                } else {
                    if(idx !== -1 && b) b.classList.add('wrong');
                    opts[q.c].classList.add('correct');
                }
                this.save();
                document.getElementById('q-expl').innerText = q.e;
                document.getElementById('q-feedback').style.display = 'block';
                document.getElementById('q-options').style.display = 'none';
            },

            nextStep() {
                this.qIdx++;
                if(this.qIdx < 10) this.renderQuestion();
                else { this.pIdx++; if(this.pIdx < this.players.length) this.prepareBattle(); else this.showResults(); }
            },

            renderLeaderboard() {
                const list = document.getElementById('lb-list');
                const sorted = Object.values(this.profiles).sort((a,b) => b.xp - a.xp);
                list.innerHTML = sorted.map((p, i) => {
                    const r = this.getRankInfo(p.level);
                    return `
                    <div style="background:rgba(20,20,20,0.9); border:1px solid var(--border); border-radius:15px; display:flex; justify-content:space-between; align-items:center; padding:15px; margin-bottom:10px; border-color:${i<3?'var(--gold-solid)':'rgba(255,255,255,0.1)'}">
                        <div><span style="font-size:1.2rem; margin-right:10px;">${p.flag}</span><b>${p.name}</b><br><span class="rank-badge ${r.class}" style="margin-top:5px; display:inline-block">${r.label}</span></div>
                        <div style="text-align:right">LVL ${p.level}<br><span style="color:var(--gold-solid); font-size:0.8rem;">${p.gold} 💰</span></div>
                    </div>`;
                }).join('');
            },

            renderAchievements() {
                const list = document.getElementById('ach-list');
                const sorted = Object.values(this.profiles).sort((a,b) => b.level - a.level);
                list.innerHTML = sorted.map(p => {
                    const r = this.getRankInfo(p.level);
                    return `
                    <div style="background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:15px; padding:15px; margin-bottom:12px; display:flex; align-items:center; gap:15px;">
                        <div style="font-size:1.5rem">${p.flag}</div>
                        <div style="flex:1">
                            <b style="font-size:1.1rem">${p.name}</b><br>
                            <span class="rank-badge ${r.class}">${r.label}</span>
                        </div>
                        <div style="text-align:right; font-weight:700; color:var(--gold-solid)">Level ${p.level}</div>
                    </div>`;
                }).join('') || '<p style="text-align:center; opacity:0.5">Noch keine Helden registriert.</p>';
            },

            showResults() {
                this.go('result');
                const list = document.getElementById('res-list');
                list.innerHTML = this.players.map(p => `
                    <div style="background:rgba(20,20,20,0.9); border:1px solid var(--border); border-radius:15px; display:flex; justify-content:space-between; align-items:center; padding:20px; margin-bottom:10px;">
                        <div><span>${p.flag}</span> <b style="margin-left:10px">${p.name}</b></div>
                        <div style="text-align:right"><div style="color:var(--gold-solid); font-weight:900;">${p.sessionScore}/10 PKT</div></div>
                    </div>`).join('');
            }
        };

        App.go('home'); App.setLang('de');
    </script>
</body>
</html>
