  z-index: -2;
  background: radial-gradient(ellipse 80% 50% at 30% 40%, #1a0410, #020005);
}
.legend-bg::before {
  content: '';

  width: 200%;
  height: 200%;
  top: -50%;

@keyframes pulseGlow {
  0% { opacity: 0.3; transform: scale(1); }
  100% { opacity: 0.8; transform: scale(1.1); }
}
.fire-particles {

  z-index: -1;

.particle {

  background: radial-gradient(circle, #ff8840, #ff2200);

  opacity: 0.6;
}
@keyframes rise {
  0% { transform: translateY(100vh) scale(0.2); opacity: 0; }

/* responsive */
@media (max-width: 550px) {

</style>

<script>
  // -------------------- LEGENDARY QUIZ ENGINE --------------------
  (function(){
    // ======================= DATA =======================
    const COUNTRIES = [
      {id:'de', flag:'🇩🇪', name:'Deutschland', lang:'Deutsch', color:'#F5C518'},
      {id:'ru', flag:'🇷🇺', name:'Россия', lang:'Русский', color:'#e03030'},
      {id:'ua', flag:'🇺🇦', name:'Україна', lang:'Українська', color:'#4090F0'},
      {id:'tr', flag:'🇹🇷', name:'Türkiye', lang:'Türkçe', color:'#EF4444'},
      {id:'fr', flag:'🇫🇷', name:'France', lang:'Français', color:'#9090f8'}
    ];
    const CATEGORIES = [
      {id:'h', e:'🏛️', l:'Geschichte'},{id:'g', e:'🌍', l:'Geografie'},{id:'c', e:'🎭', l:'Kultur'},
      {id:'f', e:'🍽️', l:'Essen'},{id:'s', e:'⚽', l:'Sport'},{id:'l', e:'💬', l:'Sprache'}
    ];
    const LEVELS = [
      {v:1,n:'Neuling',x:0},{v:2,n:'Lehrling',x:80},{v:3,n:'Kämpfer',x:200},{v:4,n:'Krieger',x:400},
      {v:5,n:'Meister',x:700},{v:6,n:'Champion',x:1100},{v:7,n:'Legende',x:1600},{v:8,n:'Held',x:2200},
      {v:9,n:'Gott',x:3000},{v:10,n:'Weltmeister',x:4000}
    ];
    function getLevel(xp){ let l=LEVELS[0]; LEVELS.forEach(lev=>{if(xp>=lev.x) l=lev;}); return l; }
    function xpGain(secLeft){ return 10 + Math.floor(secLeft/5)*2; }
    function goldGain(){ return 10 + Math.floor(Math.random() * 16); }
    const Q_COUNT = 10, TIMER_SEC = 25;
    // Expanded question DB (legendary)
    const QUESTION_POOL = {
      de: [
        {q:"Wer malte die Mona Lisa?", o:["Van Gogh","Da Vinci","Picasso","Rembrandt"], c:1, e:"Leonardo da Vinci", d:"medium"},
        {q:"Welches Tier ist das Symbol Deutschlands?", o:["Löwe","Adler","Bär","Drache"], c:1, e:"Der Bundesadler", d:"easy"},
        {q:"Was ist die Hauptstadt von Frankreich?", o:["Lyon","Marseille","Paris","Bordeaux"], c:2, e:"Paris, die Stadt der Liebe", d:"easy"},
        {q:"Welcher Fluss fließt durch Paris?", o:["Loire","Rhône","Seine","Garonne"], c:2, e:"Die Seine", d:"medium"},
        {q:"Wofür ist die Türkei berühmt?", o:["Baklava","Pasta","Sushi","Paella"], c:0, e:"Baklava & Kebab", d:"easy"},
        {q:"Wer schrieb 'Krieg und Frieden'?", o:["Dostojewski","Tolstoi","Puschkin","Gogol"], c:1, e:"Leo Tolstoi", d:"hard"},
        {q:"Welche Währung nutzt die Ukraine?", o:["Rubel","Hrywnja","Złoty","Euro"], c:1, e:"Hrywnja (UAH)", d:"medium"},
        {q:"Was ist der höchste Berg Russlands?", o:["Elbrus","Kazbek","Belucha","Mont Blanc"], c:0, e:"Elbrus (5.642 m)", d:"hard"}
      ].concat(Array.from({length:12},(_,i)=>({q:`Frage ${i+9} über Kultur`, o:["Option A","B","C","D"], c:i%4, e:"Erklärung", d:"medium"}))),
      ru: [{q:"Столица Германии?", o:["Мюнхен","Берлин","Гамбург","Кёльн"], c:1, e:"Берлин", d:"easy"}],
      ua: [{q:"Столиця України?", o:["Львів","Київ","Одеса","Харків"], c:1, e:"Київ", d:"easy"}],
      tr: [{q:"Türkiye'nin başkenti?", o:["İstanbul","Ankara","İzmir","Bursa"], c:1, e:"Ankara", d:"easy"}],
      fr: [{q:"Capitale de l'Allemagne?", o:["Munich","Berlin","Hambourg","Francfort"], c:1, e:"Berlin", d:"easy"}]
    };
    for(let lang of Object.keys(QUESTION_POOL)){
      let base = QUESTION_POOL[lang];
      while(base.length<20) base.push({q:`${lang.toUpperCase()} Frage`, o:["A","B","C","D"], c:0, e:"Beispiel", d:"medium"});
    }

    // ========== STORAGE ==========
    function loadProfiles(){ return JSON.parse(localStorage.getItem('mk_legends')||'{}'); }
    function saveProfiles(p){ localStorage.setItem('mk_legends',JSON.stringify(p)); }
    function getProfile(name){
      let p=loadProfiles(), k=name.trim().toLowerCase();
      return p[k] || { name:name.trim(), xp:0, gold:50, games:0, correct:0, usedQ:{}, daily:0, dailyDate:'', dailyBonus:false };
    }
    function updateProfile(name, addXP, addGold, addCorrect){
      let pf=getProfile(name);
      pf.xp+=addXP; pf.gold+=addGold; pf.games++; pf.correct+=addCorrect;
      let today=new Date().toDateString();
      if(pf.dailyDate!==today){ pf.daily=0; pf.dailyDate=today; pf.dailyBonus=false; }
      pf.daily+=addCorrect;
      if(pf.daily>=5 && !pf.dailyBonus){
        pf.gold+=50; pf.xp+=50; pf.dailyBonus=true;
        showLegendPopup("⭐ TAGES-CHALLENGE GESCHAFFT! +50💰 +50 XP");
      }
      saveProfiles(pf);
      return pf;
    }
    function spendGold(name, amt){
      let pf=getProfile(name);
      if(pf.gold>=amt){ pf.gold-=amt; saveProfiles(pf); return true; }
      return false;
    }
    function getUnusedIndices(name, cid, difficulty){
      let pf=getProfile(name);
      let used=pf.usedQ[cid]||[];
      let pool=QUESTION_POOL[cid]||QUESTION_POOL.de;
      let avail=pool.map((_,i)=>i).filter(i=>!used.includes(i));
      if(avail.length<Q_COUNT){ pf.usedQ[cid]=[]; saveProfiles(pf); return pool.map((_,i)=>i); }
      return avail;
    }
    function markUsed(name,cid,indices){
      let pf=getProfile(name);
      if(!pf.usedQ[cid]) pf.usedQ[cid]=[];
      indices.forEach(i=>{if(!pf.usedQ[cid].includes(i)) pf.usedQ[cid].push(i);});
      saveProfiles(pf);
    }
    function getDifficultyFromXP(xp){ if(xp<100) return 'easy'; if(xp<400) return 'medium'; return 'hard'; }

    // ========== GLOBAL STATE ==========
    let state = {
      playerCount:2, teamMode:0, players:[
        {id:0,name:'',cid:'de',team:0},{id:1,name:'',cid:'ru',team:1},{id:2,name:'',cid:'ua',team:0},
        {id:3,name:'',cid:'fr',team:1},{id:4,name:'',cid:'de',team:0}
      ],
      categories: ['h','g','c','f'],
      questionsMap:{}, scores:{}, sessionXP:{}, sessionGold:{},
      curPlayer:0, curQ:0, timer:null, timeLeft:TIMER_SEC, locked:false,
      powerMulti:1, secondChance:false
    };
    function activePlayers(){ return state.players.slice(0,state.playerCount); }

    // ========== UI HELPERS ==========
    function escapeHtml(s){ return (s||'').replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';return'&gt;';}).replace(/"/g,'&quot;'); }
    function showLegendPopup(msg){ let el=document.createElement('div'); el.className='xpop'; el.innerText=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),1200); }
    function clearTimer(){ if(state.timer){ clearInterval(state.timer); state.timer=null; } }
    
    // POWERUPS
    const POWERUPS = {
      timefreeze:{name:"⏰ Zeit-Stopp",cost:20, exec:()=>{ state.timeLeft+=5; if(state.timeLeft>TIMER_SEC) state.timeLeft=TIMER_SEC; updateTimerUI(); return true; }},
      doublexp:{name:"💀 Doppel-XP",cost:25, exec:()=>{ state.powerMulti=2; return true; }},
      hint:{name:"🔍 Hinweis",cost:15, exec:()=>{ let q=state.questionsMap[activePlayers()[state.curPlayer].id][state.curQ]; let wrong=[0,1,2,3].filter(i=>i!==q.c); let rand=wrong[Math.floor(Math.random()*wrong.length)]; let btn=document.getElementById(`ans_${rand}`); if(btn){ btn.style.opacity='0.5'; btn.style.borderColor='#ffaa66'; setTimeout(()=>{if(btn) btn.style.opacity='';},1500); } return true; }},
      secondchance:{name:"🔄 Zweite Chance",cost:30, exec:()=>{ state.secondChance=true; return true; }}
    };
    function usePowerup(pId){
      let player=activePlayers()[state.curPlayer];
      let pf=getProfile(player.name);
      if(pf.gold>=POWERUPS[pId].cost){
        spendGold(player.name,POWERUPS[pId].cost);
        POWERUPS[pId].exec();
        showLegendPopup(`${POWERUPS[pId].name} aktiviert!`);
        renderPowerupBar();
      } else showLegendPopup("⚠️ Nicht genug Gold!");
    }
    function renderPowerupBar(){
      let p=activePlayers()[state.curPlayer];
      let gold=getProfile(p.name).gold;
      document.getElementById('goldDisplay').innerHTML=`💰 ${gold}`;
      let bar=document.getElementById('powerupZone');
      bar.innerHTML=Object.entries(POWERUPS).map(([id,pup])=>`<button class="powerup-btn" onclick="App.usePowerup('${id}')">${pup.name} ${pup.cost}💰</button>`).join('');
    }
    
    // Setup UI
    function renderPlayerCountGrid(){
      let html=''; for(let i=1;i<=5;i++) html+=`<button class="pcb ${state.playerCount===i?'on':''}" data-pc="${i}">${i}</button>`;
      document.getElementById('playerCountGrid').innerHTML=html;
      document.querySelectorAll('[data-pc]').forEach(btn=>btn.onclick=()=>{ state.playerCount=parseInt(btn.dataset.pc); renderPlayerCountGrid(); });
    }
    function renderPlayerList(){
      let act=activePlayers();
      document.getElementById('playerList').innerHTML=act.map((p,i)=>{
        let c=COUNTRIES.find(cc=>cc.id===p.cid);
        let prof=p.name?getProfile(p.name):null;
        let lvl=prof?getLevel(prof.xp):null;
        let flagBtns=COUNTRIES.map(ct=>`<button class="fb ${p.cid===ct.id?'sel':''}" onclick="App.setCountry(${p.id},'${ct.id}')">${ct.flag}</button>`).join('');
        return `<div class="prow"><div style="display:flex;gap:12px;"><div class="pnum">${i+1}</div><div style="flex:1"><input class="pinp" placeholder="Name" value="${escapeHtml(p.name)}" oninput="App.setName(${p.id},this.value)">${lvl?`<div class="ptag">⚔️ Lvl ${lvl.v} · 💰${prof.gold}</div>`:''}<div class="frow">${flagBtns}</div><div class="plang">${c.flag} ${c.lang}</div></div></div></div>`;
      }).join('');
    }
    function renderCats(){
      document.getElementById('catList').innerHTML=CATEGORIES.map(c=>`<button class="catb ${state.categories.includes(c.id)?'on':''}" onclick="App.toggleCat('${c.id}')">${c.e} ${c.l}</button>`).join('');
    }
    
    // Game flow
    function startGame(){
      let act=activePlayers();
      if(act.some(p=>!p.name.trim())){ alert("Bitte Namen eingeben!"); return; }
      App.showScreen('loading');
      state.scores={}; state.sessionXP={}; state.sessionGold={};
      act.forEach(p=>{ state.scores[p.id]=0; state.sessionXP[p.id]=0; state.sessionGold[p.id]=0; });
      document.getElementById('loadingRows').innerHTML=act.map(p=>`<div class="lrow" id="load_${p.id}">${COUNTRIES.find(c=>c.id===p.cid).flag} ${escapeHtml(p.name)} <span>⚙️</span></div>`).join('');
      setTimeout(()=>{
        act.forEach(p=>{
          let diff=getDifficultyFromXP(getProfile(p.name).xp);
          let unused=getUnusedIndices(p.name,p.cid,diff);
          let shuffled=[...unused].sort(()=>Math.random()-0.5);
          let chosen=shuffled.slice(0,Q_COUNT);
          markUsed(p.name,p.cid,chosen);
          let pool=QUESTION_POOL[p.cid]||QUESTION_POOL.de;
          state.questionsMap[p.id]=chosen.map(i=>({...pool[i]}));
          let row=document.getElementById(`load_${p.id}`);
          if(row){ row.classList.add('done'); row.innerHTML=`${COUNTRIES.find(c=>c.id===p.cid).flag} ${escapeHtml(p.name)} <span>✓</span>`; }
        });
        setTimeout(()=>{ state.curPlayer=0; state.curQ=0; showTurn(); },700);
      },800);
    }
    function showTurn(){
      let p=activePlayers()[state.curPlayer];
      let c=COUNTRIES.find(cc=>cc.id===p.cid);
      document.getElementById('turnFlag').innerHTML=c.flag;
      let tn=document.getElementById('turnName'); tn.innerHTML=escapeHtml(p.name); tn.style.color=c.color;
      let prof=getProfile(p.name);
      let lvl=getLevel(prof.xp);
      let nxt=LEVELS.find(l=>l.x>prof.xp);
      let percent=nxt?Math.floor((prof.xp-lvl.x)/(nxt.x-lvl.x)*100):100;
      document.getElementById('turnStats').innerHTML=`<div class="lvlbadge">⚔️ Lvl ${lvl.v} ${lvl.n}</div><div class="xpbar"><div class="xpfill" style="width:${percent}%"></div></div><div>💰 ${prof.gold} Gold · ${prof.xp} XP</div>`;
      document.getElementById('turnDesc').innerHTML=`${Q_COUNT} Fragen · ${c.lang} · Schwierigkeit: ${getDifficultyFromXP(prof.xp)}`;
      App.showScreen('turn');
    }
    function startQuiz(){
      clearTimer(); state.locked=false; state.powerMulti=1; state.secondChance=false;
      App.showScreen('quiz');
      renderPowerupBar();
      renderQuiz();
    }
    function renderQuiz(){
      let p=activePlayers()[state.curPlayer];
      let c=COUNTRIES.find(cc=>cc.id===p.cid);
      let q=state.questionsMap[p.id][state.curQ];
      // score bar
      let sbar='';
      activePlayers().forEach((pp,i)=>{
        let cc=COUNTRIES.find(x=>x.id===pp.cid);
        let activeCls=(i===state.curPlayer)?'act':'';
        sbar+=`<div class="schip ${activeCls}" style="${i===state.curPlayer?`border-color:${cc.color}`:''}">${cc.flag}<span class="schip-score">${i<=state.curPlayer?state.scores[pp.id]||0:'—'}</span></div>`;
      });
      document.getElementById('scoreBar').innerHTML=sbar;
      document.getElementById('qCounter').innerHTML=`${c.flag} ${state.curQ+1}/${Q_COUNT}`;
      document.getElementById('questionText').innerHTML=q.q;
      document.getElementById('answers').innerHTML=q.o.map((opt,i)=>`<button class="obt" id="ans_${i}" onclick="App.answer(${i})"><span class="okey">${String.fromCharCode(65+i)}</span><span>${escapeHtml(opt)}</span></button>`).join('');
      document.getElementById('explanation').classList.add('h');
      document.getElementById('nextBtn').classList.add('h');
      startTimer(c.color);
    }
    function startTimer(col){
      clearTimer(); state.timeLeft=TIMER_SEC; updateTimerUI();
      state.timer=setInterval(()=>{ state.timeLeft--; updateTimerUI(); if(state.timeLeft<=0){ clearTimer(); timeOut(); } },1000);
    }
    function updateTimerUI(){
      let percent=(state.timeLeft/TIMER_SEC)*100;
      let fill=document.getElementById('timerFill'); fill.style.width=percent+'%';
      let color=state.timeLeft<=5?'#ff5555':state.timeLeft<=10?'#ffaa44':'#ff6644';
      fill.style.background=color; fill.style.boxShadow=`0 0 10px ${color}`;
      document.getElementById('timerNum').innerHTML=state.timeLeft+'s';
    }
    function answer(idx){
      if(state.locked) return;
      let p=activePlayers()[state.curPlayer];
      let q=state.questionsMap[p.id][state.curQ];
      let correct=(idx===q.c);
      if(!correct && state.secondChance){ state.secondChance=false; state.locked=false; showLegendPopup("🔄 Zweite Chance!"); return; }
      state.locked=true;
      clearTimer();
      if(correct){
        let gainXP=xpGain(state.timeLeft)*state.powerMulti;
        let gainGold=goldGain();
        state.scores[p.id]++;
        state.sessionXP[p.id]=(state.sessionXP[p.id]||0)+gainXP;
        state.sessionGold[p.id]=(state.sessionGold[p.id]||0)+gainGold;
        showLegendPopup(`+${gainXP} XP  +${gainGold}💰`);
      }
      for(let i=0;i<4;i++){
        let btn=document.getElementById(`ans_${i}`);
        if(i===q.c) btn.classList.add('cor');
        else if(i===idx && !correct) btn.classList.add('wrg');
        btn.disabled=true;
      }
      let expDiv=document.getElementById('explanation');
      expDiv.className=`expl ${correct?'c':'w'}`;
      expDiv.innerText=(correct?'✓ ':'✗ ')+q.e;
      document.getElementById('nextBtn').classList.remove('h');
      let isLastQ=(state.curQ+1>=state.questionsMap[p.id].length);
      let isLastPlayer=(state.curPlayer+1>=activePlayers().length);
      document.getElementById('nextBtn').innerText=isLastQ?(isLastPlayer?'🏆 ERGEBNIS →':'NÄCHSTER SPIELER →'):'WEITER →';
    }
    function timeOut(){
      if(state.locked) return;
      state.locked=true;
      let p=activePlayers()[state.curPlayer];
      let q=state.questionsMap[p.id][state.curQ];
      document.getElementById(`ans_${q.c}`).classList.add('cor');
      for(let i=0;i<4;i++) document.getElementById(`ans_${i}`).disabled=true;
      let expDiv=document.getElementById('explanation');
      expDiv.className='expl t';
      expDiv.innerText=`⏰ Zeit abgelaufen! Antwort: ${q.o[q.c]}`;
      document.getElementById('nextBtn').classList.remove('h');
      let isLastQ=(state.curQ+1>=state.questionsMap[p.id].length);
      let isLastPlayer=(state.curPlayer+1>=activePlayers().length);
      document.getElementById('nextBtn').innerText=isLastQ?(isLastPlayer?'🏆 ERGEBNIS →':'NÄCHSTER SPIELER →'):'WEITER →';
    }
    function nextQuestion(){
      let act=activePlayers();
      let p=act[state.curPlayer];
      if(state.curQ+1>=state.questionsMap[p.id].length){
        if(state.curPlayer+1>=act.length){
          finishGame();
        } else {
          state.curPlayer++; state.curQ=0;
          showTurn();
        }
      } else {
        state.curQ++; state.locked=false;
        renderQuiz();
        renderPowerupBar();
      }
    }
    function finishGame(){
      let act=activePlayers();
      act.forEach(p=>{
        let xp=state.sessionXP[p.id]||0;
        let gold=state.sessionGold[p.id]||0;
        let corr=state.scores[p.id]||0;
        updateProfile(p.name,xp,gold,corr);
      });
      let sorted=[...act].sort((a,b)=>(state.scores[b.id]||0)-(state.scores[a.id]||0));
      let podiumHtml=sorted.map((p,i)=>{
        let c=COUNTRIES.find(cc=>cc.id===p.cid);
        let prof=getProfile(p.name);
        let lvl=getLevel(prof.xp);
        let medal=['🥇','🥈','🥉','🏅','5️⃣'][i]||`${i+1}.`;
        return `<div class="podrow ${i===0?'p1':''}"><span style="font-size:1.5rem;">${medal}</span><span>${c.flag}</span><div><b>${escapeHtml(p.name)}</b><div class="lvlbadge">Lvl ${lvl.v} · 💰${prof.gold}</div></div><div style="text-align:right">${state.scores[p.id]}/${Q_COUNT}<br>+${state.sessionXP[p.id]||0} XP</div></div>`;
      }).join('');
      let top=sorted[0];
      let msg=(sorted.filter(p=>state.scores[p.id]===state.scores[top.id]).length>1)?'🤝 UNENTSCHIEDEN!':'🏆 '+COUNTRIES.find(c=>c.id===top.cid).flag+' '+escapeHtml(top.name)+' SIEGT!';
      document.getElementById('podium').innerHTML=podiumHtml;
      document.getElementById('winnerMsg').innerHTML=msg;
      App.showScreen('result');
    }
    
    // Profile & HS
    function renderProfiles(){
      let profs=loadProfiles();
      let entries=Object.values(profs).sort((a,b)=>b.xp-a.xp);
      if(!entries.length){ document.getElementById('profileList').innerHTML='<div style="text-align:center;">Keine Helden gefunden</div>'; return; }
      document.getElementById('profileList').innerHTML=entries.map(p=>{
        let lvl=getLevel(p.xp);
        let next=LEVELS.find(l=>l.x>p.xp);
        let perc=next?Math.floor((p.xp-lvl.x)/(next.x-lvl.x)*100):100;
        return `<div class="profrow"><div><b>${escapeHtml(p.name)}</b> · Lvl ${lvl.v} ${lvl.n}</div><div class="xpbar"><div class="xpfill" style="width:${perc}%"></div></div><div>💰 ${p.gold} Gold · ${p.xp} XP · ${p.games} Kämpfe · ${p.correct} Treffer</div></div>`;
      }).join('');
    }
    
    // ========== PUBLIC API ==========
    window.App = {
      goHome:()=>App.showScreen('home'),
      startSetup:()=>{ state.playerCount=2; state.teamMode=0; state.players=state.players.map((p,i)=>({...p,name:'',cid:['de','ru','ua','fr','de'][i]})); renderPlayerCountGrid(); document.getElementById('setupStep1').style.display='block'; document.getElementById('setupStep2').style.display='none'; document.getElementById('setupStep3').style.display='none'; document.querySelectorAll('[data-team]').forEach((btn,i)=>{btn.onclick=()=>{ state.teamMode=i; document.querySelectorAll('[data-team]').forEach(b=>b.classList.remove('active')); btn.classList.add('active');};}); App.showScreen('setup'); },
      nextSetup:()=>{ if(document.getElementById('setupStep1').style.display!=='none'){ document.getElementById('setupStep1').style.display='none'; document.getElementById('setupStep2').style.display='block'; renderPlayerList(); } else if(document.getElementById('setupStep2').style.display!=='none'){ document.getElementById('setupStep2').style.display='none'; document.getElementById('setupStep3').style.display='block'; renderCats(); } },
      prevSetup:()=>{ if(document.getElementById('setupStep3').style.display!=='none'){ document.getElementById('setupStep3').style.display='none'; document.getElementById('setupStep2').style.display='block'; } else if(document.getElementById('setupStep2').style.display!=='none'){ document.getElementById('setupStep2').style.display='none'; document.getElementById('setupStep1').style.display='block'; } },
      setName:(id,val)=>{ state.players[id].name=val; },
      setCountry:(id,cid)=>{ state.players[id].cid=cid; renderPlayerList(); },
      toggleCat:(id)=>{ if(state.categories.includes(id)){ if(state.categories.length>1) state.categories=state.categories.filter(c=>c!==id); } else state.categories.push(id); renderCats(); },
      startGame:startGame,
      startQuiz:startQuiz,
      answer:answer,
      nextQuestion:nextQuestion,
      usePowerup:usePowerup,
      showScreen:(id)=>{ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(`s-${id}`).classList.add('active'); if(id==='profiles') renderProfiles(); },
      showProfiles:()=>{ renderProfiles(); App.showScreen('profiles'); }
    };
    // particles
    for(let i=0;i<45;i++){ let p=document.createElement('div'); p.className='particle'; let size=3+Math.random()*10; p.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*10}s;opacity:${0.2+Math.random()*0.4};`; document.getElementById('fireCanvas').appendChild(p); }
    renderPlayerCountGrid();
  })();
</script>
</body>
</html>
