{ id: “ru”, flag: “🇷🇺”, name: “Россия”,       lang: “Русский”,    color: “#e03030”, dim: “rgba(224,48,48,0.15)”  },
{ id: “ua”, flag: “🇺🇦”, name: “Україна”,      lang: “Українська”, color: “#c084fc”, dim: “rgba(192,132,252,0.15)”},
{ id: “tr”, flag: “🇹🇷”, name: “Türkiye”,      lang: “Türkçe”,     color: “#f43f5e”, dim: “rgba(244,63,94,0.15)”  },
{ id: “fr”, flag: “🇫🇷”, name: “France”,       lang: “Français”,   color: “#fb923c”, dim: “rgba(251,146,60,0.15)” },
];

const CATEGORIES = [
{ id: “history”,   emoji: “🏛️”, de: “Geschichte”, en: “History”  },
{ id: “geography”, emoji: “🌍”, de: “Geografie”,  en: “Geography”},
{ id: “culture”,   emoji: “🎭”, de: “Kultur”,     en: “Culture”  },
{ id: “food”,      emoji: “🍽️”, de: “Essen”,      en: “Food”     },
{ id: “sport”,     emoji: “⚽”, de: “Sport”,      en: “Sport”    },
{ id: “language”,  emoji: “💬”, de: “Sprache”,    en: “Language” },
];

const LANG_NAMES = { de: “German”, ru: “Russian”, ua: “Ukrainian”, tr: “Turkish”, fr: “French” };
const MEDALS = [“🥇”, “🥈”, “🥉”, “4.”];
const TIMER_SECS = 25;
const Q_COUNT = 10;

async function generateQuestions(player, otherCountries, categories) {
const lang    = LANG_NAMES[player.countryId] || “English”;
const targets = otherCountries.map(c => c.name).join(”, “);
const cats    = categories.join(”, “);
const prompt  = `You are generating quiz questions for a cultural knowledge game. Player language: ${lang} Countries to ask about: ${targets} Categories: ${cats} Question count: ${Q_COUNT} Write ALL text in ${lang} only. Respond ONLY with a raw JSON array — no markdown, no backticks: [{"question":"...","options":["...","...","...","..."],"correctIndex":0,"explanation":"..."}] Rules: exactly 4 options, vary correctIndex (0-3), short explanations (1-2 sentences).`;
const res  = await fetch(“https://api.anthropic.com/v1/messages”, {
method: “POST”, headers: { “Content-Type”: “application/json” },
body: JSON.stringify({ model: “claude-sonnet-4-20250514”, max_tokens: 1500, messages: [{ role: “user”, content: prompt }] }),
});
const data = await res.json();
const raw  = data.content.map(b => b.text || “”).join(””);
return JSON.parse(raw.replace(/`json|`/g, “”).trim());
}

const mkPlayers = () => [
{ id: 0, name: “”, countryId: “de” },
{ id: 1, name: “”, countryId: “ru” },
{ id: 2, name: “”, countryId: “ua” },
{ id: 3, name: “”, countryId: “fr” },
];

function Particles() {
const items = useRef(
Array.from({length: 26}, (_, i) => ({
left: `${(i * 3.85) % 100}%`,
delay: `${(i * 0.37) % 8}s`,
dur: `${7 + (i * 0.41) % 9}s`,
size: `${2 + (i * 0.17) % 3}px`,
op: 0.2 + (i * 0.03) % 0.5,
}))
).current;
return (
<div className="particles" aria-hidden="true">
{items.map((p, i) => (
<div key={i} className=“particle” style={{
left: p.left, animationDelay: p.delay,
animationDuration: p.dur, width: p.size, height: p.size, opacity: p.op,
}}/>
))}
</div>
);
}

.pmed{font-size:1.4rem;min-width:30px}

.pnm{flex:1;font-size:.97rem;color:#f0d8c0}

/* ── UTILS ── */

.row2{display:flex;gap:9px}
@media(max-width:500px){.card{padding:22px 18px}.cgrid{grid-template-columns:1fr}.cpgrid{gap:8px}}
`

export default function App() {
const [screen,      setScreen]     = useState(“splash”);
const [step,        setStep]       = useState(1);
const [playerCount, setPC]         = useState(2);
const [players,     setPlayers]    = useState(mkPlayers());
const [cats,        setCats]       = useState([“history”,“geography”,“culture”,“food”]);
const [questions,   setQuestions]  = useState({});
const [scores,      setScores]     = useState({});
const [cpIdx,       setCpIdx]      = useState(0);
const [qIdx,        setQIdx]       = useState(0);
const [selected,    setSelected]   = useState(null);
const [timedOut,    setTimedOut]   = useState(false);
const [timeLeft,    setTimeLeft]   = useState(TIMER_SECS);
const [error,       setError]      = useState(null);
const [loadDone,    setLoadDone]   = useState([]);
const [hs,          setHs]         = useState([]);
const [hsSaved,     setHsSaved]    = useState(false);

const timerRef  = useRef(null);
const active    = players.slice(0, playerCount);
const cp        = active[cpIdx];
const cpCountry = COUNTRIES.find(c => c.id === cp?.countryId);
const cpQs      = cp ? (questions[cp.id] || []) : [];
const q         = cpQs[qIdx];

useEffect(() => {
(async () => { try { const r = localStorage.getItem(“wq_hs”); if (r) setHs(JSON.parse(r)); } catch {} })();
}, []);

useEffect(() => {
if (screen === “splash”) { const t = setTimeout(() => setScreen(“home”), 3200); return () => clearTimeout(t); }
}, [screen]);

const startTimer = useCallback(() => {
setTimeLeft(TIMER_SECS); setTimedOut(false);
clearInterval(timerRef.current);
timerRef.current = setInterval(() => {
setTimeLeft(t => { if (t <= 1) { clearInterval(timerRef.current); setTimedOut(true); setSelected(-1); return 0; } return t - 1; });
}, 1000);
}, []);

useEffect(() => { if (screen === “quiz”) startTimer(); return () => clearInterval(timerRef.current); }, [qIdx, cpIdx, screen, startTimer]);

const startGame = async () => {
setError(null); setLoadDone([]); setScreen(“loading”);
try {
const initScores = Object.fromEntries(active.map(p => [p.id, 0]));
setScores(initScores);
const entries = await Promise.all(active.map(async (player) => {
const others = active.filter(p => p.id !== player.id).map(p => COUNTRIES.find(c => c.id === p.countryId)).filter(Boolean);
const qs = await generateQuestions(player, others, cats);
setLoadDone(d => […d, player.id]);
return [player.id, qs];
}));
setQuestions(Object.fromEntries(entries));
setCpIdx(0); setQIdx(0); setSelected(null); setHsSaved(false);
setScreen(“turn_intro”);
} catch (e) {
setError(“Fehler: “ + (e.message || “Bitte erneut versuchen”));
setScreen(“setup”);
}
};

const handleAnswer = idx => {
if (selected !== null) return;
clearInterval(timerRef.current);
setSelected(idx);
if (idx === q.correctIndex) setScores(s => ({ …s, [cp.id]: (s[cp.id] || 0) + 1 }));
};

const next = () => {
setSelected(null);
if (qIdx + 1 >= cpQs.length) {
if (cpIdx + 1 >= active.length) { clearInterval(timerRef.current); setScreen(“result”); }
else { setCpIdx(i => i + 1); setQIdx(0); setScreen(“turn_intro”); }
} else { setQIdx(i => i + 1); }
};

const saveHS = async () => {
const newE = active.map(p => ({
name: p.name || `Spieler ${p.id+1}`,
flag: COUNTRIES.find(c => c.id === p.countryId)?.flag || “”,
score: scores[p.id] || 0, total: Q_COUNT,
pct: Math.round(((scores[p.id]||0)/Q_COUNT)*100),
date: new Date().toLocaleDateString(“de-DE”),
}));
const updated = […hs, …newE].sort((a,b) => b.pct - a.pct).slice(0, 30);
setHs(updated); setHsSaved(true);
try { localStorage.setItem(“wq_hs”, JSON.stringify(updated)); } catch {}
};

const goHome = () => {
clearInterval(timerRef.current);
setPlayers(mkPlayers()); setPC(2); setCats([“history”,“geography”,“culture”,“food”]);
setStep(1); setScreen(“home”);
};

const sorted   = […active].sort((a,b) => (scores[b.id]||0) - (scores[a.id]||0));
const timerPct = (timeLeft / TIMER_SECS) * 100;
const timerClr = timeLeft <= 5 ? “#ef4444” : timeLeft <= 10 ? “#f97316” : (cpCountry?.color || “#cc3300”);

return (
<>
<style>{CSS}</style>
<div className="bg-layer"/>
<div className="bg-grid"/>
<Particles/>
<div className="app">
{screen !== “splash” && <button className="thm" title="Magic">🔮</button>}

```
    {/* SPLASH */}
    {screen === "splash" && (
      <div className="ctr">
        <div className="mk-wrap">
          <div className="mk-title">MORTAL KOMBAT</div>
          <div className="splash-globe">🌍</div>
        </div>
        <div className="splash-ttl">❤️ Best World Quiz ❤️</div>
        <div className="splash-sub">Oder Angst? 😅</div>
        <div className="splash-ld"><span/><span/><span/></div>
      </div>
    )}

    {/* HOME */}
    {screen === "home" && (
      <div className="ctr">
        <div className="mk-wrap">
          <div className="mk-title">MORTAL KOMBAT</div>
          <div className="hglobe">🌍</div>
        </div>
        <h1 className="httl">❤️ Best World Quiz ❤️</h1>
        <p className="hsub">Oder Angst? 😅<br/>Wer kennt das andere Land besser?<br/>Кто лучше знает другую страну?</p>
        <div className="hflags">🇩🇪 🇷🇺 🇺🇦 🇹🇷 🇫🇷</div>
        <div style={{width:"100%",maxWidth:360}}>
          <button className="btn btn-p" onClick={() => { setStep(1); setScreen("setup"); }}>🎮 Neues Spiel · Новая игра</button>
          <button className="btn btn-o" onClick={() => setScreen("hs")}>🏆 Bestenliste · Рейтинг</button>
        </div>
      </div>
    )}

    {/* SETUP */}
    {screen === "setup" && (
      <div className="cwrap">
        <div className="steps">{[1,2,3].map(s => <div key={s} className={`sdot ${step>=s?"on":""}`}/>)}</div>
        {step === 1 && (
          <div className="card">
            <div className="card-ttl">⚔️ Wie viele Kämpfer? · Сколько игроков?</div>
            <div className="cpgrid">
              {[2,3,4].map(n => <button key={n} className={`cbtn ${playerCount===n?"on":""}`} onClick={() => setPC(n)}>{n}</button>)}
            </div>
            <button className="btn btn-p" onClick={() => setStep(2)}>Weiter →</button>
            <button className="btn btn-o" onClick={goHome}>← Zurück</button>
          </div>
        )}
        {step === 2 && (
          <div className="card">
            <div className="card-ttl">🩸 Kämpfer wählen · Выбор игроков</div>
            <div className="plist">
              {active.map((player, idx) => {
                const c = COUNTRIES.find(ct => ct.id === player.countryId);
                return (
                  <div key={player.id} className="prow" style={{"--pc": c?.color||"#880000"}}>
                    <div className="pnum">{idx+1}</div>
                    <div className="pflds">
                      <input className="inp" placeholder={`Name ${idx+1}`} value={player.name} maxLength={20}
                        onChange={e => { const up=[...players]; up[player.id]={...up[player.id],name:e.target.value}; setPlayers(up); }}/>
                      <div className="csel">
                        {COUNTRIES.map(ct => {
                          const taken = active.some(p => p.id!==player.id && p.countryId===ct.id);
                          return (
                            <button key={ct.id} className={`fbtn ${player.countryId===ct.id?"ac":""} ${taken?"tk":""}`}
                              style={{"--fc":ct.color}} disabled={taken} title={ct.name}
                              onClick={() => { if(taken)return; const up=[...players]; up[player.id]={...up[player.id],countryId:ct.id}; setPlayers(up); }}>
                              {ct.flag}
                            </button>
                          );
                        })}
                      </div>
                      <div className="plbl">{c?.flag} {c?.lang}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="row2">
              <button className="btn btn-o" style={{flex:1,marginTop:0}} onClick={() => setStep(1)}>← Zurück</button>
              <button className="btn btn-p" style={{flex:2}} disabled={active.some(p => !p.name.trim())} onClick={() => setStep(3)}>Weiter →</button>
            </div>
          </div>
        )}
        {step === 3 && (
          <div className="card">
            <div className="card-ttl">📜 Wissensgebiete · Категории</div>
            <div className="cgrid">
              {CATEGORIES.map(cat => (
                <button key={cat.id} className={`cchip ${cats.includes(cat.id)?"on":""}`}
                  onClick={() => setCats(prev => prev.includes(cat.id) ? prev.filter(c=>c!==cat.id) : [...prev,cat.id])}>
                  <span className="cemoji">{cat.emoji}</span>
                  <span>{cat.de} · {cat.en}</span>
                </button>
              ))}
            </div>
            {cats.length===0 && <div className="warn">⚠ Mindestens 1 Kategorie wählen!</div>}
            <div className="row2" style={{marginTop:14}}>
              <button className="btn btn-o" style={{flex:1,marginTop:0}} onClick={() => setStep(2)}>← Zurück</button>
              <button className="btn btn-p" style={{flex:2}} disabled={cats.length===0} onClick={startGame}>🔥 Los! · Вперёд!</button>
            </div>
            {error && <div className="err">⚠ {error}</div>}
          </div>
        )}
      </div>
    )}

    {/* LOADING */}
    {screen === "loading" && (
      <div className="ctr">
        <div className="ldglobe">🌍</div>
        <div className="ldttl">Beschwöre Fragen…</div>
        <div className="ldsub">Призываю вопросы…</div>
        <div className="ldrows">
          {active.map(p => {
            const c = COUNTRIES.find(ct => ct.id === p.countryId);
            const done = loadDone.includes(p.id);
            return (
              <div key={p.id} className={`ldrow ${done?"done":""}`}>
                <span>{c?.flag} {p.name}</span>
                {done ? <span>✓</span> : <span className="ldspin">⟳</span>}
              </div>
            );
          })}
        </div>
      </div>
    )}

    {/* TURN INTRO */}
    {screen === "turn_intro" && cp && cpCountry && (
      <div className="ctr">
        <div className="tcard" style={{borderColor:`${cpCountry.color}44`}}>
          <span className="tflag">{cpCountry.flag}</span>
          <div className="tname" style={{color:cpCountry.color}}>{cp.name||`Spieler ${cpIdx+1}`}</div>
          <div className="tsub">{Q_COUNT} Fragen über andere Länder<br/><span style={{fontSize:".8em"}}>auf {cpCountry.lang}</span></div>
          {cpIdx > 0 && (
            <div className="tprev">
              {active.slice(0,cpIdx).map(p => { const c=COUNTRIES.find(ct=>ct.id===p.countryId); return <span key={p.id}>{c?.flag} {p.name}: {scores[p.id]||0}/{Q_COUNT}</span>; })}
            </div>
          )}
          <button className="btn btn-p"
            style={{background:`linear-gradient(135deg,${cpCountry.color}99,${cpCountry.color}55)`,color:"#ffe0d0",border:`1px solid ${cpCountry.color}44`,width:"100%"}}
            onClick={() => setScreen("quiz")}>
            ⚔️ Bereit! · Готов! →
          </button>
        </div>
      </div>
    )}

    {/* QUIZ */}
    {screen === "quiz" && q && cpCountry && (
      <div className="qwrap">
        <div className="mscore">
          {active.map((p,i) => {
            const c=COUNTRIES.find(ct=>ct.id===p.countryId);
            const isAct=i===cpIdx;
            return (
              <div key={p.id} className={`msi ${isAct?"act":""}`}
                style={isAct?{borderColor:`${c?.color}55`,color:c?.color,boxShadow:`0 0 12px ${c?.color}28`}:{}}>
                <span>{c?.flag}</span>
                <span className="msn">{i<=cpIdx?(scores[p.id]||0):"—"}</span>
              </div>
            );
          })}
        </div>
        <div className="qcard">
          <div className="ttrack"><div className="tfill" style={{width:`${timerPct}%`,background:timerClr}}/></div>
          <div className="trow">
            <span className="qlbl">{cpCountry.flag} Frage {qIdx+1} / {Q_COUNT}</span>
            <span className="tnum" style={{color:timerClr}}>{timeLeft}s</span>
          </div>
          <div className="qtxt">{q.question}</div>
          <div className="opts">
            {q.options.map((opt,idx) => {
              let cls="obtn";
              if(selected!==null||timedOut){ if(idx===q.correctIndex)cls+=" cor"; else if(idx===selected)cls+=" wrg"; }
              return (
                <button key={idx} className={cls} disabled={selected!==null||timedOut} onClick={() => handleAnswer(idx)}>
                  <span className="okey">{["A","B","C","D"][idx]}</span>
                  <span>{opt}</span>
                </button>
              );
            })}
          </div>
          {(selected!==null||timedOut) && (
            <div>
              {timedOut&&selected===-1 ? (
                <div className="expl t">⏰ Zeit! — <strong>{q.options[q.correctIndex]}</strong></div>
              ) : selected===q.correctIndex ? (
                <div className="expl c">✓ {q.explanation}</div>
              ) : (
                <div className="expl w">✗ {q.explanation}</div>
              )}
              <button className="btn btn-p" onClick={next}>
                {qIdx+1>=cpQs.length?(cpIdx+1>=active.length?"⚔️ Ergebnis →":"Nächster Kämpfer →"):"Weiter · Далее →"}
              </button>
            </div>
          )}
        </div>
      </div>
    )}

    {/* RESULT */}
    {screen === "result" && (
      <div className="cwrap">
        <div className="card">
          <div className="rttl">⚔️ Ergebnis · Результат</div>
          <div className="pod">
            {sorted.map((player,rank) => {
              const c=COUNTRIES.find(ct=>ct.id===player.countryId);
              const sc=scores[player.id]||0;
              return (
                <div key={player.id} className={`prow2 ${rank===0?"r1":""}`}>
                  <span className="pmed">{MEDALS[rank]}</span>
                  <span className="pflg">{c?.flag}</span>
                  <span className="pnm">{player.name}</span>
                  <span className="psc" style={{color:c?.color}}>{sc}<span className="ptot">/{Q_COUNT}</span></span>
                  <div className="pbar"><div className="pbfill" style={{width:`${(sc/Q_COUNT)*100}%`,background:c?.color}}/></div>
                  <span className="ppct">{Math.round((sc/Q_COUNT)*100)}%</span>
                </div>
              );
            })}
          </div>
          <div className="wmsg">
            {(() => {
              const top=sorted[0]; const topSc=scores[top?.id]||0;
              const tied=sorted.filter(p=>(scores[p.id]||0)===topSc);
              if(tied.length>1)return "🤝 Unentschieden! · Ничья!";
              const c=COUNTRIES.find(ct=>ct.id===top.countryId);
              return `${c?.flag} ${top.name} gewinnt! · побеждает!`;
            })()}
          </div>
          <div className="divider"/>
          {!hsSaved ? (
            <button className="btn btn-p" onClick={saveHS} style={{marginBottom:9}}>💾 Punkte speichern · Сохранить</button>
          ) : (
            <div style={{textAlign:"center",color:"#86efac",fontSize:".9rem",marginBottom:9,fontStyle:"italic"}}>✓ Gespeichert · Сохранено</div>
          )}
          <button className="btn btn-p" onClick={startGame} style={{marginBottom:9}}>🔄 Nochmal · Ещё раз</button>
          <button className="btn btn-o" onClick={goHome}>🏠 Hauptmenü</button>
        </div>
      </div>
    )}

    {/* HIGHSCORES */}
    {screen === "hs" && (
      <div className="cwrap">
        <div className="card">

                  <span className="hsp">{h.pct}%</span>
                  <span className="hsd">{h.date}</span>

          <button className="btn btn-o" style={{marginTop:20}} onClick={() => setScreen("home")}>← Zurück · Назад</button>
