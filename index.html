<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ULTIMATE MK QUIZ · GOLD & GLORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050108;
            --card-bg: rgba(15, 2, 10, 0.95);
            --primary: #ff3c00;
            --primary-glow: rgba(255, 60, 0, 0.6);
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.5);
            --subzero: #00d4ff;
            --text: #efe8d8;
            --border: rgba(255, 60, 0, 0.3);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #4a0000 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #001a33 0%, transparent 40%);
        }

        /* Hintergrund-Animationen */
        #canvas-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.4; }
        
        .overlay {
            position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,0,0,0.4) 100%);
            z-index: 10;
        }

        /* App Container */
        #app {
            position: relative;
            z-index: 20;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
        }

        .screen {
            display: none;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active { display: flex; flex-direction: column; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        .mk-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.5rem;
            text-align: center;
            background: linear-gradient(to bottom, #fff, var(--gold), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .sub-title {
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* Cards & Buttons */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: relative;
            margin-bottom: 15px;
        }

        .btn {
            font-family: 'Cinzel', serif;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.2s;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b0000, var(--primary));
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-primary:active { transform: scale(0.96); }

        .btn-gold {
            background: linear-gradient(135deg, #b8860b, var(--gold));
            color: #000;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
        }

        /* Player Setup */
        .player-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
        }

        .input-minimal {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            padding: 5px;
            width: 100%;
            outline: none;
        }

        /* Quiz UI */
        .timer-container {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 15px 0;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transition: width 1s linear;
        }

        .option-grid { display: grid; gap: 10px; }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            color: white;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .option-btn.correct { background: #1b4d2e; border-color: #2ecc71; }
        .option-btn.wrong { background: #4d1b1b; border-color: #e74c3c; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Powerups Bar */
        .powerup-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .pu-btn {
            background: #1a1a1a;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .pu-btn:disabled { opacity: 0.3; border-color: gray; color: gray; }

        /* Versus Screen */
        .vs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .vs-title {
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(#ff3c00, #550000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .avatar-big {
            font-size: 5rem;
            filter: drop-shadow(0 0 20px var(--primary));
            margin: 20px;
        }

        /* Stats & Level */
        .lvl-badge {
            background: var(--gold);
            color: black;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* Icons */
        .icon { font-size: 1.2rem; }

    </style>
</head>
<body>

    <div class="overlay"></div>
    <canvas id="canvas-bg"></canvas>

    <div id="app">
        <!-- HOME SCREEN -->
        <section id="s-home" class="screen active">
            <div style="margin-top: auto; margin-bottom: auto;">
                <h1 class="mk-title">MORTAL KOMBAT</h1>
                <p class="sub-title">World Quiz · Gold & Glory</p>
                
                <div class="glass-card" style="text-align: center;">
                    <div class="avatar-big">🌍</div>
                    <button class="btn btn-primary" style="width: 100%;" onclick="Router.go('setup')">
                        <span class="icon">⚔️</span> Neuer Kampf
                    </button>
                    <button class="btn btn-ghost" style="width: 100%;" onclick="Router.go('highscores')">
                        <span class="icon">🏆</span> Bestenliste
                    </button>
                </div>
            </div>
            <p style="text-align: center; font-size: 0.7rem; opacity: 0.5; margin-bottom: 20px;">
                PRODUCED BY KEMPF GAMES · V2.0 PRO
            </p>
        </section>

        <!-- SETUP SCREEN -->
        <section id="s-setup" class="screen">
            <h2 class="mk-title" style="font-size: 1.8rem;">Wähle Kämpfer</h2>
            <div id="player-inputs" style="margin-bottom: 20px;">
                <!-- Dynamically filled -->
            </div>
            <button class="btn btn-ghost" onclick="Game.addPlayer()">+ Kämpfer hinzufügen</button>
            <div style="margin-top: auto;">
                <button class="btn btn-primary" style="width: 100%;" onclick="Game.init()">KAMPF STARTEN</button>
                <button class="btn btn-ghost" style="width: 100%;" onclick="Router.go('home')">Abbrechen</button>
            </div>
        </section>

        <!-- VS SCREEN -->
        <section id="s-vs" class="screen">
            <div class="vs-container">
                <div id="vs-player-info">
                    <div class="avatar-big" id="vs-avatar">🥷</div>
                    <h2 id="vs-name" class="mk-title">PLAYER 1</h2>
                    <div id="vs-stats"></div>
                </div>
                <div class="vs-title">VS</div>
                <div class="glass-card">
                    <p id="vs-hint">Bereite dich vor...</p>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="Game.startQuiz()">FIGHT!</button>
            </div>
        </section>

        <!-- QUIZ SCREEN -->
        <section id="s-quiz" class="screen">
            <div class="powerup-row" id="powerups">
                <!-- Powerups here -->
            </div>

            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span id="q-count" style="font-weight: 700; color: var(--gold);">FRAGE 1/10</span>
                    <span id="q-gold" style="color: var(--gold);">💰 0</span>
                </div>
                
                <div class="timer-container">
                    <div id="timer-bar"></div>
                </div>

                <p id="q-text" style="font-size: 1.2rem; font-weight: 600; margin: 10px 0 20px; line-height: 1.4;">
                    Lädt Frage...
                </p>

                <div class="option-grid" id="q-options">
                    <!-- Options here -->
                </div>
            </div>

            <div id="q-feedback" class="glass-card" style="display: none; border-color: var(--gold);">
                <p id="q-explanation"></p>
                <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="Game.nextQuestion()">Weiter</button>
            </div>
        </section>

        <!-- RESULT SCREEN -->
        <section id="s-result" class="screen">
            <h1 class="mk-title">FINISH HIM!</h1>
            <div id="podium" style="margin: 20px 0;">
                <!-- Results here -->
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="Router.go('home')">Hauptmenü</button>
        </section>
    </div>

    <script>
        /**
         * CORE APP LOGIC
         */
        
        // Data
        const DB = {
            de: [
                { q: "Welches Land hat die meisten Einwohner?", o: ["Russland", "China", "Indien", "USA"], c: 2, e: "Indien hat China im Jahr 2023 offiziell überholt." },
                { q: "In welchem Land liegt die Stadt Istanbul?", o: ["Griechenland", "Ägypten", "Türkei", "Iran"], c: 2, e: "Istanbul ist die einzige Stadt der Welt, die auf zwei Kontinenten liegt." },
                { q: "Was ist das Nationalgericht der Ukraine?", o: ["Piroggen", "Borschtsch", "Sushi", "Döner"], c: 1, e: "Borschtsch ist eine traditionelle Suppe aus Roter Bete." },
                { q: "Welcher Fluss fließt durch Paris?", o: ["Rhein", "Donau", "Seine", "Themse"], c: 2, e: "Die Seine ist das Herzstück der französischen Hauptstadt." },
                { q: "Was ist die Hauptstadt von Deutschland?", o: ["München", "Hamburg", "Berlin", "Frankfurt"], c: 2, e: "Berlin ist seit der Wiedervereinigung 1990 die Hauptstadt." },
                { q: "Welche Farbe hat die Flagge von Frankreich?", o: ["Blau-Weiß-Rot", "Schwarz-Rot-Gold", "Grün-Weiß-Rot", "Blau-Gelb"], c: 0, e: "Die 'Tricolore' steht für Freiheit, Gleichheit und Brüderlichkeit." }
            ]
        };

        const Router = {
            go(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + screenId).classList.add('active');
            }
        };

        const Game = {
            players: [],
            currentPlayerIndex: 0,
            currentQuestionIndex: 0,
            score: 0,
            gold: 0,
            timer: null,
            timeLeft: 15,
            questions: [],

            addPlayer() {
                const container = document.getElementById('player-inputs');
                const id = container.children.length + 1;
                if(id > 5) return;
                const div = document.createElement('div');
                div.className = 'player-row';
                div.innerHTML = `
                    <span class="icon">🥷</span>
                    <input type="text" class="input-minimal" placeholder="Name Kämpfer ${id}" value="Spieler ${id}">
                `;
                container.appendChild(div);
            },

            init() {
                const inputs = document.querySelectorAll('.input-minimal');
                this.players = Array.from(inputs).map(inp => ({
                    name: inp.value || "Anonym",
                    gold: 100,
                    xp: 0,
                    score: 0
                }));
                this.currentPlayerIndex = 0;
                this.showVersus();
            },

            showVersus() {
                const p = this.players[this.currentPlayerIndex];
                document.getElementById('vs-name').innerText = p.name;
                document.getElementById('vs-stats').innerHTML = `<span class="lvl-badge">Gold: ${p.gold}</span>`;
                Router.go('vs');
            },

            startQuiz() {
                this.currentQuestionIndex = 0;
                this.score = 0;
                this.questions = [...DB.de].sort(() => Math.random() - 0.5).slice(0, 5);
                this.renderQuestion();
                Router.go('quiz');
            },

            renderQuestion() {
                const q = this.questions[this.currentQuestionIndex];
                document.getElementById('q-count').innerText = `FRAGE ${this.currentQuestionIndex + 1}/${this.questions.length}`;
                document.getElementById('q-text').innerText = q.q;
                document.getElementById('q-gold').innerText = `💰 ${this.players[this.currentPlayerIndex].gold}`;
                
                const optionsCont = document.getElementById('q-options');
                optionsCont.innerHTML = '';
                q.o.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = `<span>${opt}</span><span style="opacity:0.3">◈</span>`;
                    btn.onclick = () => this.checkAnswer(i);
                    optionsCont.appendChild(btn);
                });

                document.getElementById('q-feedback').style.display = 'none';
                this.startTimer();
                this.renderPowerups();
            },

            renderPowerups() {
                const cont = document.getElementById('powerups');
                const p = this.players[this.currentPlayerIndex];
                const ups = [
                    { name: "50/50", cost: 30, icon: "🌓" },
                    { name: "+10s", cost: 20, icon: "⏳" }
                ];
                cont.innerHTML = ups.map(u => `
                    <button class="pu-btn" ${p.gold < u.cost ? 'disabled' : ''} onclick="Game.usePower('${u.name}', ${u.cost})">
                        ${u.icon} ${u.name} (${u.cost})
                    </button>
                `).join('');
            },

            usePower(type, cost) {
                const p = this.players[this.currentPlayerIndex];
                if(p.gold >= cost) {
                    p.gold -= cost;
                    if(type === "+10s") this.timeLeft += 10;
                    if(type === "50/50") {
                        const correct = this.questions[this.currentQuestionIndex].c;
                        const btns = document.querySelectorAll('.option-btn');
                        let hidden = 0;
                        btns.forEach((b, i) => {
                            if(i !== correct && hidden < 2) {
                                b.style.visibility = 'hidden';
                                hidden++;
                            }
                        });
                    }
                    this.renderQuestion(); // Refresh UI
                }
            },

            startTimer() {
                clearInterval(this.timer);
                this.timeLeft = 15;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    bar.style.width = (this.timeLeft / 15 * 100) + "%";
                    if(this.timeLeft <= 0) {
                        clearInterval(this.timer);
                        this.checkAnswer(-1);
                    }
                }, 1000);
            },

            checkAnswer(idx) {
                clearInterval(this.timer);
                const q = this.questions[this.currentQuestionIndex];
                const btns = document.querySelectorAll('.option-btn');
                const feedback = document.getElementById('q-feedback');
                const expl = document.getElementById('q-explanation');

                if(idx === q.c) {
                    btns[idx].classList.add('correct');
                    this.players[this.currentPlayerIndex].score++;
                    this.players[this.currentPlayerIndex].gold += 20;
                } else {
                    if(idx !== -1) btns[idx].classList.add('wrong');
                    btns[q.c].classList.add('correct');
                }

                expl.innerText = q.e;
                feedback.style.display = 'block';
                btns.forEach(b => b.disabled = true);
            },

            nextQuestion() {
                this.currentQuestionIndex++;
                if(this.currentQuestionIndex < this.questions.length) {
                    this.renderQuestion();
                } else {
                    this.currentPlayerIndex++;
                    if(this.currentPlayerIndex < this.players.length) {
                        this.showVersus();
                    } else {
                        this.showResult();
                    }
                }
            },

            showResult() {
                Router.go('result');
                const podium = document.getElementById('podium');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                
                podium.innerHTML = sorted.map((p, i) => `
                    <div class="player-row" style="border-color: ${i===0 ? 'var(--gold)' : 'var(--primary)'}">
                        <span style="font-size: 1.5rem;">${i === 0 ? '🥇' : '💀'}</span>
                        <div style="flex: 1">
                            <div style="font-weight: 900">${p.name}</div>
                            <div style="font-size: 0.8rem; opacity: 0.7">SCORE: ${p.score} | GOLD: ${p.gold}</div>
                        </div>
                    </div>
                `).join('');
            }
        };

        // Hintergrund Effekt
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = Array.from({length: 50}, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.2
            }));
        }

        function animate() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "rgba(255, 60, 0, 0.3)";
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = h;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onresize = initCanvas;
        initCanvas();
        animate();
        
        // Initialer Start
        Game.addPlayer();
        Game.addPlayer();
    </script>
</body>
</html>
