<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · APEX WORLD QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #030303;
            --card: rgba(20, 20, 20, 0.85);
            --border: rgba(212, 175, 55, 0.4);
            --red: #ff3c00;
            --blue-glow: rgba(0, 150, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            /* Moderner Arena-Hintergrund */
            background-image: 
                radial-gradient(circle at 50% 100%, #1a1a1a 0%, transparent 70%),
                radial-gradient(circle at 0% 0%, #3a2a00 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, #001a3a 0%, transparent 40%);
        }

        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .screen {
            display: none;
            flex: 1;
            padding: 30px 25px;
            flex-direction: column;
            overflow-y: auto;
        }

        .screen.active { display: flex; animation: screenIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes screenIn {
            from { opacity: 0; transform: translateY(30px); filter: brightness(2); }
            to { opacity: 1; transform: translateY(0); filter: brightness(1); }
        }

        /* --- LOGO & TITEL --- */
        .logo-section { text-align: center; margin-bottom: 20px; }
        .title-gold {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.85;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }
        .sub-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.3rem;
            color: #fff;
            margin-top: 15px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* --- KÄMPFER SELEKTION DESIGN --- */
        .selection-header { text-align: center; margin-bottom: 30px; }
        .label-tech {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: var(--gold-solid);
            text-transform: uppercase;
            opacity: 0.9;
        }

        #player-container { display: grid; gap: 15px; }

        .player-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardSlide 0.5s ease-out backwards;
        }

        @keyframes cardSlide {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .player-card:hover {
            transform: scale(1.02);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .player-card::before {
            content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%;
            background: var(--gold);
        }

        .avatar-circle {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .input-minimal {
            background: transparent; border: none; color: #fff;
            font-family: 'Outfit', sans-serif; font-size: 1.2rem;
            font-weight: 600; width: 100%; margin-left: 15px; outline: none;
            letter-spacing: 1px;
        }

        .input-minimal::placeholder { color: rgba(255,255,255,0.2); }

        /* --- BUTTONS --- */
        .btn-luxe {
            appearance: none; border: none; padding: 20px; border-radius: 16px;
            font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; gap: 12px; width: 100%; margin-bottom: 15px;
        }

        .btn-gold { 
            background: var(--gold); color: #000; font-weight: 900; 
            box-shadow: 0 10px 25px rgba(170, 119, 28, 0.4); 
            position: relative; overflow: hidden;
        }

        .btn-gold::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }

        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }

        .btn-outline { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--border); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* --- ATLAS --- */
        .atlas {
            font-size: 7rem;
            animation: rotateAtlas 20s linear infinite;
            filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.4));
            margin: 20px 0;
        }
        @keyframes rotateAtlas { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        footer { text-align: center; padding: 25px; font-size: 0.7rem; letter-spacing: 2px; color: rgba(255,255,255,0.7); font-family: 'Syncopate', sans-serif; font-weight: 700; }

        .btn-exit { position: absolute; top: 15px; right: 20px; font-family: 'Syncopate', sans-serif; font-size: 0.6rem; color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div id="app">
        <!-- SCREEN: HOME -->
        <section id="s-home" class="screen active">
            <div class="logo-section">
                <p class="label-tech" style="margin-top: 40px;">Elite Prestige Realm</p>
                <h1 class="title-gold">MORTAL<br>KOMBAT</h1>
                <div style="display: flex; justify-content: center;"><div class="atlas">🌍</div></div>
                <p class="sub-title">Best World Quiz</p>
            </div>
            <div style="margin-top: auto; padding-bottom: 10px;">
                <button class="btn-luxe btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
                <button class="btn-luxe btn-outline" onclick="App.startSolo()">1 Spieler (Solo)</button>
            </div>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>

        <!-- SCREEN: SETUP (Kämpfer-Selektion) -->
        <section id="s-setup" class="screen">
            <div class="selection-header">
                <h2 class="title-gold" style="font-size: 2.2rem;">Kämpfer</h2>
                <p class="label-tech">Wähle dein Team</p>
            </div>
            
            <div id="player-container">
                <!-- Hier werden die Kämpfer-Karten eingefügt -->
            </div>

            <div style="margin-top: 25px;">
                <button class="btn-luxe btn-outline" style="padding: 15px; font-size: 0.65rem;" onclick="App.addPlayerInput()">+ Kämpfer hinzufügen</button>
            </div>

            <div style="margin-top: auto; padding-bottom: 20px;">
                <button class="btn-luxe btn-gold" onclick="App.startBattle()">Kampf Starten</button>
                <button class="btn-luxe btn-outline" style="border:none; opacity:0.6; font-size: 0.6rem;" onclick="App.go('home')">← Hauptmenü</button>
            </div>
        </section>

        <!-- SCREEN: VS -->
        <section id="s-vs" class="screen">
            <div style="text-align: center; margin-top: 60px;">
                <div style="font-size: 6.5rem; margin-bottom: 15px; filter: drop-shadow(0 0 20px var(--gold-solid));">🐲</div>
                <h2 id="vs-name" class="title-gold" style="font-size: 2.8rem;">SPIELER</h2>
                <div style="background: var(--gold); color:#000; padding: 5px 15px; border-radius: 100px; display:inline-block; font-weight:800; font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;">Bereit zum Sieg</div>
            </div>
            <div style="margin-top: auto; padding-bottom: 20px;">
                <button class="btn-luxe btn-gold" onclick="App.startQuiz()">FIGHT!</button>
                <button class="btn-luxe btn-outline" style="border:none; opacity:0.6" onclick="App.go('setup')">← Team bearbeiten</button>
            </div>
        </section>

        <!-- SCREEN: QUIZ -->
        <section id="s-quiz" class="screen">
            <div class="btn-exit" onclick="if(confirm('Kampf abbrechen?')) location.reload()">✕</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <span id="quiz-round" class="label-tech">Level 01</span>
                <span id="quiz-gold" style="background: var(--gold); color:#000; padding: 4px 12px; border-radius: 100px; font-weight:800; font-size:0.7rem;">💰 0</span>
            </div>
            <div class="timer-rail"><div id="timer-bar" class="timer-fill"></div></div>
            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);"><h3 id="quiz-question" style="font-size: 1.4rem; text-align: center; line-height: 1.4; font-weight: 300;">Lade Herausforderung...</h3></div>
            <div id="quiz-options" style="margin-top: 15px;"></div>
            <div id="quiz-feedback" style="display: none; margin-top: 10px;">
                <div style="background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px;">
                    <p id="quiz-expl" style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px; text-align: center;"></p>
                    <button class="btn-luxe btn-gold" style="margin: 0;" onclick="App.nextStep()">Weiter</button>
                </div>
            </div>
        </section>

        <!-- SCREEN: RESULT -->
        <section id="s-result" class="screen">
            <h1 class="title-gold" style="font-size: 2.5rem; text-align: center;">ERGEBNIS</h1>
            <p class="label-tech" style="text-align: center;">Kampf Beendet</p>
            <div id="leaderboard" style="margin-top: 30px; flex: 1;"></div>
            <button class="btn-luxe btn-gold" onclick="location.reload()">Hauptmenü</button>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>
    </div>

    <script>
        const QUESTIONS = [
            { q: "Was ist das flächenmäßig größte Land der Welt?", o: ["Kanada", "USA", "Russland", "China"], c: 2, e: "Russland umfasst über 17 Millionen km²." },
            { q: "In welchem Land liegen die Ruinen von Machu Picchu?", o: ["Mexiko", "Brasilien", "Peru", "Chile"], c: 2, e: "Machu Picchu ist eine Inka-Stadt in den Anden Perus." },
            { q: "Welcher Fluss fließt durch Ägypten?", o: ["Amazonas", "Kongo", "Nil", "Ganges"], c: 2, e: "Der Nil ist die Lebensader Ägyptens." },
            { q: "Was ist das bevölkerungsreichste Land der Welt?", o: ["Indien", "China", "Indonesien", "USA"], c: 0, e: "Indien hat China im Jahr 2023 offiziell überholt." },
            { q: "Welches Gebirge trennt Europa von Asien?", o: ["Alpen", "Ural", "Himalaya", "Anden"], c: 1, e: "Das Uralgebirge gilt als Grenze zwischen den Kontinenten." }
        ];

        const App = {
            players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, activeQs: [],

            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
            },

            addPlayerInput(name = "") {
                const container = document.getElementById('player-container');
                if(container.children.length >= 4) return;
                
                const card = document.createElement('div');
                card.className = 'player-card';
                card.style.animationDelay = (container.children.length * 0.1) + 's';
                
                card.innerHTML = `
                    <div class="avatar-circle">👤</div>
                    <input type="text" class="input-minimal" value="${name || 'Krieger ' + (container.children.length + 1)}" placeholder="Name eingeben...">
                `;
                container.appendChild(card);
            },

            startSolo() {
                document.getElementById('player-container').innerHTML = "";
                this.addPlayerInput("Solo Krieger");
                this.startBattle();
            },

            startBattle() {
                const inputs = document.querySelectorAll('.input-minimal');
                this.players = Array.from(inputs).map(inp => ({ name: inp.value || "Anonym", score: 0, gold: 0 }));
                if(this.players.length === 0) return alert("Bitte mindestens einen Spieler hinzufügen!");
                this.pIdx = 0;
                this.showVS();
            },

            showVS() {
                const p = this.players[this.pIdx];
                document.getElementById('vs-name').innerText = p.name.toUpperCase();
                this.go('vs');
            },

            startQuiz() {
                this.qIdx = 0;
                this.activeQs = [...QUESTIONS].sort(() => Math.random() - 0.5);
                this.renderQuestion();
                this.go('quiz');
            },

            renderQuestion() {
                const q = this.activeQs[this.qIdx];
                document.getElementById('quiz-round').innerText = `Level 0${this.qIdx + 1}`;
                document.getElementById('quiz-gold').innerText = `💰 ${this.players[this.pIdx].gold}`;
                document.getElementById('quiz-question').innerText = q.q;
                
                const optBox = document.getElementById('quiz-options');
                optBox.innerHTML = '';
                optBox.style.display = 'block';
                document.getElementById('quiz-feedback').style.display = 'none';

                q.o.forEach((opt, i) => {
                    const btn = document.createElement('div');
                    btn.className = 'option-item';
                    btn.style.background = 'rgba(255,255,255,0.03)';
                    btn.style.border = '1px solid rgba(255,255,255,0.1)';
                    btn.style.padding = '18px 22px';
                    btn.style.borderRadius = '16px';
                    btn.style.marginBottom = '10px';
                    btn.style.cursor = 'pointer';
                    btn.style.display = 'flex';
                    btn.style.justifyContent = 'space-between';
                    btn.style.transition = '0.3s';
                    btn.innerHTML = `<span>${opt}</span><span style="opacity:0.3">◈</span>`;
                    btn.onclick = () => this.handleAnswer(i, btn);
                    optBox.appendChild(btn);
                });
                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timer);
                this.timeLeft = 12;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 12 * 100) + "%";
                    if(this.timeLeft <= 0) { clearInterval(this.timer); this.handleAnswer(-1); }
                }, 100);
            },

            handleAnswer(idx, clickedBtn) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const opts = document.querySelectorAll('#quiz-options div');
                opts.forEach(o => o.style.pointerEvents = 'none');

                if(idx === q.c) {
                    clickedBtn.classList.add('correct');
                    this.players[this.pIdx].score++;
                    this.players[this.pIdx].gold += Math.round(this.timeLeft * 30);
                } else if(idx !== -1) {
                    clickedBtn.classList.add('wrong');
                    opts[q.c].classList.add('correct');
                } else {
                    opts[q.c].classList.add('correct');
                }

                document.getElementById('quiz-expl').innerText = q.e;
                document.getElementById('quiz-feedback').style.display = 'block';
                document.getElementById('quiz-options').style.display = 'none';
            },

            nextStep() {
                this.qIdx++;
                if(this.qIdx < this.activeQs.length) {
                    this.renderQuestion();
                } else {
                    this.pIdx++;
                    if(this.pIdx < this.players.length) this.showVS();
                    else this.showResults();
                }
            },

            showResults() {
                this.go('result');
                const board = document.getElementById('leaderboard');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                
                board.innerHTML = sorted.map((p, i) => {
                    let rank = "Warrior";
                    if(p.score >= 5) rank = "Legend";
                    else if(p.score >= 4) rank = "Champion";
                    else if(p.score >= 3) rank = "Master";

                    return `
                    <div style="background: var(--card); border: 1px solid ${i===0?'var(--gold-solid)':'rgba(255,255,255,0.1)'}; border-radius: 20px; padding: 20px; display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                        <div><span style="background: var(--gold); color:#000; padding: 2px 10px; border-radius:100px; font-size:0.6rem; font-weight:800;">${rank}</span> <div style="margin-top:5px; font-weight:700;">${p.name}</div></div>
                        <div style="text-align:right">
                            <div style="color:var(--gold-solid); font-weight:900; font-size:1.4rem;">${p.score}/${QUESTIONS.length}</div>
                            <div style="font-size:0.75rem; opacity:0.6; font-family:'Syncopate';">💰 ${p.gold}</div>
                        </div>
                    </div>`;
                }).join('');
            }
        };

        // Standard-Start
        App.addPlayerInput();
        App.addPlayerInput();
    </script>
</body>
</html>
