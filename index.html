<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · APEX LEGACY QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #020205;
            --card: rgba(12, 12, 18, 0.95);
            --border: rgba(212, 175, 55, 0.3);
            --red: #ff3c00;
            --blue: #00d4ff;
            --shadow: 0 15px 35px rgba(0,0,0,0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
            background-image: 
                radial-gradient(circle at 50% -20%, #1a1a2e 0%, #020205 85%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        #app {
            width: 100%; max-width: 460px; height: 100vh; display: flex; flex-direction: column;
            position: relative; z-index: 10; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 100px rgba(0,0,0,1); background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
        }

        .screen { display: none; flex: 1; padding: 25px; flex-direction: column; overflow-y: auto; position: relative; }
        .screen.active { display: flex; animation: screenIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes screenIn { from { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(10px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }

        /* --- CINEASTISCHER 3D GLOBUS --- */
        .globe-wrapper {
            width: 260px; height: 260px; margin: 15px auto;
            position: relative; border-radius: 50%;
            background: #000; overflow: hidden;
            box-shadow: 
                inset -35px -35px 70px #000,
                inset 15px 15px 50px rgba(255,255,255,0.1),
                0 0 70px rgba(0, 150, 255, 0.2);
            border: 2px solid rgba(255,255,255,0.05);
        }

        .globe-map {
            width: 200%; height: 100%; position: absolute;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/1024px-Blue_Marble_2002.png');
            background-size: cover; animation: rotateGlobe 35s linear infinite;
            filter: brightness(1.1) contrast(1.2); opacity: 0.9;
        }

        .globe-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 35% 35%, transparent 20%, rgba(0,0,0,0.85) 90%);
            z-index: 2; pointer-events: none;
        }

        @keyframes rotateGlobe { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- TYPOGRAPHY --- */
        .branding-header { font-family: 'Syncopate', sans-serif; font-size: 0.65rem; letter-spacing: 12px; color: var(--gold-solid); text-align: center; margin-top: 10px; text-transform: uppercase; opacity: 0.9; }
        .logo-main { text-align: center; margin-top: 35px; }
        .logo-text { font-family: 'Cinzel Decorative', serif; font-size: 3.8rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.8; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5)); letter-spacing: -2px; }
        .sub-title-legendary { font-family: 'Syncopate', sans-serif; font-size: 1.8rem; text-align: center; text-transform: uppercase; margin-top: auto; padding-bottom: 45px; color: #fff; font-weight: 700; letter-spacing: 3px; text-shadow: 0 0 35px rgba(255,255,255,0.9); }

        /* --- BUTTONS --- */
        .btn-legend { appearance: none; border: none; padding: 22px; border-radius: 18px; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; margin-bottom: 15px; position: relative; overflow: hidden; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 12px 30px rgba(170, 119, 28, 0.4); }
        .btn-gold::after { content: ''; position: absolute; top: -50%; left: -150%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent); transform: rotate(45deg); animation: shine 4s infinite; }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }
        .btn-outline { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--border); }
        .btn-back { background: transparent; border: none; color: rgba(255,255,255,0.4); font-family: 'Syncopate'; font-size: 0.65rem; cursor: pointer; padding: 15px; width: 100%; text-transform: uppercase; letter-spacing: 2px; }

        /* --- SETUP --- */
        .p-slot { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 20px; padding: 18px; display: flex; align-items: center; margin-bottom: 12px; animation: cardIn 0.5s ease-out; }
        @keyframes cardIn { from { opacity:0; transform: scale(0.9); } }
        .f-select { width: 50px; height: 50px; background: #000; border: 2px dashed var(--gold-solid); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; cursor: pointer; color: var(--gold-solid); transition: 0.3s; }
        .i-name { background: transparent; border: none; color: #fff; font-family: 'Outfit'; font-size: 1.25rem; width: 100%; margin-left: 15px; outline: none; font-weight: 600; }
        .btn-del { background: none; border: none; color: #ff4d4d; font-size: 1.3rem; cursor: pointer; opacity: 0.6; transition: 0.3s; }

        .lang-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 25px; }
        .l-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 2px; border-radius: 12px; font-size: 0.55rem; font-family: 'Syncopate'; cursor: pointer; text-align: center; }
        .l-btn.active { background: var(--gold); color: #000; font-weight: 900; }

        /* --- QUIZ VISUALS --- */
        .q-visual { height: 230px; border-radius: 24px; border: 1px solid var(--border); background-size: cover; background-position: center; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 15px 40px #000; }
        .q-shade { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.9)); z-index: 1; }
        .q-txt { position: relative; z-index: 10; text-align: center; font-size: 1.4rem; padding: 20px; font-weight: 600; text-shadow: 0 3px 15px #000; }

        .opt-card { height: 68px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15); background-size: cover; background-position: center; position: relative; overflow: hidden; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.3s; }
        .opt-shade { position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 1; transition: 0.3s; }
        .opt-txt { position: relative; z-index: 10; padding-left: 20px; font-weight: 700; font-size: 1.15rem; text-shadow: 0 2px 5px #000; }

        .opt-card.correct .opt-shade { background: rgba(27, 77, 46, 0.85) !important; }
        .opt-card.wrong .opt-shade { background: rgba(77, 27, 27, 0.85) !important; }

        /* --- RANKING --- */
        .rank-tag { padding: 4px 10px; border-radius: 6px; font-size: 0.6rem; font-family: 'Syncopate'; font-weight: 900; text-transform: uppercase; margin-right: 8px; }
        .rank-master { background: #00d4ff; color: #000; box-shadow: 0 0 10px #00d4ff; }
        .rank-god { background: #ff3c00; color: #fff; box-shadow: 0 0 15px #ff3c00; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(20px); }
        .modal-box { background: #0a0a0a; border: 1px solid var(--gold-solid); padding: 35px; border-radius: 30px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); }

        footer { text-align: center; padding: 25px; font-size: 0.8rem; color: #fff; font-family: 'Syncopate', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; opacity: 0.9; }
        .t-fill { height: 6px; background: var(--red); box-shadow: 0 0 20px var(--red); width: 100%; transition: width 0.1s linear; }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(212, 175, 55, 0.1); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- FLAG MODAL -->
    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇩🇪')">🇩🇪</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇷🇺')">🇷🇺</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇬🇧')">🇬🇧</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇳🇬')">🇳🇬</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇹🇷')">🇹🇷</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇫🇷')">🇫🇷</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇮🇹')">🇮🇹</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇺🇦')">🇺🇦</div>
        </div>
    </div>

    <div id="app">
        <!-- HOME SCREEN -->
        <section id="s-home" class="screen active">
            <div class="branding-header">Elite Prestige Game</div>
            
            <div class="logo-main">
                <h1 class="logo-text">MORTAL<br>KOMBAT</h1>
            </div>
            
            <div class="globe-wrapper">
                <div class="globe-map"></div>
                <div class="globe-overlay"></div>
            </div>

            <p class="sub-title-legendary">Best World Quiz</p>

            <div style="margin-top: 10px;">
                <button class="btn-legend btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
                <button class="btn-legend btn-outline" onclick="App.go('achievements')">Erfolge ⚔️</button>
                <button class="btn-legend btn-outline" onclick="App.go('leaderboard')">Bestenliste 🏆</button>
            </div>
            <footer>Wowa & Amiar Kempf</footer>
        </section>

        <!-- SETUP SCREEN -->
        <section id="s-setup" class="screen">
            <h2 class="logo-text" style="font-size: 2.2rem; text-align:center; margin: 10px 0 25px;">Kämpfer</h2>
            
            <p style="font-family:'Syncopate'; font-size:0.5rem; letter-spacing:3px; color:var(--gold-solid); text-align:center; margin-bottom:10px;">Sprache</p>
            <div class="lang-grid">
                <div class="l-btn active" id="ln-de" onclick="App.setLang('de')">DE</div>
                <div class="l-btn" id="ln-ru" onclick="App.setLang('ru')">RU</div>
                <div class="l-btn" id="ln-en" onclick="App.setLang('en')">EN</div>
                <div class="l-btn" id="ln-ig" onclick="App.setLang('ig')">IGBO</div>
                <div class="l-btn" id="ln-tr" onclick="App.setLang('tr')">TR</div>
            </div>

            <div id="player-list"></div>

            <p style="font-family:'Outfit'; text-align:center; font-size:0.85rem; color:var(--gold-solid); margin: 20px 0 10px; opacity:0.8;">Name und Karten-Symbol auswählen</p>
            <button class="btn-legend btn-outline" style="font-size:0.65rem; padding: 15px;" onclick="App.addPlayerInput()">+ Neuer Kämpfer</button>

            <div style="margin-top: auto;">
                <button class="btn-legend btn-gold" onclick="App.prepareBattle()">FIGHT!</button>
                <button class="btn-back" onclick="App.go('home')">← Zurück</button>
            </div>
        </section>

        <!-- LOADING -->
        <section id="s-loading" class="screen" style="justify-content:center; align-items:center;">
            <div class="spinner"></div>
            <p style="font-family:'Syncopate'; font-size:0.6rem; letter-spacing:4px; margin-top:25px; text-align:center;">Synchronisiere Visuals...</p>
        </section>

        <!-- VS SCREEN -->
        <section id="s-vs" class="screen">
            <div style="text-align: center; margin-top: 60px;">
                <div id="vs-flag" style="font-size: 8.5rem; margin-bottom: 20px; filter: drop-shadow(0 0 30px var(--blue));">🐲</div>
                <h2 id="vs-name" class="logo-text" style="font-size: 3rem;">PLAYER</h2>
                <div id="vs-info" style="margin-top:15px;"></div>
            </div>
            <div style="margin-top: auto; padding-bottom: 40px;">
                <button class="btn-legend btn-gold" onclick="App.startQuiz()">START</button>
                <button class="btn-back" onclick="App.go('setup')">← Ändern</button>
            </div>
        </section>

        <!-- QUIZ SCREEN -->
        <section id="s-quiz" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="q-round" style="font-family:'Syncopate'; font-size:0.65rem; color:var(--gold-solid);">Round 1/10</span>
                <span id="q-gold" style="background:var(--gold); color:#000; padding:5px 15px; border-radius:100px; font-size:0.75rem; font-weight:800;">💰 0</span>
            </div>
            <div style="height:6px; background:rgba(255,255,255,0.1); border-radius:10px; margin:15px 0 20px; overflow:hidden;">
                <div id="timer-bar" class="t-fill"></div>
            </div>
            
            <div id="q-frame" class="q-visual">
                <div class="q-shade"></div>
                <h3 id="q-text" class="q-txt">Herausforderung...</h3>
            </div>

            <div id="q-options"></div>

            <div id="q-feedback" style="display:none; margin-top:10px;">
                <div style="background: rgba(0,0,0,0.92); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center;">
                    <p id="q-expl" style="font-size: 1.05rem; opacity: 0.9; margin-bottom: 15px; line-height:1.4;"></p>
                    <button class="btn-legend btn-gold" style="margin:0" onclick="App.nextStep()">Weiter</button>
                </div>
            </div>
        </section>

        <!-- RESULT SCREEN -->
        <section id="s-result" class="screen">
            <h1 class="logo-text" style="font-size: 2.8rem; text-align:center;">ERGEBNIS</h1>
            <div id="res-list" style="margin-top: 30px; flex: 1;"></div>
            <div style="margin-top: auto;">
                <button class="btn-legend btn-gold" onclick="App.prepareBattle()">Nochmal</button>
                <button class="btn-legend btn-outline" onclick="location.reload()">Hauptmenü</button>
            </div>
        </section>

        <!-- LEADERS & ACHIEVEMENTS -->
        <section id="s-leaderboard" class="screen">
            <h1 class="logo-text" style="font-size: 2.2rem; text-align:center;">Bestenliste</h1>
            <div id="lb-list" style="margin-top:30px; flex:1;"></div>
            <button class="btn-legend btn-gold" onclick="App.go('home')">Zurück</button>
        </section>

        <section id="s-achievements" class="screen">
            <h1 class="logo-text" style="font-size: 2.2rem; text-align:center;">Erfolge</h1>
            <div id="ach-list" style="margin-top:30px; flex:1;"></div>
            <button class="btn-legend btn-gold" onclick="App.go('home')">Zurück</button>
        </section>
    </div>

    <script>
        /**
         * MK PRESTIGE FINAL ENGINE
         */
        const TRANSLATIONS = {
            de: { round: "Runde", fight: "FIGHT", gold: "GOLD", next: "Weiter", abbrechen: "Beenden" },
            ru: { round: "Раунд", fight: "БОЙ", gold: "Золото", next: "Далее", abbrechen: "Выйти" },
            en: { round: "Round", fight: "FIGHT", gold: "GOLD", next: "Next", abbrechen: "Exit" }
        };

        const DB = {
            de: [
                { id: "de1", q: "Welches Land hat die meisten Inseln?", o: ["Schweden", "Norwegen", "Philippinen", "Indonesien"], c: 0, e: "Schweden hat über 267.000 Inseln.", kw: "sweden island" },
                { id: "de2", q: "Größtes Land der Erde?", o: ["Russland", "Kanada", "China", "USA"], c: 0, e: "Russland umfasst ca. 17 Mio km².", kw: "russia nature" },
                { id: "de3", q: "Hauptstadt von Japan?", o: ["Tokio", "Kyoto", "Osaka", "Seoul"], c: 0, e: "Tokio ist die größte Metropole Japans.", kw: "tokyo neon" },
                { id: "de4", q: "Höchster Berg der Welt?", o: ["Mount Everest", "K2", "Mont Blanc", "Fuji"], c: 0, e: "Er ist 8.848 Meter hoch.", kw: "everest" },
                { id: "de5", q: "Wo steht der Eiffelturm?", o: ["Paris", "Berlin", "London", "Rom"], c: 0, e: "Er steht in der Stadt der Liebe.", kw: "eiffel" }
            ],
            ru: [{ id: "ru1", q: "Самая большая страна?", o: ["Россия", "США", "Китай", "Канада"], c: 0, e: "Россия — 17 млн км².", kw: "russia" }],
            en: [{ id: "en1", q: "Largest ocean?", o: ["Pacific", "Atlantic", "Indian", "Arctic"], c: 0, e: "Pacific covers 35% of Earth.", kw: "ocean" }],
            ig: [{ id: "ig1", q: "Isi obodo Nigeria?", o: ["Abuja", "Lagos", "Enugu", "Kano"], c: 0, e: "Abuja bụ isi obodo.", kw: "nigeria" }],
            tr: [{ id: "tr1", q: "Türkiye'nin başkenti?", o: ["Ankara", "İstanbul", "İzmir", "Bursa"], c: 0, e: "Ankara başkenttir.", kw: "ankara" }]
        };

        const App = {
            profiles: JSON.parse(localStorage.getItem('mk_apex_final_v1')) || {},
            players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, currentLang: 'de', activeFlagIdx: null, activeQs: [],

            save() { localStorage.setItem('mk_apex_final_v1', JSON.stringify(this.profiles)); },

            getProfile(name) {
                const k = name.trim().toLowerCase();
                if(!this.profiles[k]) this.profiles[k] = { name: name.trim(), xp: 0, gold: 0, level: 1, flag: '🐲', usedIds: [] };
                return this.profiles[k];
            },

            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
                if(id === 'setup' && document.getElementById('player-list').children.length === 0) this.addPlayerInput();
                if(id === 'leaderboard') this.renderLeaderboard();
                if(id === 'achievements') this.renderAchievements();
            },

            setLang(l) {
                this.currentLang = l;
                document.querySelectorAll('.l-btn').forEach(c => c.classList.remove('active'));
                document.getElementById('ln-' + l).classList.add('active');
            },

            addPlayerInput() {
                const cont = document.getElementById('player-list');
                const id = Date.now() + Math.random();
                const d = document.createElement('div');
                d.className = 'p-slot'; d.id = 'pc-' + id;
                d.innerHTML = `
                    <div class="f-select" onclick="App.openFlag('${id}')">+</div>
                    <input type="text" class="i-name" placeholder="Name...">
                    <button class="btn-del" onclick="document.getElementById('pc-${id}').remove()">🗑️</button>
                `;
                cont.appendChild(d);
            },

            openFlag(id) { this.activeFlagIdx = id; document.getElementById('modal').style.display = 'flex'; },
            confirmFlag(f) { 
                const card = document.getElementById('pc-' + this.activeFlagIdx);
                const btn = card.querySelector('.f-select');
                btn.innerText = f; btn.style.borderStyle = 'solid';
                document.getElementById('modal').style.display = 'none';
            },

            async prepareBattle() {
                const cards = document.querySelectorAll('.p-slot');
                this.players = Array.from(cards).map(c => {
                    const name = c.querySelector('input').value || "Warrior";
                    const flag = c.querySelector('.f-select').innerText === '+' ? '🐲' : c.querySelector('.f-select').innerText;
                    const p = this.getProfile(name); p.flag = flag;
                    return { ...p, sessionScore: 0, sessionGold: 0 };
                });
                if(this.players.length === 0) return;
                this.pIdx = 0; this.go('loading');
                
                const bank = DB[this.currentLang] || DB.de;
                this.activeQs = bank.sort(() => 0.5 - Math.random()).slice(0, 10);
                setTimeout(() => this.showVS(), 1800);
            },

            showVS() {
                const p = this.players[this.pIdx];
                document.getElementById('vs-flag').innerText = p.flag;
                document.getElementById('vs-name').innerText = p.name.toUpperCase();
                document.getElementById('vs-info').innerHTML = `<span style="color:var(--gold-solid); font-weight:700; font-family:'Syncopate';">LVL ${p.level}</span>`;
                this.go('vs');
            },

            startQuiz() { this.qIdx = 0; this.renderQuestion(); this.go('quiz'); },

            renderQuestion() {
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                const sig = Math.random();
                
                document.getElementById('q-round').innerText = `Round ${this.qIdx + 1}/10`;
                document.getElementById('q-gold').innerText = `💰 ${p.sessionGold}`;
                document.getElementById('q-text').innerText = q.q;

                document.getElementById('q-frame').style.backgroundImage = `url('https://source.unsplash.com/800x450/?${q.kw},land&sig=${sig}')`;
                
                const box = document.getElementById('q-options'); box.innerHTML = '';
                document.getElementById('q-feedback').style.display = 'none';
                box.style.display = 'block';

                q.o.forEach((opt, i) => {
                    const b = document.createElement('div');
                    b.className = 'opt-card';
                    b.style.backgroundImage = `url('https://source.unsplash.com/400x150/?nature,dark,${i}&sig=${sig}')`;
                    b.innerHTML = `<div class="opt-shade"></div><div class="opt-txt">${opt}</div>`;
                    b.onclick = () => this.handleAnswer(i, b);
                    box.appendChild(b);
                });
                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timer); this.timeLeft = 12;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 12 * 100) + "%";
                    if(this.timeLeft <= 0) this.handleAnswer(-1);
                }, 100);
            },

            handleAnswer(idx, b) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                const prof = this.getProfile(p.name);
                const opts = document.querySelectorAll('.opt-card');
                opts.forEach(o => o.style.pointerEvents = 'none');

                if(idx === q.c) {
                    if(b) b.classList.add('correct');
                    p.sessionScore++;
                    const gain = Math.round(this.timeLeft * 30);
                    p.sessionGold += gain; prof.gold += gain; prof.xp += 100;
                    prof.level = Math.floor(Math.sqrt(prof.xp / 350)) + 1;
                } else {
                    if(idx !== -1 && b) b.classList.add('wrong');
                    opts[q.c].classList.add('correct');
                }
                this.save();
                document.getElementById('q-expl').innerText = q.e;
                document.getElementById('q-feedback').style.display = 'block';
                document.getElementById('q-options').style.display = 'none';
            },

            nextStep() {
                this.qIdx++;
                if(this.qIdx < 10 && this.qIdx < this.activeQs.length) this.renderQuestion();
                else { this.pIdx++; if(this.pIdx < this.players.length) this.prepareBattle(); else this.showResults(); }
            },

            renderLeaderboard() {
                const list = document.getElementById('lb-list');
                const sorted = Object.values(this.profiles).sort((a,b) => b.xp - a.xp);
                list.innerHTML = sorted.map((p, i) => `
                    <div style="background:var(--card); border:1px solid var(--border); border-radius:15px; display:flex; justify-content:space-between; align-items:center; padding:15px; margin-bottom:10px;">
                        <div><span style="font-size:1.2rem; margin-right:10px;">${p.flag}</span><b>${p.name}</b></div>
                        <div style="text-align:right"><span style="color:var(--gold-solid); font-weight:700;">LVL ${p.level}</span><br><span style="opacity:0.6; font-size:0.8rem;">${p.gold} 💰</span></div>
                    </div>
                `).join('');
            },

            renderAchievements() {
                const list = document.getElementById('ach-list');
                const sorted = Object.values(this.profiles).sort((a,b) => b.level - a.level);
                list.innerHTML = sorted.map(p => `
                    <div style="background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:15px; padding:15px; margin-bottom:12px; display:flex; align-items:center; gap:15px;">
                        <div style="font-size:2rem">${p.flag}</div>
                        <div style="flex:1"><b>${p.name}</b><br><span style="color:var(--blue); font-size:0.7rem; font-family:'Syncopate';">GLOBAL MASTER</span></div>
                        <div style="text-align:right; font-weight:700; color:var(--gold-solid)">Level ${p.level}</div>
                    </div>`).join('');
            },

            showResults() {
                this.go('result');
                const list = document.getElementById('res-list');
                list.innerHTML = this.players.map(p => `
                    <div style="background:var(--card); border:1px solid var(--border); border-radius:15px; display:flex; justify-content:space-between; align-items:center; padding:20px; margin-bottom:10px;">
                        <div><span>${p.flag}</span> <b style="margin-left:10px">${p.name}</b></div>
                        <div style="text-align:right"><div style="color:var(--gold-solid); font-weight:900;">${p.sessionScore}/10 PKT</div></div>
                    </div>`).join('');
            }
        };

        App.go('home');
    </script>
</body>
</html>
