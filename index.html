<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>❤️ Best World Quiz ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04000a;color:#f0d8c0;font-family:'IM Fell English',Georgia,serif;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 100% 55% at 50% -5%,rgba(200,10,10,.32) 0%,transparent 65%),radial-gradient(ellipse 50% 50% at 10% 90%,rgba(130,0,60,.22) 0%,transparent 55%),linear-gradient(180deg,#04000a 0%,#090010 40%,#06000d 100%);z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
.screen{display:none;width:100%;max-width:600px;flex-direction:column;align-items:center}
.screen.active{display:flex}
.card{width:100%;background:linear-gradient(160deg,rgba(18,2,10,.97),rgba(10,0,18,.97));border:1px solid rgba(180,30,60,.35);border-radius:4px;padding:28px 30px;box-shadow:0 0 40px rgba(150,0,0,.2),0 20px 60px rgba(0,0,0,.7);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,60,80,.7),transparent)}
.mk{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.4rem,5vw,2.4rem);letter-spacing:.18em;background:linear-gradient(180deg,#fff5e0,#ffaa40,#ff4400,#990000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 16px rgba(255,100,0,.8));animation:flame 2s infinite;margin-bottom:4px;text-align:center}
@keyframes flame{0%,100%{filter:drop-shadow(0 0 12px rgba(255,100,0,.7))}50%{filter:drop-shadow(0 0 28px rgba(255,180,0,1))}}
.globe{font-size:5rem;filter:drop-shadow(0 0 24px rgba(255,40,0,.8));animation:flt 3s ease-in-out infinite;margin:8px 0}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.title{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.4rem,5vw,2.2rem);color:#ffc8a0;text-shadow:0 0 24px rgba(255,80,30,.5);text-align:center;margin:8px 0}
.subtitle{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(.9rem,3vw,1.2rem);color:#ff6633;text-shadow:0 0 16px rgba(255,80,30,.7);letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:20px}
.flags{font-size:2rem;letter-spacing:.5rem;margin:10px 0 24px;animation:flt 4s ease-in-out infinite;text-align:center}
.btn{width:100%;padding:14px;border-radius:3px;font-family:'Cinzel',serif;font-weight:700;font-size:.85rem;letter-spacing:.12em;cursor:pointer;border:none;text-transform:uppercase;margin-bottom:10px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#4a0000,#8b0000,#b01500,#5c0000);color:#ffe5cc;box-shadow:0 0 20px rgba(160,0,0,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(200,0,0,.5)}
.btn-outline{background:transparent;color:rgba(240,180,150,.5);border:1px solid rgba(180,40,40,.3);font-family:'IM Fell English',serif;font-style:italic;text-transform:none;font-size:.92rem;letter-spacing:.02em}
.section-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;color:#ff7755;text-transform:uppercase;margin-bottom:12px}
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.player-box{border:1px solid rgba(180,30,30,.3);border-radius:3px;padding:14px;background:rgba(12,0,5,.7)}
.player-flag{font-size:1.8rem;margin-bottom:6px}
.player-lang{font-size:.72rem;color:rgba(200,130,110,.4);font-style:italic;margin-bottom:8px}
.inp{width:100%;padding:9px 11px;background:rgba(30,5,8,.9);border:1px solid rgba(200,60,60,.35);border-radius:3px;color:#fff;font-family:'IM Fell English',serif;font-size:.95rem;outline:none}
.inp:focus{border-color:rgba(255,100,80,.7)}
.flag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fbtn{padding:6px 10px;font-size:1.2rem;background:rgba(10,0,4,.8);border:2px solid rgba(120,20,20,.2);border-radius:3px;cursor:pointer;transition:all .15s}
.fbtn.selected{border-color:#cc2200;transform:scale(1.1);box-shadow:0 0 10px rgba(200,20,0,.3)}
.fbtn.taken{opacity:.15;cursor:not-allowed}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.cat-btn{display:flex;align-items:center;gap:8px;padding:11px 13px;background:rgba(12,0,5,.85);border:1px solid rgba(140,20,20,.2);border-radius:3px;color:rgba(240,180,150,.35);font-family:'IM Fell English',serif;font-size:.9rem;cursor:pointer;transition:all .15s}
.cat-btn.on{border-color:rgba(220,50,30,.6);color:#ffcca0;background:rgba(40,2,4,.8)}
.steps{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.step{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
.step.on{background:rgba(255,60,40,.85);box-shadow:0 0 8px rgba(255,60,40,.6)}
.loading-globe{font-size:4rem;filter:drop-shadow(0 0 18px rgba(255,40,0,.8));animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.load-title{font-family:'Cinzel',serif;font-size:1.5rem;color:#ff8855;text-shadow:0 0 16px rgba(255,80,30,.4);margin:12px 0 4px;text-align:center}
.load-sub{color:rgba(255,180,130,.35);font-size:.88rem;font-style:italic;text-align:center;margin-bottom:20px}
.load-row{display:flex;justify-content:space-between;align-items:center;padding:8px 20px;background:rgba(12,0,5,.9);border:1px solid rgba(140,20,20,.2);border-radius:3px;font-size:.9rem;color:rgba(240,180,150,.45);margin-bottom:8px;min-width:220px}
.load-row.done{border-color:rgba(80,200,100,.3);color:#86efac}
.turn-flag{font-size:5rem;filter:drop-shadow(0 0 18px rgba(255,40,0,.4));animation:flt 3s ease-in-out infinite;display:block;text-align:center;margin-bottom:12px}
.turn-name{font-family:'Cinzel',serif;font-size:2rem;font-weight:900;text-align:center;margin-bottom:8px}
.turn-sub{color:rgba(255,180,140,.4);font-size:.9rem;font-style:italic;text-align:center;margin-bottom:20px}
.score-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.score-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid rgba(140,20,20,.2);border-radius:3px;font-size:.82rem;color:rgba(240,180,150,.3);background:rgba(10,0,5,.75);transition:all .2s}
.score-chip.active{background:rgba(28,2,6,.95)}
.score-num{font-family:'Cinzel',serif;font-weight:700}
.timer-track{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:12px}
.timer-fill{height:100%;border-radius:2px;transition:width 1s linear,background .3s}
.timer-row{display:flex;justify-content:space-between;margin-bottom:16px}
.q-label{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,180,150,.3);font-family:'Cinzel',serif}
.timer-num{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700}
.q-text{font-size:clamp(1rem,2.5vw,1.12rem);line-height:1.7;color:#f0d8c0;margin-bottom:18px;min-height:48px}
.opts{display:grid;gap:8px;margin-bottom:6px}
.opt-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(12,0,6,.82);border:1px solid rgba(140,20,30,.22);border-radius:3px;color:rgba(240,200,180,.45);font-family:'IM Fell English',serif;font-size:.95rem;cursor:pointer;text-align:left;line-height:1.4;transition:all .15s;width:100%}
.opt-btn:hover{border-color:rgba(200,40,40,.5);color:#f0d8c0;background:rgba(30,2,6,.95);padding-left:18px}
.opt-btn.correct{border-color:rgba(80,200,110,.6);color:#86efac;background:rgba(0,24,6,.75)}
.opt-btn.wrong{border-color:rgba(220,40,40,.6);color:#fca5a5;background:rgba(30,0,0,.75)}
.opt-key{min-width:22px;height:22px;border:1px solid currentColor;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:bold;opacity:.5;flex-shrink:0;font-family:'Cinzel',serif}
.expl{padding:11px 14px;border-radius:3px;font-size:.88rem;line-height:1.65;margin:12px 0;font-style:italic}
.expl.c{border-left:3px solid rgba(80,200,110,.55);background:rgba(0,22,6,.7);color:#a7f3d0}
.expl.w{border-left:3px solid rgba(220,40,40,.55);background:rgba(28,0,0,.7);color:#fca5a5}
.expl.t{border-left:3px solid rgba(250,120,0,.55);background:rgba(28,6,0,.7);color:#fdba74}
.result-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;text-align:center;background:linear-gradient(135deg,#ffcc80,#ff6633,#cc0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
.podium{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.podium-row{display:flex;align-items:center;gap:9px;padding:11px 13px;border:1px solid rgba(140,20,20,.18);border-radius:3px;background:rgba(10,0,5,.75)}
.podium-row.first{border-color:rgba(255,150,50,.35)!important;background:rgba(30,5,0,.8);box-shadow:0 0 16px rgba(200,70,0,.12)}
.pod-medal{font-size:1.3rem;min-width:28px}
.pod-flag{font-size:1.2rem}
.pod-name{flex:1;font-size:.95rem}
.pod-score{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700}
.pod-pct{font-size:.75rem;color:rgba(240,180,140,.4);min-width:36px;text-align:right}
.winner-msg{text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;padding:15px;margin-bottom:16px;border:1px solid rgba(180,40,20,.3);border-radius:3px;background:rgba(38,4,4,.6);color:#ffaa70;text-shadow:0 0 14px rgba(255,80,20,.35);letter-spacing:.06em}
.hs-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid rgba(140,20,20,.15);border-radius:3px;font-size:.88rem;background:rgba(10,0,5,.65);margin-bottom:7px}
.hs-rank{color:rgba(255,180,130,.25);min-width:22px;font-size:.78rem;font-family:'Cinzel',serif}
.hs-name{flex:1}
.hs-score{font-family:'Cinzel',serif;font-weight:700;color:#ff9960}
.hs-pct{color:rgba(240,180,130,.4);min-width:34px;text-align:right}
.hs-date{color:rgba(240,180,130,.2);font-size:.72rem}
.empty{text-align:center;color:rgba(255,180,130,.25);padding:30px;font-style:italic}
.divider{height:1px;background:rgba(180,20,20,.12);margin:16px 0}
.warn{color:#fb923c;font-size:.82rem;margin-top:6px;font-style:italic}
.err{color:#fca5a5;font-size:.82rem;margin-top:10px;padding:10px;border:1px solid rgba(200,40,40,.25);border-radius:3px;background:rgba(30,0,0,.6)}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:8px;z-index:10;pointer-events:none}
.footer p{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.75);text-shadow:0 0 8px rgba(255,255,255,.15)}
.hidden{display:none}
</style>
</head>
<body>
<div class="bg"></div>

<div class="app">

<!-- HOME -->

<div id="screen-home" class="screen active">
  <div class="mk">MORTAL KOMBAT</div>
  <div class="globe">🌍</div>
  <div class="title">❤️ Best World Quiz ❤️</div>
  <div class="subtitle">Oder Angst? 😅</div>
  <div class="flags">🇩🇪 🇷🇺 🇺🇦 🇹🇷 🇫🇷</div>
  <div style="width:100%;max-width:320px">
    <button class="btn btn-primary" onclick="showScreen('setup')">🎮 Neues Spiel · Новая игра</button>
    <button class="btn btn-outline" onclick="showScreen('hs')">🏆 Bestenliste · Рейтинг</button>
  </div>
</div>

<!-- SETUP -->

<div id="screen-setup" class="screen">
  <div class="steps">
    <div class="step on" id="step1"></div>
    <div class="step" id="step2"></div>
    <div class="step" id="step3"></div>
  </div>

  <!-- Step 1: Player count -->

  <div id="setup-step1" class="card">
    <div class="section-title">⚔️ Wie viele Kämpfer?</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px">
      <button class="btn btn-primary" onclick="setPlayerCount(2)" id="pc2">2</button>
      <button class="btn btn-outline" onclick="setPlayerCount(3)" id="pc3">3</button>
      <button class="btn btn-outline" onclick="setPlayerCount(4)" id="pc4">4</button>
    </div>
    <button class="btn btn-primary" onclick="goSetupStep(2)">Weiter →</button>
    <button class="btn btn-outline" onclick="showScreen('home')">← Zurück</button>
  </div>

  <!-- Step 2: Players -->

  <div id="setup-step2" class="card hidden">
    <div class="section-title">🩸 Kämpfer wählen</div>
    <div id="player-list"></div>
    <div style="display:flex;gap:9px;margin-top:4px">
      <button class="btn btn-outline" style="flex:1;margin-bottom:0" onclick="goSetupStep(1)">← Zurück</button>
      <button class="btn btn-primary" style="flex:2;margin-bottom:0" onclick="goSetupStep(3)" id="step2-next">Weiter →</button>
    </div>
  </div>

  <!-- Step 3: Categories -->

  <div id="setup-step3" class="card hidden">
    <div class="section-title">📜 Kategorien wählen</div>
    <div class="cat-grid" id="cat-grid"></div>
    <div id="cat-warn" class="warn hidden">⚠ Mindestens 1 Kategorie!</div>
    <div style="display:flex;gap:9px;margin-top:8px">
      <button class="btn btn-outline" style="flex:1;margin-bottom:0" onclick="goSetupStep(2)">← Zurück</button>
      <button class="btn btn-primary" style="flex:2;margin-bottom:0" onclick="startGame()">🔥 Los geht's!</button>
    </div>
    <div id="setup-err" class="err hidden"></div>
  </div>
</div>

<!-- LOADING -->

<div id="screen-loading" class="screen">
  <div class="loading-globe">🌍</div>
  <div class="load-title">KI erstellt Fragen…</div>
  <div class="load-sub">ИИ создаёт вопросы…</div>
  <div id="load-rows"></div>
</div>

<!-- TURN INTRO -->

<div id="screen-turn" class="screen">
  <div class="card" style="text-align:center;max-width:380px">
    <span class="turn-flag" id="turn-flag"></span>
    <div class="turn-name" id="turn-name"></div>
    <div class="turn-sub" id="turn-sub"></div>
    <div id="turn-prev" style="font-size:.82rem;color:rgba(255,180,140,.35);margin-bottom:16px"></div>
    <button class="btn btn-primary" onclick="startQuiz()">⚔️ Bereit! →</button>
  </div>
</div>

<!-- QUIZ -->

<div id="screen-quiz" class="screen">
  <div class="score-bar" id="score-bar"></div>
  <div class="card" style="width:100%;max-width:600px">
    <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    <div class="timer-row">
      <span class="q-label" id="q-label"></span>
      <span class="timer-num" id="timer-num">25</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="opts" id="opts"></div>
    <div id="expl" class="hidden"></div>
    <button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">Weiter →</button>
  </div>
</div>

<!-- RESULT -->

<div id="screen-result" class="screen">
  <div class="card">
    <div class="result-title">⚔️ Ergebnis · Результат</div>
    <div class="podium" id="podium"></div>
    <div class="winner-msg" id="winner-msg"></div>
    <div class="divider"></div>
    <button class="btn btn-primary" id="save-btn" onclick="saveHS()" style="margin-bottom:9px">💾 Punkte speichern</button>
    <button class="btn btn-primary" onclick="startGame()" style="margin-bottom:9px">🔄 Nochmal spielen</button>
    <button class="btn btn-outline" onclick="showScreen('home')">🏠 Hauptmenü</button>
  </div>
</div>

<!-- HIGHSCORES -->

<div id="screen-hs" class="screen">
  <div class="card">
    <div class="section-title">🏆 Bestenliste · Рейтинг</div>
    <div id="hs-list"></div>
    <button class="btn btn-outline" style="margin-top:16px" onclick="showScreen('home')">← Zurück</button>
  </div>
</div>

</div>

<div class="footer"><p>Produziert von Wowa &amp; Amiar Kempf</p></div>

<script>
const COUNTRIES = [
  {id:'de',flag:'🇩🇪',name:'Deutschland',lang:'Deutsch',langEN:'German',color:'#F5C518'},
  {id:'ru',flag:'🇷🇺',name:'Россия',lang:'Русский',langEN:'Russian',color:'#e03030'},
  {id:'ua',flag:'🇺🇦',name:'Україна',lang:'Українська',langEN:'Ukrainian',color:'#3B82F6'},
  {id:'tr',flag:'🇹🇷',name:'Türkiye',lang:'Türkçe',langEN:'Turkish',color:'#EF4444'},
  {id:'fr',flag:'🇫🇷',name:'France',lang:'Français',langEN:'French',color:'#818CF8'},
];
const CATEGORIES = [
  {id:'history',emoji:'🏛️',label:'Geschichte · History'},
  {id:'geography',emoji:'🌍',label:'Geografie · Geography'},
  {id:'culture',emoji:'🎭',label:'Kultur · Culture'},
  {id:'food',emoji:'🍽️',label:'Essen · Food'},
  {id:'sport',emoji:'⚽',label:'Sport'},
  {id:'language',emoji:'💬',label:'Sprache · Language'},
];
const MEDALS = ['🥇','🥈','🥉','4.'];
const TIMER_SECS = 25;
const Q_COUNT = 6;

let playerCount = 2;
let players = [{id:0,name:'',countryId:'de'},{id:1,name:'',countryId:'ru'},{id:2,name:'',countryId:'ua'},{id:3,name:'',countryId:'fr'}];
let selectedCats = ['history','geography','culture','food'];
let questions = {};
let scores = {};
let currentPlayerIdx = 0;
let currentQIdx = 0;
let timerInterval = null;
let timeLeft = TIMER_SECS;
let answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  if(id==='hs') renderHS();
}

function setPlayerCount(n) {
  playerCount = n;
  [2,3,4].forEach(i => {
    const b = document.getElementById('pc'+i);
    b.className = i===n ? 'btn btn-primary' : 'btn btn-outline';
  });
}

function goSetupStep(step) {
  document.getElementById('setup-step1').classList.add('hidden');
  document.getElementById('setup-step2').classList.add('hidden');
  document.getElementById('setup-step3').classList.add('hidden');
  document.getElementById('setup-step'+step).classList.remove('hidden');
  [1,2,3].forEach(i => {
    document.getElementById('step'+i).className = 'step'+(i<=step?' on':'');
  });
  if(step===2) renderPlayerList();
  if(step===3) renderCatGrid();
}

function renderPlayerList() {
  const active = players.slice(0, playerCount);
  let html = '';
  active.forEach((p,idx) => {
    const c = COUNTRIES.find(c=>c.id===p.countryId);
    const takenIds = active.filter((_,i)=>i!==idx).map(p=>p.countryId);
    const flagBtns = COUNTRIES.map(ct => {
      const taken = takenIds.includes(ct.id);
      return `<button class="fbtn${p.countryId===ct.id?' selected':''}${taken?' taken':''}" onclick="selectCountry(${p.id},'${ct.id}')" title="${ct.name}">${ct.flag}</button>`;
    }).join('');
    html += `<div style="margin-bottom:12px;padding:13px;border:1px solid rgba(200,60,60,.3);border-left:3px solid ${c.color};border-radius:3px;background:rgba(12,0,5,.7)">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="font-family:Cinzel,serif;font-size:1.4rem;font-weight:900;color:#fff;min-width:22px;padding-top:4px">${idx+1}</div>
        <div style="flex:1">
          <input class="inp" placeholder="Name ${idx+1}" value="${p.name}" oninput="setName(${p.id},this.value)" maxlength="20" style="margin-bottom:7px"/>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${flagBtns}</div>
          <div style="font-size:.72rem;color:rgba(200,120,90,.35);font-style:italic;margin-top:4px">${c.flag} ${c.lang}</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('player-list').innerHTML = html;
}

function setName(id, val) {
  players[id].name = val;
}

function selectCountry(playerId, countryId) {
  const active = players.slice(0, playerCount);
  const taken = active.some(p => p.id !== playerId && p.countryId === countryId);
  if(taken) return;
  players[playerId].countryId = countryId;
  renderPlayerList();
}

function renderCatGrid() {
  let html = '';
  CATEGORIES.forEach(cat => {
    const on = selectedCats.includes(cat.id);
    html += `<button class="cat-btn${on?' on':''}" onclick="toggleCat('${cat.id}')">
      <span>${cat.emoji}</span><span>${cat.label}</span>
    </button>`;
  });
  document.getElementById('cat-grid').innerHTML = html;
}

function toggleCat(id) {
  if(selectedCats.includes(id)) {
    if(selectedCats.length > 1) selectedCats = selectedCats.filter(c=>c!==id);
  } else {
    selectedCats.push(id);
  }
  renderCatGrid();
}

async function generateQs(player, others) {
  const lang = player.langEN || 'English';
  const targets = others.map(c=>c.name).join(', ');
  const cats = selectedCats.join(', ');
  const prompt = `Generate ${Q_COUNT} quiz questions in ${lang} about these countries: ${targets}.
Categories to cover: ${cats}.
ALL text must be in ${lang} only.
Respond ONLY with a raw JSON array, no markdown:
[{"question":"...","options":["...","...","...","..."],"correctIndex":0,"explanation":"..."}]
Rules: exactly 4 options, vary correctIndex 0-3, short explanations.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1200,
      messages:[{role:'user',content:prompt}]
    })
  });
  const data = await res.json();
  const text = data.content.map(b=>b.text||'').join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

async function startGame() {
  const active = players.slice(0, playerCount);
  if(active.some(p=>!p.name.trim())) {
    const err = document.getElementById('setup-err');
    err.textContent='⚠ Bitte alle Namen eingeben!';
    err.classList.remove('hidden');
    return;
  }
  document.getElementById('setup-err').classList.add('hidden');
  showScreen('loading');
  scores = {};
  questions = {};
  active.forEach(p => scores[p.id] = 0);

  const loadRows = document.getElementById('load-rows');
  loadRows.innerHTML = active.map(p => {
    const c = COUNTRIES.find(ct=>ct.id===p.countryId);
    return `<div class="load-row" id="load-${p.id}">${c.flag} ${p.name} <span>⟳</span></div>`;
  }).join('');

  try {
    for(const player of active) {
      const c = COUNTRIES.find(ct=>ct.id===player.countryId);
      const others = active.filter(p=>p.id!==player.id).map(p=>COUNTRIES.find(ct=>ct.id===p.countryId)).filter(Boolean);
      const qs = await generateQs({...player, langEN: c.langEN}, others);
      questions[player.id] = qs;
      const row = document.getElementById('load-'+player.id);
      row.classList.add('done');
      row.innerHTML = `${c.flag} ${player.name} <span>✓</span>`;
    }
    currentPlayerIdx = 0;
    currentQIdx = 0;
    showTurnIntro();
  } catch(e) {
    showScreen('setup');
    goSetupStep(3);
    const err = document.getElementById('setup-err');
    err.textContent = '⚠ Fehler: '+e.message;
    err.classList.remove('hidden');
  }
}

function showTurnIntro() {
  const active = players.slice(0, playerCount);
  const cp = active[currentPlayerIdx];
  const c = COUNTRIES.find(ct=>ct.id===cp.countryId);
  document.getElementById('turn-flag').textContent = c.flag;
  document.getElementById('turn-name').textContent = cp.name || 'Spieler '+(currentPlayerIdx+1);
  document.getElementById('turn-name').style.color = c.color;
  document.getElementById('turn-sub').textContent = `${Q_COUNT} Fragen über andere Länder · auf ${c.lang}`;

  let prev = '';
  if(currentPlayerIdx > 0) {
    prev = active.slice(0,currentPlayerIdx).map(p=>{
      const pc = COUNTRIES.find(ct=>ct.id===p.countryId);
      return `${pc.flag} ${p.name}: ${scores[p.id]}/${Q_COUNT}`;
    }).join(' · ');
  }
  document.getElementById('turn-prev').textContent = prev;
  showScreen('turn');
}

function startQuiz() {
  answered = false;
  showScreen('quiz');
  renderQuiz();
}

function renderQuiz() {
  const active = players.slice(0, playerCount);
  const cp = active[currentPlayerIdx];
  const c = COUNTRIES.find(ct=>ct.id===cp.countryId);
  const qs = questions[cp.id] || [];
  const q = qs[currentQIdx];

  // Score bar
  document.getElementById('score-bar').innerHTML = active.map((p,i) => {
    const pc = COUNTRIES.find(ct=>ct.id===p.countryId);
    const isAct = i===currentPlayerIdx;
    return `<div class="score-chip${isAct?' active':''}" style="${isAct?'border-color:'+pc.color+'55;color:'+pc.color+';box-shadow:0 0 10px '+pc.color+'22':''}">
      ${pc.flag} <span class="score-num">${i<=currentPlayerIdx?(scores[p.id]||0):'—'}</span>
    </div>`;
  }).join('');

  document.getElementById('q-label').textContent = `${c.flag} Frage ${currentQIdx+1} / ${Q_COUNT}`;
  document.getElementById('q-text').textContent = q ? q.question : '';
  document.getElementById('expl').className = 'hidden';
  document.getElementById('next-btn').className = 'btn btn-primary hidden';

  const opts = document.getElementById('opts');
  opts.innerHTML = ['A','B','C','D'].map((k,i) => 
    `<button class="opt-btn" onclick="answer(${i})" id="opt-${i}">
      <span class="opt-key">${k}</span>
      <span>${q ? q.options[i] : ''}</span>
    </button>`
  ).join('');

  startTimer(c.color);
}

function startTimer(color) {
  clearInterval(timerInterval);
  timeLeft = TIMER_SECS;
  answered = false;
  updateTimer(color);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer(color);
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      timeOut();
    }
  }, 1000);
}

function updateTimer(color) {
  const pct = (timeLeft/TIMER_SECS)*100;
  const clr = timeLeft<=5 ? '#f87171' : timeLeft<=10 ? '#fb923c' : color;
  document.getElementById('timer-fill').style.cssText = `width:${pct}%;background:${clr};box-shadow:0 0 8px ${clr}`;
  document.getElementById('timer-num').style.color = clr;
  document.getElementById('timer-num').textContent = timeLeft+'s';
}

function answer(idx) {
  if(answered) return;
  answered = true;
  clearInterval(timerInterval);
  const active = players.slice(0, playerCount);
  const cp = active[currentPlayerIdx];
  const q = questions[cp.id][currentQIdx];
  if(idx === q.correctIndex) scores[cp.id]++;

  ['0','1','2','3'].forEach(i => {
    const btn = document.getElementById('opt-'+i);
    if(parseInt(i)===q.correctIndex) btn.classList.add('correct');
    else if(parseInt(i)===idx) btn.classList.add('wrong');
    btn.disabled = true;
  });

  showExpl(idx===q.correctIndex ? 'c' : 'w', q.explanation);
  document.getElementById('next-btn').className = 'btn btn-primary';
  const isLast = currentQIdx+1 >= (questions[cp.id]||[]).length;
  const isLastPlayer = currentPlayerIdx+1 >= active.length;
  document.getElementById('next-btn').textContent = 
    isLast ? (isLastPlayer ? '⚔️ Ergebnis →' : 'Nächster Kämpfer →') : 'Weiter · Далее →';
}

function timeOut() {
  if(answered) return;
  answered = true;
  const active = players.slice(0, playerCount);
  const cp = active[currentPlayerIdx];
  const q = questions[cp.id][currentQIdx];
  document.getElementById('opt-'+q.correctIndex).classList.add('correct');
  ['0','1','2','3'].forEach(i => document.getElementById('opt-'+i).disabled = true);
  showExpl('t', `⏰ Zeit! Richtig: ${q.options[q.correctIndex]}`);
  document.getElementById('next-btn').className = 'btn btn-primary';
  const isLast = currentQIdx+1 >= (questions[cp.id]||[]).length;
  const isLastPlayer = currentPlayerIdx+1 >= active.length;
  document.getElementById('next-btn').textContent = 
    isLast ? (isLastPlayer ? '⚔️ Ergebnis →' : 'Nächster Kämpfer →') : 'Weiter →';
}

function showExpl(type, text) {
  const el = document.getElementById('expl');
  el.className = 'expl '+type;
  el.textContent = (type==='c'?'✓ ':type==='w'?'✗ ':'')+text;
}

function nextQuestion() {
  const active = players.slice(0, playerCount);
  const cp = active[currentPlayerIdx];
  const qLen = (questions[cp.id]||[]).length;
  if(currentQIdx+1 >= qLen) {
    if(currentPlayerIdx+1 >= active.length) {
      clearInterval(timerInterval);
      showResult();
    } else {
      currentPlayerIdx++;
      currentQIdx = 0;
      showTurnIntro();
    }
  } else {
    currentQIdx++;
    answered = false;
    renderQuiz();
  }
}

function showResult() {
  const active = players.slice(0, playerCount);
  const sorted = [...active].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  const qTotal = Q_COUNT;

  document.getElementById('podium').innerHTML = sorted.map((p,rank) => {
    const c = COUNTRIES.find(ct=>ct.id===p.countryId);
    const sc = scores[p.id]||0;
    return `<div class="podium-row${rank===0?' first':''}">
      <span class="pod-medal">${MEDALS[rank]}</span>
      <span class="pod-flag">${c.flag}</span>
      <span class="pod-name">${p.name}</span>
      <span class="pod-score" style="color:${c.color}">${sc}<span style="font-size:.55em;opacity:.3">/${qTotal}</span></span>
      <span class="pod-pct">${Math.round(sc/qTotal*100)}%</span>
    </div>`;
  }).join('');

  const top = sorted[0];
  const topSc = scores[top.id]||0;
  const tied = sorted.filter(p=>(scores[p.id]||0)===topSc);
  const tc = COUNTRIES.find(ct=>ct.id===top.countryId);
  document.getElementById('winner-msg').textContent = 
    tied.length>1 ? '🤝 Unentschieden! · Ничья!' : `${tc.flag} ${top.name} gewinnt! · побеждает!`;

  document.getElementById('save-btn').className = 'btn btn-primary';
  document.getElementById('save-btn').disabled = false;
  showScreen('result');
}

function saveHS() {
  const active = players.slice(0, playerCount);
  let hs = JSON.parse(localStorage.getItem('wq_hs')||'[]');
  active.forEach(p => {
    const c = COUNTRIES.find(ct=>ct.id===p.countryId);
    hs.push({
      name: p.name||'Spieler',
      flag: c.flag,
      score: scores[p.id]||0,
      total: Q_COUNT,
      pct: Math.round(((scores[p.id]||0)/Q_COUNT)*100),
      date: new Date().toLocaleDateString('de-DE')
    });
  });
  hs = hs.sort((a,b)=>b.pct-a.pct).slice(0,30);
  localStorage.setItem('wq_hs', JSON.stringify(hs));
  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ Gespeichert!';
  btn.style.color = '#86efac';
  btn.disabled = true;
}

function renderHS() {
  const hs = JSON.parse(localStorage.getItem('wq_hs')||'[]');
  if(hs.length===0) {
    document.getElementById('hs-list').innerHTML = '<div class="empty">Noch keine Einträge.<br><small>Spiel beenden und Punkte speichern!</small></div>';
    return;
  }
  document.getElementById('hs-list').innerHTML = hs.map((h,i)=>
    `<div class="hs-row">
      <span class="hs-rank">${i+1}.</span>
      <span>${h.flag}</span>
      <span class="hs-name">${h.name}</span>
      <span class="hs-score">${h.score}/${h.total}</span>
      <span class="hs-pct">${h.pct}%</span>
      <span class="hs-date">${h.date}</span>
    </div>`
  ).join('');
}
</script>
