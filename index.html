<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · CELESTIAL LEGACY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-solid: #d4af37;
            --bg: #030308;
            --card: rgba(10, 10, 15, 0.9);
            --border: rgba(212, 175, 55, 0.3);
            --accent: #00e5ff;
            --red: #ff3c00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
            background-image: radial-gradient(circle at 50% -20%, #1a1b3a 0%, #030308 90%);
        }

        #app {
            width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column;
            position: relative; z-index: 10; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
        }

        .screen { display: none; flex: 1; padding: 30px; flex-direction: column; overflow-y: auto; position: relative; }
        .screen.active { display: flex; animation: screenFade 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes screenFade { from { opacity: 0; transform: scale(1.05); filter: blur(15px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* --- CELESTIAL 3D GLOBUS --- */
        .globe-anchor {
            width: 250px; height: 250px; margin: 20px auto;
            position: relative; border-radius: 50%;
            background: #000;
            box-shadow: 0 0 80px rgba(0, 229, 255, 0.15), inset -30px -30px 60px #000;
        }

        .globe-aura {
            position: absolute; inset: -10px; border-radius: 50%;
            border: 1px solid rgba(0, 229, 255, 0.2);
            animation: pulseAura 4s ease-in-out infinite alternate;
        }

        @keyframes pulseAura { from { transform: scale(1); opacity: 0.2; } to { transform: scale(1.05); opacity: 0.5; } }

        .globe-sphere {
            width: 100%; height: 100%; border-radius: 50%;
            position: relative; overflow: hidden; z-index: 5;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .globe-map {
            width: 200%; height: 100%; position: absolute;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/1024px-Blue_Marble_2002.png');
            background-size: cover; animation: rotateMap 40s linear infinite;
            filter: brightness(1.2) contrast(1.1); opacity: 0.9;
        }

        .globe-glare {
            position: absolute; inset: 0; z-index: 10;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, transparent 60%, rgba(0,0,0,0.8) 100%);
        }

        @keyframes rotateMap { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- TYPOGRAPHY --- */
        .brand-label { font-family: 'Syncopate', sans-serif; font-size: 0.65rem; letter-spacing: 12px; color: var(--gold-solid); text-align: center; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }
        .main-logo { font-family: 'Cinzel Decorative', serif; font-size: 3.5rem; text-align: center; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 0.85; margin-top: 40px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); }
        .quiz-title { font-family: 'Syncopate', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: #fff; text-align: center; text-transform: uppercase; margin-top: auto; padding-bottom: 50px; text-shadow: 0 0 30px rgba(255,255,255,0.8); }

        /* --- BUTTONS --- */
        .btn-celestial { appearance: none; border: none; padding: 20px; border-radius: 20px; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: 0.4s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; margin-bottom: 15px; position: relative; overflow: hidden; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-outline { background: rgba(255,255,255,0.02); color: #fff; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .btn-back { background: transparent; border: none; color: rgba(255,255,255,0.5); font-family: 'Syncopate'; font-size: 0.6rem; cursor: pointer; padding: 15px; width: 100%; letter-spacing: 2px; }

        /* --- SETUP --- */
        .setup-title { font-family: 'Syncopate'; font-size: 0.7rem; color: var(--gold-solid); text-align: center; margin: 25px 0 15px; letter-spacing: 4px; }
        .player-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; align-items: center; margin-bottom: 12px; transition: 0.3s; }
        .player-card:hover { border-color: #fff; transform: translateY(-2px); }
        .f-plus { width: 45px; height: 45px; background: #000; border: 2px dashed var(--gold-solid); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; color: var(--gold-solid); }
        .i-name { background: transparent; border: none; color: #fff; font-family: 'Outfit'; font-size: 1.2rem; width: 100%; margin-left: 15px; outline: none; font-weight: 600; }

        /* --- VISUAL QUIZ --- */
        .q-window { height: 230px; border-radius: 25px; border: 1px solid var(--border); background-size: cover; background-position: center; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; box-shadow: 0 20px 50px #000; }
        .q-glass { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.9)); z-index: 1; }
        .q-text { position: relative; z-index: 5; text-align: center; font-size: 1.4rem; padding: 20px; font-weight: 700; text-shadow: 0 4px 10px #000; letter-spacing: -0.5px; }

        .o-card { height: 65px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); background-size: cover; background-position: center; position: relative; overflow: hidden; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .o-card:hover { transform: translateX(10px); border-color: var(--gold-solid); }
        .o-shade { position: absolute; inset: 0; background: rgba(0,0,0,0.75); z-index: 1; }
        .o-txt { position: relative; z-index: 5; padding-left: 25px; font-weight: 700; font-size: 1.1rem; text-shadow: 0 2px 4px #000; }

        .correct .o-shade { background: rgba(27, 77, 46, 0.9) !important; }
        .wrong .o-shade { background: rgba(77, 27, 27, 0.9) !important; }

        /* --- HUD --- */
        .t-rail { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 15px 0 25px; overflow: hidden; }
        .t-fill { height: 100%; width: 100%; background: var(--red); box-shadow: 0 0 15px var(--red); transition: width 0.1s linear; }
        .badge-p { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 100px; font-size: 0.65rem; font-weight: 800; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:3000; align-items:center; justify-content:center; backdrop-filter: blur(25px); }
        .modal-box { background: #050505; border: 1px solid var(--gold-solid); padding: 40px; border-radius: 30px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        footer { text-align: center; padding: 25px; font-size: 0.75rem; color: rgba(255,255,255,0.5); font-family: 'Syncopate'; letter-spacing: 4px; text-transform: uppercase; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(212, 175, 55, 0.1); border-top-color: #d4af37; border-radius: 50%; animation: spin 0.8s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇩🇪')">🇩🇪</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇷🇺')">🇷🇺</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇬🇧')">🇬🇧</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇳🇬')">🇳🇬</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇹🇷')">🇹🇷</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇫🇷')">🇫🇷</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇮🇹')">🇮🇹</div>
            <div style="font-size:3rem; cursor:pointer;" onclick="App.confirmFlag('🇺🇦')">🇺🇦</div>
        </div>
    </div>

    <div id="app">
        <!-- SCREEN: HOME -->
        <section id="s-home" class="screen active">
            <p class="brand-label">Elite Prestige Game</p>
            <h1 class="main-logo">MORTAL<br>KOMBAT</h1>
            
            <div class="globe-anchor">
                <div class="globe-aura"></div>
                <div class="globe-sphere">
                    <div class="globe-map"></div>
                    <div class="globe-glare"></div>
                </div>
            </div>

            <p class="quiz-title">Best World Quiz</p>

            <div style="margin-top: auto;">
                <button class="btn-celestial btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
                <button class="btn-celestial btn-outline" onclick="App.go('achievements')">Erfolge ⚔️</button>
                <button class="btn-celestial btn-outline" onclick="App.go('leaderboard')">Bestenliste 🏆</button>
            </div>
            <footer>Wowa & Amiar Kempf</footer>
        </section>

        <!-- SCREEN: SETUP -->
        <section id="s-setup" class="screen">
            <h2 class="main-logo" style="font-size: 2.2rem; margin-top: 0;">Setup</h2>
            
            <p class="setup-title">Game Sprache</p>
            <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 25px;">
                <div class="l-btn active" id="ln-de" style="background:rgba(255,255,255,0.05); padding:12px 2px; border-radius:12px; font-size:0.55rem; font-family:'Syncopate'; cursor:pointer; text-align:center;" onclick="App.setLang('de')">DE</div>
                <div class="l-btn" id="ln-ru" style="background:rgba(255,255,255,0.05); padding:12px 2px; border-radius:12px; font-size:0.55rem; font-family:'Syncopate'; cursor:pointer; text-align:center;" onclick="App.setLang('ru')">RU</div>
                <div class="l-btn" id="ln-en" style="background:rgba(255,255,255,0.05); padding:12px 2px; border-radius:12px; font-size:0.55rem; font-family:'Syncopate'; cursor:pointer; text-align:center;" onclick="App.setLang('en')">EN</div>
                <div class="l-btn" id="ln-ig" style="background:rgba(255,255,255,0.05); padding:12px 2px; border-radius:12px; font-size:0.55rem; font-family:'Syncopate'; cursor:pointer; text-align:center;" onclick="App.setLang('ig')">IGBO</div>
                <div class="l-btn" id="ln-tr" style="background:rgba(255,255,255,0.05); padding:12px 2px; border-radius:12px; font-size:0.55rem; font-family:'Syncopate'; cursor:pointer; text-align:center;" onclick="App.setLang('tr')">TR</div>
            </div>

            <div id="player-list"></div>
            <p style="text-align:center; font-size:0.85rem; color:var(--gold-solid); margin: 15px 0; font-weight:600;">Name & Symbol auswählen</p>
            <button class="btn-celestial btn-outline" style="font-size:0.65rem; padding:15px" onclick="App.addPlayerInput()">+ Neuer Krieger</button>

            <div style="margin-top: auto;">
                <button class="btn-celestial btn-gold" onclick="App.prepareBattle()">Kampf Starten</button>
                <button class="btn-back" onclick="App.go('home')">← Hauptmenü</button>
            </div>
        </section>

        <!-- SCREEN: LOADING -->
        <section id="s-loading" class="screen" style="justify-content:center; align-items:center;">
            <div class="spinner"></div>
            <p style="font-family:'Syncopate'; font-size:0.65rem; letter-spacing:4px; margin-top:30px;">Synchronisiere Realm...</p>
        </section>

        <!-- SCREEN: QUIZ -->
        <section id="s-quiz" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span id="q-round" style="font-family:'Syncopate'; font-size:0.65rem; color:var(--gold-solid);">Round 1/10</span>
                <span id="q-gold" class="badge-p">💰 0</span>
            </div>
            <div class="t-rail"><div id="timer-bar" class="t-fill"></div></div>
            
            <div id="q-frame" class="q-window">
                <div class="q-glass"></div>
                <h3 id="q-text" class="q-text">Lade Prüfung...</h3>
            </div>

            <div id="q-options"></div>

            <div id="q-feedback" style="display:none; margin-top:10px;">
                <div style="background:rgba(0,0,0,0.9); border:1px solid var(--border); border-radius:20px; padding:25px; text-align:center;">
                    <p id="q-expl" style="font-size:1rem; opacity:0.9; margin-bottom:20px; line-height:1.4;"></p>
                    <button class="btn-celestial btn-gold" style="margin:0" onclick="App.nextStep()">Weiter</button>
                </div>
            </div>
        </section>

        <!-- RESULT -->
        <section id="s-result" class="screen">
            <h1 class="main-logo" style="font-size:2.8rem; margin:0">Ergebnis</h1>
            <div id="res-list" style="margin-top:30px; flex:1"></div>
            <div style="margin-top: auto;">
                <button class="btn-celestial btn-gold" onclick="App.prepareBattle()">Neustart</button>
                <button class="btn-celestial btn-outline" onclick="location.reload()">Hauptmenü</button>
            </div>
        </section>
    </div>

    <script>
        /**
         * MK PRESTIGE FINAL ENGINE
         */
        const DB = {
            de: [
                { id: "de1", q: "Welches Land hat die meisten Inseln?", o: ["Schweden", "Norwegen", "Indonesien", "Philippinen"], c: 0, e: "Schweden besitzt über 267.000 Inseln.", kw: "sweden island" },
                { id: "de2", q: "Hauptstadt von Japan?", o: ["Tokio", "Osaka", "Kyoto", "Seoul"], c: 0, e: "Tokio ist die größte Metropole der Welt.", kw: "tokyo skyline" },
                { id: "de3", q: "Größtes Land der Erde?", o: ["Russland", "Kanada", "China", "USA"], c: 0, e: "Russland umfasst über 17 Mio km².", kw: "russia nature" },
                { id: "de4", q: "Welcher Fluss ist der längste?", o: ["Nil", "Amazonas", "Donau", "Mississippi"], c: 0, e: "Der Nil ist ca. 6.650 km lang.", kw: "nile river" },
                { id: "de5", q: "Wo steht der Eiffelturm?", o: ["Paris", "Berlin", "London", "Rom"], c: 0, e: "Wahrzeichen von Frankreich.", kw: "paris tower" }
            ],
            ru: [{ id: "ru1", q: "Столица России?", o: ["Москва", "Питер", "Киев", "Минск"], c: 0, e: "Москва — сердце страны.", kw: "moscow" }],
            en: [{ id: "en1", q: "Largest country?", o: ["Russia", "USA", "China", "Canada"], c: 0, e: "Russia is the largest.", kw: "russia" }],
            ig: [{ id: "ig1", q: "Isi obodo Nigeria?", o: ["Abuja", "Lagos", "Enugu", "Kano"], c: 0, e: "Abuja bụ isi obodo.", kw: "nigeria" }],
            tr: [{ id: "tr1", q: "Türkiye'nin başkenti?", o: ["Ankara", "İstanbul", "İzmir", "Bursa"], c: 0, e: "Ankara başkenttir.", kw: "ankara" }]
        };

        const App = {
            profiles: JSON.parse(localStorage.getItem('mk_celestial_v1')) || {},
            players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, currentLang: 'de', activeFlagIdx: null, activeQs: [],

            save() { localStorage.setItem('mk_celestial_v1', JSON.stringify(this.profiles)); },

            getProfile(name) {
                const k = name.trim().toLowerCase();
                if(!this.profiles[k]) this.profiles[k] = { name: name.trim(), xp: 0, gold: 0, level: 1, flag: '🐲', usedIds: [] };
                return this.profiles[k];
            },

            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
                if(id === 'setup' && document.getElementById('player-list').children.length === 0) this.addPlayerInput();
            },

            setLang(l) {
                this.currentLang = l;
                document.querySelectorAll('.l-btn').forEach(c => c.classList.remove('active'));
                document.getElementById('ln-' + l).classList.add('active');
            },

            addPlayerInput() {
                const cont = document.getElementById('player-list');
                const id = Date.now() + Math.random();
                const d = document.createElement('div');
                d.className = 'player-card'; d.id = 'pc-' + id;
                d.innerHTML = `
                    <div class="f-plus" onclick="App.openFlag('${id}')">+</div>
                    <input type="text" class="i-name" placeholder="Krieger Name...">
                    <button onclick="document.getElementById('pc-${id}').remove()" style="background:none; border:none; color:#ff4d4d; font-size:1.2rem; cursor:pointer;">🗑️</button>
                `;
                cont.appendChild(d);
            },

            openFlag(id) { this.activeFlagIdx = id; document.getElementById('modal').style.display = 'flex'; },
            confirmFlag(f) { 
                const card = document.getElementById('pc-' + this.activeFlagIdx);
                const btn = card.querySelector('.f-plus');
                btn.innerText = f; btn.style.borderStyle = 'solid';
                document.getElementById('modal').style.display = 'none';
            },

            async prepareBattle() {
                const cards = document.querySelectorAll('.player-card');
                this.players = Array.from(cards).map(c => {
                    const name = c.querySelector('input').value || "Warrior";
                    const flag = c.querySelector('.f-plus').innerText === '+' ? '🐲' : c.querySelector('.f-plus').innerText;
                    const p = this.getProfile(name); p.flag = flag;
                    return { ...p, sessionScore: 0, sessionGold: 0 };
                });
                if(this.players.length === 0) return;
                this.pIdx = 0; this.go('loading');
                
                const bank = DB[this.currentLang] || DB.de;
                this.activeQs = bank.sort(() => 0.5 - Math.random()).slice(0, 10);
                setTimeout(() => { this.qIdx = 0; this.renderQuestion(); this.go('quiz'); }, 1500);
            },

            renderQuestion() {
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                const sig = Math.random();
                
                document.getElementById('q-round').innerText = `Round ${this.qIdx + 1}/10`;
                document.getElementById('q-gold').innerText = `💰 ${p.sessionGold}`;
                document.getElementById('q-text').innerText = q.q;

                document.getElementById('q-frame').style.backgroundImage = `url('https://source.unsplash.com/800x450/?${q.kw},nature&sig=${sig}')`;
                
                const box = document.getElementById('q-options'); box.innerHTML = '';
                document.getElementById('q-feedback').style.display = 'none';
                box.style.display = 'block';

                q.o.forEach((opt, i) => {
                    const b = document.createElement('div');
                    b.className = 'o-card';
                    b.style.backgroundImage = `url('https://source.unsplash.com/400x150/?${opt},landmark&sig=${sig+i}')`;
                    b.innerHTML = `<div class="o-shade"></div><div class="o-txt">${opt}</div>`;
                    b.onclick = () => this.handleAnswer(i, b);
                    box.appendChild(b);
                });
                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timer); this.timeLeft = 12;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 12 * 100) + "%";
                    if(this.timeLeft <= 0) this.handleAnswer(-1);
                }, 100);
            },

            handleAnswer(idx, b) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const p = this.players[this.pIdx];
                const prof = this.getProfile(p.name);
                const opts = document.querySelectorAll('.o-card');
                opts.forEach(o => o.style.pointerEvents = 'none');

                if(idx === q.c) {
                    if(b) b.classList.add('correct');
                    p.sessionScore++;
                    const gain = Math.round(this.timeLeft * 30);
                    p.sessionGold += gain; prof.gold += gain; prof.xp += 100;
                    prof.level = Math.floor(Math.sqrt(prof.xp / 350)) + 1;
                } else {
                    if(idx !== -1 && b) b.classList.add('wrong');
                    opts[q.c].classList.add('correct');
                }
                this.save();
                document.getElementById('q-expl').innerText = q.e;
                document.getElementById('q-feedback').style.display = 'block';
                document.getElementById('q-options').style.display = 'none';
            },

            nextStep() {
                this.qIdx++;
                if(this.qIdx < 10 && this.qIdx < this.activeQs.length) this.renderQuestion();
                else { this.pIdx++; if(this.pIdx < this.players.length) this.prepareBattle(); else this.showResults(); }
            },

            showResults() {
