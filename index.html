<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MK · PRESTIGE ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #aa771c 100%);
            --gold-solid: #d4af37;
            --bg: #050505;
            --card: rgba(15, 15, 15, 0.9);
            --border: rgba(212, 175, 55, 0.3);
            --red: #ff3c00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(circle at 50% -20%, #2a1b00 0%, #050505 80%);
        }

        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .screen {
            display: none;
            flex: 1;
            padding: 40px 25px;
            flex-direction: column;
            overflow-y: auto;
        }

        .screen.active { display: flex; animation: screenIn 0.5s ease-out forwards; }

        @keyframes screenIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* TYPOGRAPHY */
        .title-gold {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            text-align: center;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.9;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        .label-tech {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: var(--gold-solid);
            text-transform: uppercase;
            text-align: center;
            opacity: 0.7;
        }

        /* BUTTONS */
        .btn-luxe {
            appearance: none; border: none; padding: 20px; border-radius: 16px;
            font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.75rem;
            cursor: pointer; transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; gap: 10px; width: 100%; margin-bottom: 15px;
        }

        .btn-gold { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 10px 20px rgba(170, 119, 28, 0.3); }
        .btn-gold:active { transform: scale(0.96); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border); }

        /* QUIZ ELEMENTS */
        .glass-panel {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        .timer-rail { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .timer-fill { height: 100%; width: 100%; background: var(--red); box-shadow: 0 0 15px var(--red); transition: width 0.1s linear; }

        .option-item {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 22px; border-radius: 18px; margin-bottom: 12px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .option-item:hover { border-color: var(--gold-solid); background: rgba(255,255,255,0.06); }
        .option-item.correct { background: #1b4d2e !important; border-color: #2ecc71 !important; }
        .option-item.wrong { background: #4d1b1b !important; border-color: #e74c3c !important; }

        .player-entry {
            display: flex; align-items: center; background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .input-minimal { background: transparent; border: none; color: #fff; font-family: 'Outfit', sans-serif; font-size: 1.1rem; width: 100%; margin-left: 10px; outline: none; }

        footer {
            text-align: center; padding: 15px; font-size: 0.65rem;
            letter-spacing: 2px; color: rgba(255,255,255,0.3);
            font-family: 'Syncopate', sans-serif; text-transform: uppercase;
        }

        .badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <div id="app">
        <!-- SCREEN: HOME -->
        <section id="s-home" class="screen active">
            <div style="margin-top: 60px;">
                <p class="label-tech">Elite Prestige Realm</p>
                <h1 class="title-gold">MORTAL<br>KOMBAT</h1>
            </div>
            <div style="margin-top: auto; padding-bottom: 20px;">
                <button class="btn-luxe btn-gold" onclick="App.go('setup')">Beginne Kampf</button>
                <button class="btn-luxe btn-outline" onclick="App.startSolo()">1 Spieler (Solo)</button>
            </div>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>

        <!-- SCREEN: SETUP -->
        <section id="s-setup" class="screen">
            <h2 class="title-gold" style="font-size: 2rem;">Kämpfer</h2>
            <p class="label-tech" style="margin-bottom: 20px;">Trage die Namen ein</p>
            <div id="player-container">
                <!-- Dynamisch -->
            </div>
            <button class="btn-luxe btn-outline" onclick="App.addPlayerInput()">+ Weiterer Kämpfer</button>
            <div style="margin-top: auto;">
                <button class="btn-luxe btn-gold" onclick="App.startBattle()">Kampf Starten</button>
            </div>
        </section>

        <!-- SCREEN: VS -->
        <section id="s-vs" class="screen">
            <div style="text-align: center; margin-top: 60px;">
                <div style="font-size: 6rem; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--gold-solid));">🐲</div>
                <h2 id="vs-name" class="title-gold" style="font-size: 2.5rem;">SPIELER</h2>
                <div class="badge">BEREIT ZUM KAMPF</div>
            </div>
            <div style="margin-top: auto; padding-bottom: 40px;">
                <button class="btn-luxe btn-gold" onclick="App.startQuiz()">FIGHT!</button>
            </div>
        </section>

        <!-- SCREEN: QUIZ -->
        <section id="s-quiz" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="quiz-round" class="label-tech">Runde 1/5</span>
                <span id="quiz-gold" class="badge">💰 100</span>
            </div>
            <div class="timer-rail"><div id="timer-bar" class="timer-fill"></div></div>
            <div class="glass-panel"><h3 id="quiz-question" style="font-size: 1.3rem; text-align: center; line-height: 1.4;">Lade...</h3></div>
            <div id="quiz-options"><!-- Optionen --></div>
            <div id="quiz-feedback" style="display: none; margin-top: 10px;">
                <div class="glass-panel" style="padding: 15px;">
                    <p id="quiz-expl" style="font-size: 0.85rem; opacity: 0.6; margin-bottom: 15px;"></p>
                    <button class="btn-luxe btn-gold" style="margin: 0;" onclick="App.nextStep()">Weiter</button>
                </div>
            </div>
        </section>

        <!-- SCREEN: RESULT -->
        <section id="s-result" class="screen">
            <h1 class="title-gold" style="font-size: 2.5rem;">Siegerehrung</h1>
            <div id="leaderboard" style="margin-top: 20px; flex: 1;"></div>
            <button class="btn-luxe btn-gold" onclick="location.reload()">Neustart</button>
            <footer>Produziert von Wowa & Amiar Kempf</footer>
        </section>
    </div>

    <script>
        const QUESTIONS = [
            { q: "Was ist die Hauptstadt von Japan?", o: ["Seoul", "Peking", "Tokio", "Bangkok"], c: 2, e: "Tokio ist die größte Metropolregion der Welt." },
            { q: "Welches Land hat die Flagge mit dem Ahornblatt?", o: ["USA", "Kanada", "Australien", "Norwegen"], c: 1, e: "Das Ahornblatt ist das nationale Symbol Kanadas." },
            { q: "In welchem Land liegen die Pyramiden von Gizeh?", o: ["Mexiko", "Irak", "Ägypten", "Peru"], c: 2, e: "Die Pyramiden von Gizeh gehören zu den Weltwundern." },
            { q: "Welche Sprache wird in Brasilien primär gesprochen?", o: ["Spanisch", "Englisch", "Portugiesisch", "Französisch"], c: 2, e: "Brasilien ist das einzige portugiesischsprachige Land Amerikas." },
            { q: "Was ist das größte Land der Welt (Fläche)?", o: ["Kanada", "China", "Russland", "USA"], c: 2, e: "Russland umfasst über 17 Millionen Quadratkilometer." }
        ];

        const App = {
            players: [], pIdx: 0, qIdx: 0, timer: null, timeLeft: 12, activeQs: [],

            go(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s-' + id).classList.add('active');
            },

            addPlayerInput(name = "") {
                const container = document.getElementById('player-container');
                if(container.children.length >= 4) return;
                const div = document.createElement('div');
                div.className = 'player-entry';
                div.innerHTML = `<span>👤</span><input type="text" class="input-minimal" value="${name || 'Kämpfer ' + (container.children.length + 1)}">`;
                container.appendChild(div);
            },

            startSolo() {
                document.getElementById('player-container').innerHTML = "";
                this.addPlayerInput("Krieger Solo");
                this.startBattle();
            },

            startBattle() {
                const inputs = document.querySelectorAll('.input-minimal');
                this.players = Array.from(inputs).map(inp => ({ name: inp.value || "Anonym", score: 0, gold: 0 }));
                if(this.players.length === 0) return alert("Bitte mindestens einen Spieler hinzufügen!");
                this.pIdx = 0;
                this.showVS();
            },

            showVS() {
                document.getElementById('vs-name').innerText = this.players[this.pIdx].name.toUpperCase();
                this.go('vs');
            },

            startQuiz() {
                this.qIdx = 0;
                this.activeQs = [...QUESTIONS].sort(() => Math.random() - 0.5);
                this.renderQuestion();
                this.go('quiz');
            },

            renderQuestion() {
                const q = this.activeQs[this.qIdx];
                document.getElementById('quiz-round').innerText = `RUNDE ${this.qIdx + 1}/${this.activeQs.length}`;
                document.getElementById('quiz-gold').innerText = `💰 ${this.players[this.pIdx].gold}`;
                document.getElementById('quiz-question').innerText = q.q;
                
                const optBox = document.getElementById('quiz-options');
                optBox.innerHTML = '';
                optBox.style.display = 'block';
                document.getElementById('quiz-feedback').style.display = 'none';

                q.o.forEach((opt, i) => {
                    const btn = document.createElement('div');
                    btn.className = 'option-item';
                    btn.innerHTML = `<span>${opt}</span><span style="opacity:0.3">◈</span>`;
                    btn.onclick = () => this.handleAnswer(i);
                    optBox.appendChild(btn);
                });
                this.startTimer();
            },

            startTimer() {
                clearInterval(this.timer);
                this.timeLeft = 12;
                const bar = document.getElementById('timer-bar');
                this.timer = setInterval(() => {
                    this.timeLeft -= 0.1;
                    bar.style.width = (this.timeLeft / 12 * 100) + "%";
                    if(this.timeLeft <= 0) { clearInterval(this.timer); this.handleAnswer(-1); }
                }, 100);
            },

            handleAnswer(idx) {
                clearInterval(this.timer);
                const q = this.activeQs[this.qIdx];
                const opts = document.querySelectorAll('.option-item');
                opts.forEach(o => o.style.pointerEvents = 'none');

                if(idx === q.c) {
                    opts[idx].classList.add('correct');
                    this.players[this.pIdx].score++;
                    this.players[this.pIdx].gold += Math.round(this.timeLeft * 20);
                } else {
                    if(idx !== -1) opts[idx].classList.add('wrong');
                    opts[q.c].classList.add('correct');
                }

                document.getElementById('quiz-expl').innerText = q.e;
                document.getElementById('quiz-feedback').style.display = 'block';
                document.getElementById('quiz-options').style.display = 'none';
            },

            nextStep() {
                this.qIdx++;
                if(this.qIdx < this.activeQs.length) {
                    this.renderQuestion();
                } else {
                    this.pIdx++;
                    if(this.pIdx < this.players.length) this.showVS();
                    else this.showResults();
                }
            },

            showResults() {
                this.go('result');
                const board = document.getElementById('leaderboard');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                
                board.innerHTML = sorted.map((p, i) => {
                    let rank = "C";
                    if(p.score >= 5) rank = "S";
                    else if(p.score >= 4) rank = "A";
                    else if(p.score >= 3) rank = "B";

                    return `
                    <div class="glass-panel" style="display:flex; justify-content:space-between; align-items:center; border-color:${i===0?'var(--gold-solid)':'rgba(255,255,255,0.1)'}">
                        <div><span class="badge">RANK ${rank}</span> <b style="margin-left:10px">${p.name}</b></div>
                        <div style="text-align:right">
                            <div style="color:var(--gold-solid); font-weight:700;">${p.score}/${QUESTIONS.length}</div>
                            <div style="font-size:0.7rem; opacity:0.5">💰 ${p.gold}</div>
                        </div>
                    </div>`;
                }).join('');
            }
        };

        // Standard-Setup
        App.addPlayerInput();
        App.addPlayerInput();
    </script>
</body>
</html>
